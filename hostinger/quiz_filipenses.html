<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Filipenses | Clube da Bíblia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { serif: ['Cinzel', 'serif'], sans: ['Lato', 'sans-serif'] },
                    colors: { 
                        divine: { 400: '#ec4899' } /* Pink */
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #050510; color: #e2e8f0; overflow-x: hidden; }
        
        .glass-panel { background: rgba(10, 5, 25, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(236, 72, 153, 0.2); } /* Pink-themed glass */
        .pink-glow { text-shadow: 0 0 15px rgba(236, 72, 153, 0.5); }
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        .quiz-option { 
            background-color: rgba(30, 41, 59, 0.4); 
            border: 1px solid rgba(236, 72, 153, 0.3);
            transition: all 0.3s ease;
        }
        .quiz-option:hover { 
            background-color: rgba(236, 72, 153, 0.1);
            border-color: rgba(236, 72, 153, 0.6);
            transform: translateY(-2px);
        }
        .quiz-option.selected { 
            background-color: rgba(236, 72, 153, 0.2);
            border-color: #ec4899;
        }
        .quiz-option.correct { 
            background-color: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
            animation: pulse-green 0.5s ease-in-out;
        }
        .quiz-option.incorrect { 
            background-color: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes pulse-green {
            0% { transform: scale(1); background-color: rgba(16, 185, 129, 0.2); }
            50% { transform: scale(1.02); background-color: rgba(16, 185, 129, 0.4); }
            100% { transform: scale(1); background-color: rgba(16, 185, 129, 0.2); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050510; }
        ::-webkit-scrollbar-thumb { background: #2f0a1c; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ec4899; }
    </style>
</head>
<body class="font-sans antialiased">

    <canvas id="particles-js"></canvas>

    <nav class="fixed top-0 w-full z-50 p-4 md:p-6 flex flex-col md:flex-row justify-between items-center bg-gradient-to-b from-[#050510]/95 to-[#050510]/80 backdrop-blur-md border-b border-pink-900/40 transition-all">
        <div class="flex items-center gap-4 mb-4 md:mb-0 w-full md:w-auto justify-between md:justify-start">
            <a href="index.html" class="group flex items-center gap-2 px-4 py-2 rounded-lg bg-[#0f0a1a] border border-pink-500/50 text-pink-400 hover:bg-pink-500 hover:text-black transition-all shadow-[0_0_15px_rgba(236,72,153,0.1)]">
                <i class="fa-solid fa-chevron-left text-sm group-hover:-translate-x-1 transition-transform"></i>
                <span class="hidden md:inline text-xs uppercase tracking-widest font-bold">Voltar ao Início</span>
            </a>

            <div class="flex items-center gap-3">
                <i class="fa-solid fa-face-smile text-pink-500 text-xl md:text-2xl"></i>
                <span class="font-serif text-white text-lg md:text-xl tracking-widest font-bold">CLUBE DA BÍBLIA</span>
            </div>
        </div>
    </nav>

    <main class="min-h-screen flex items-center justify-center p-4 relative z-10">
        <div class="glass-panel rounded-2xl p-6 md:p-10 max-w-2xl w-full text-center my-20 border-pink-500/30 shadow-2xl bg-[#0a0514]/80">
            <h1 class="font-serif text-3xl md:text-5xl text-white mb-6 pink-glow uppercase tracking-wider font-bold">
                Quiz: Filipenses
            </h1>
            
            <div id="quiz-intro" class="space-y-4">
                <p class="text-slate-300 text-lg mb-6">Teste seus conhecimentos sobre a Epístola da Alegria!</p>
                <button id="start-quiz-btn" class="bg-pink-600 hover:bg-pink-700 text-white font-bold py-3 px-8 rounded-lg transition transform hover:-translate-y-1 shadow-lg uppercase tracking-wider text-sm">
                    Iniciar Quiz <i class="fa-solid fa-arrow-right ml-2"></i>
                </button>
            </div>

            <div id="quiz-container" class="hidden space-y-6 text-left">
                <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                    <span class="text-pink-400 font-bold text-lg"><span id="current-question-number">1</span>/<span id="total-questions">10</span></span>
                    <span id="timer" class="text-slate-400 text-sm"><i class="fa-solid fa-clock mr-1"></i> 00:00</span>
                </div>
                <p id="question-text" class="text-xl font-serif text-white mb-6 leading-relaxed pink-glow"></p>
                <div id="options-container" class="space-y-4">
                    <!-- Quiz options will be loaded here -->
                </div>
                <button id="submit-answer-btn" class="w-full bg-pink-600 hover:bg-pink-700 text-white font-bold py-3 px-8 rounded-lg transition transform hover:-translate-y-1 shadow-lg uppercase tracking-wider text-sm mt-8">
                    Verificar Resposta <i class="fa-solid fa-check ml-2"></i>
                </button>
                <button id="next-question-btn" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-8 rounded-lg transition transform hover:-translate-y-1 shadow-lg uppercase tracking-wider text-sm mt-4 hidden">
                    Próxima Pergunta <i class="fa-solid fa-forward ml-2"></i>
                </button>
            </div>

            <div id="quiz-results" class="hidden space-y-6">
                <h2 class="font-serif text-3xl text-white mb-4 pink-glow">Resultados do Quiz</h2>
                <p class="text-slate-300 text-lg">Você acertou <span id="score" class="text-pink-400 font-bold">0</span> de <span id="total-questions-results" class="text-pink-400 font-bold">10</span> perguntas!</p>
                <div id="ranking-form" class="space-y-4 mt-8">
                    <p class="text-slate-300">Digite seu nome para o ranking:</p>
                    <input type="text" id="player-name" placeholder="Seu Nome" class="w-full bg-slate-800 border border-slate-700 rounded px-4 py-3 text-white focus:border-pink-500 focus:outline-none">
                    <button id="save-ranking-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-8 rounded-lg transition transform hover:-translate-y-1 shadow-lg uppercase tracking-wider text-sm">
                        Salvar no Ranking <i class="fa-solid fa-ranking-star ml-2"></i>
                    </button>
                </div>
                <button id="restart-quiz-btn" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-8 rounded-lg transition transform hover:-translate-y-1 shadow-lg uppercase tracking-wider text-sm mt-8">
                    Reiniciar Quiz <i class="fa-solid fa-rotate-right ml-2"></i>
                </button>
            </div>
        </div>
    </main>

    <footer class="border-t border-slate-800 bg-black py-12 text-center relative z-10">
        <div class="flex flex-col items-center justify-center space-y-6">
            <div class="flex items-center gap-3 mb-2">
                <i class="fa-solid fa-face-smile text-pink-600 text-xl"></i>
                <span class="font-serif text-slate-300 text-lg tracking-widest font-bold">CLUBE DA BÍBLIA</span>
            </div>
            <p class="text-slate-700 text-[10px] tracking-widest uppercase mt-4">&copy; 2026 Todos os direitos reservados.</p>
        </div>
    </footer>

    <script>
        const quizData = [
            {
                question: "Qual é um dos temas centrais da Epístola aos Filipenses, frequentemente repetido por Paulo?",
                options: ["Lei e Justiça", "Sofrimento e Redenção", "Alegria e Contentamento", "Profecia e Fim dos Tempos"],
                answer: "Alegria e Contentamento"
            },
            {
                question: "De que local Paulo escreveu a carta aos Filipenses?",
                options: ["De Éfeso", "De Corinto", "De Roma (na prisão)", "De Jerusalém"],
                answer: "De Roma (na prisão)"
            },
            {
                question: "Qual palavra grega é frequentemente traduzida como 'comunhão' ou 'participação' e é importante em Filipenses 1?",
                options: ["Agape", "Koinonia", "Logos", "Sophia"],
                answer: "Koinonia"
            },
            {
                question: "No capítulo 2, Paulo descreve Jesus esvaziando-se de sua glória, um conceito teológico conhecido como...?",
                options: ["Justificação", "Santificação", "Kenosis", "Apoteose"],
                answer: "Kenosis"
            },
            {
                question: "Qual era a atitude que Paulo exortou os filipenses a ter em relação uns aos outros, baseando-se no exemplo de Cristo?",
                options: ["Competição", "Humildade", "Individualismo", "Indiferença"],
                answer: "Humildade"
            },
            {
                question: "Que exemplo máximo de humildade e serviço Paulo apresenta em Filipenses 2:5-8?",
                options: ["Timóteo", "Epafrodito", "O próprio Paulo", "Cristo Jesus"],
                answer: "Cristo Jesus"
            },
            {
                question: "No capítulo 3, Paulo adverte contra confiar em quais coisas para a justiça, considerando-as como 'lixo' (skubala)?",
                options: ["Obras da Lei e méritos pessoais", "A fé em Cristo", "A graça de Deus", "O conhecimento do Evangelho"],
                answer: "Obras da Lei e méritos pessoais"
            },
            {
                question: "Qual é o principal desejo de Paulo em Filipenses 3, em contraste com as coisas mundanas?",
                options: ["Ser o líder da igreja", "Acumular riqueza", "Conhecer a Cristo", "Ter fama entre os gentios"],
                answer: "Conhecer a Cristo"
            },
            {
                question: "No capítulo 4, Paulo aconselha os crentes a não se preocuparem, mas a apresentar suas petições a Deus por meio de quê?",
                options: ["Meditação silenciosa", "Oração e súplica com ações de graças", "Sacrifícios de animais", "Debates teológicos"],
                answer: "Oração e súplica com ações de graças"
            },
            {
                question: "O que Paulo diz que guardará os corações e as mentes dos crentes em Cristo Jesus, quando eles oram sem ansiedade?",
                options: ["A sabedoria humana", "A paz de Deus", "A guarda angelical", "A força de vontade"],
                answer: "A paz de Deus"
            },
            {
                question: "Qual é a instrução de Paulo sobre o que os filipenses deveriam pensar (Filipenses 4:8)?",
                options: ["Nas riquezas futuras", "Em tudo o que é verdadeiro, nobre, correto, puro, amável, de boa fama", "Nos erros passados", "Nos desafios da vida"],
                answer: "Em tudo o que é verdadeiro, nobre, correto, puro, amável, de boa fama"
            },
            {
                question: "Qual é a famosa declaração de Paulo sobre sua capacidade de enfrentar todas as circunstâncias (Filipenses 4:13)?",
                options: ["Tudo me é lícito", "Posso todas as coisas naquele que me fortalece", "A fraqueza é a minha força", "Deus me ajudará, se eu merecer"],
                answer: "Posso todas as coisas naquele que me fortalece"
            },
            {
                question: "Que igreja foi notável por sua generosidade e apoio financeiro a Paulo, conforme mencionado em Filipenses?",
                options: ["A igreja de Tessalônica", "A igreja de Corinto", "A igreja de Filipos", "A igreja de Antioquia"],
                answer: "A igreja de Filipos"
            },
            {
                question: "No capítulo 1, qual é o destino de Paulo que, paradoxalmente, contribui para o avanço do evangelho?",
                options: ["Sua viagem missionária", "Sua prisão", "Seu sucesso financeiro", "Sua liberdade de pregar"],
                answer: "Sua prisão"
            },
            {
                question: "Quem Paulo menciona como seu 'cooperador' e 'concidadão' na obra do Senhor em Filipenses 2:25?",
                options: ["Pedro", "Apolo", "Epafrodito", "Lucas"],
                answer: "Epafrodito"
            }
        ];

        let selectedQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let timeLeft = 0;
        let timerInterval;
        const MAX_TIME_PER_QUESTION = 60; // 60 segundos por pergunta

        const quizIntro = document.getElementById('quiz-intro');
        const quizContainer = document.getElementById('quiz-container');
        const quizResults = document.getElementById('quiz-results');
        const startQuizBtn = document.getElementById('start-quiz-btn');
        const submitAnswerBtn = document.getElementById('submit-answer-btn');
        const nextQuestionBtn = document.getElementById('next-question-btn');
        const restartQuizBtn = document.getElementById('restart-quiz-btn');
        const saveRankingBtn = document.getElementById('save-ranking-btn');
        const playerNameInput = document.getElementById('player-name');

        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const currentQuestionNumber = document.getElementById('current-question-number');
        const totalQuestions = document.getElementById('total-questions');
        const totalQuestionsResults = document.getElementById('total-questions-results');
        const scoreSpan = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');

        startQuizBtn.addEventListener('click', startQuiz);
        submitAnswerBtn.addEventListener('click', checkAnswer);
        nextQuestionBtn.addEventListener('click', loadNextQuestion);
        restartQuizBtn.addEventListener('click', resetQuiz);
        saveRankingBtn.addEventListener('click', saveRanking);

        function startQuiz() {
            quizIntro.classList.add('hidden');
            quizContainer.classList.remove('hidden');
            score = 0;
            currentQuestionIndex = 0;
            
            // Shuffle questions and select 10
            selectedQuestions = quizData.sort(() => 0.5 - Math.random()).slice(0, 10);
            totalQuestions.textContent = selectedQuestions.length;
            totalQuestionsResults.textContent = selectedQuestions.length;
            
            loadQuestion();
        }

        function loadQuestion() {
            resetOptions();
            const question = selectedQuestions[currentQuestionIndex];
            questionText.textContent = question.question;
            currentQuestionNumber.textContent = currentQuestionIndex + 1;

            optionsContainer.innerHTML = '';
            question.options.sort(() => 0.5 - Math.random()).forEach(option => {
                const button = document.createElement('button');
                button.textContent = option;
                button.classList.add('quiz-option', 'w-full', 'p-3', 'rounded-lg', 'text-slate-200', 'text-sm', 'md:text-base', 'focus:outline-none', 'text-left');
                button.addEventListener('click', () => selectOption(button));
                optionsContainer.appendChild(button);
            });

            submitAnswerBtn.classList.remove('hidden');
            nextQuestionBtn.classList.add('hidden');
            startTimer();
        }

        function selectOption(selectedButton) {
            document.querySelectorAll('.quiz-option').forEach(button => {
                button.classList.remove('selected');
            });
            selectedButton.classList.add('selected');
        }

        function checkAnswer() {
            clearInterval(timerInterval);
            const selectedOption = document.querySelector('.quiz-option.selected');
            if (!selectedOption) {
                alert('Por favor, selecione uma resposta!');
                return;
            }

            const correctAnswer = selectedQuestions[currentQuestionIndex].answer;
            
            optionsContainer.querySelectorAll('.quiz-option').forEach(button => {
                button.disabled = true; // Disable all options after submission
                if (button.textContent === correctAnswer) {
                    button.classList.add('correct');
                } else if (button.classList.contains('selected')) {
                    button.classList.add('incorrect');
                }
            });

            if (selectedOption.textContent === correctAnswer) {
                score++;
            }

            submitAnswerBtn.classList.add('hidden');
            nextQuestionBtn.classList.remove('hidden');
        }

        function loadNextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < selectedQuestions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            quizContainer.classList.add('hidden');
            quizResults.classList.remove('hidden');
            scoreSpan.textContent = score;
        }

        function resetQuiz() {
            quizResults.classList.add('hidden');
            quizIntro.classList.remove('hidden');
            playerNameInput.value = ''; // Clear player name
        }

        function resetOptions() {
            optionsContainer.innerHTML = '';
            submitAnswerBtn.classList.remove('hidden');
            nextQuestionBtn.classList.add('hidden');
            document.querySelectorAll('.quiz-option').forEach(button => {
                button.classList.remove('selected', 'correct', 'incorrect');
                button.disabled = false;
            });
        }

        function startTimer() {
            timeLeft = MAX_TIME_PER_QUESTION;
            timerDisplay.textContent = `\u{23F1} 00:${timeLeft.toString().padStart(2, '0')}`;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = `\u{23F1} 00:${timeLeft.toString().padStart(2, '0')}`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    checkAnswer(); // Automatically check answer when time runs out
                }
            }, 1000);
        }

        function saveRanking() {
            const playerName = playerNameInput.value.trim();
            if (!playerName) {
                alert('Por favor, digite seu nome para salvar no ranking.');
                return;
            }

            const formData = new FormData();
            formData.append('acao', 'salvar_quiz_filipenses');
            formData.append('nome', playerName);
            formData.append('pontos', score);

            fetch('api.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.sucesso) {
                    alert('Pontuação salva com sucesso no ranking de Filipenses!');
                    // Optionally, redirect or show ranking table
                } else {
                    alert('Erro ao salvar pontuação: ' + data.mensagem);
                }
            })
            .catch(error => {
                console.error('Erro:', error);
                alert('Erro de conexão ao salvar a pontuação.');
            });
            saveRankingBtn.disabled = true; // Prevent multiple submissions
            saveRankingBtn.textContent = 'Salvo!';
        }

        const canvas = document.getElementById("particles-js");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        const particleColor = "rgba(236, 72, 153, 0.15)"; /* Pink */
        for(let i=0; i<80; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, spcX: Math.random()*0.5-0.25, spcY: Math.random()*0.5-0.25 });
        function animateParticles() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = particleColor;
            particles.forEach(p => { p.x += p.spcX; p.y += p.spcY; if(p.x<0||p.x>canvas.width) p.spcX*=-1; if(p.y<0||p.y>canvas.height) p.spcY*=-1; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
    </script>
</body>
</html>
