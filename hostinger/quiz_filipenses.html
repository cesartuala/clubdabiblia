<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Filipenses | Clube da Bíblia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { serif: ['Cinzel', 'serif'], sans: ['Lato', 'sans-serif'] },
                    colors: { 
                        quiztheme: {
                            500: '#ec4899', /* pink-500 */
                            400: '#f472b6', /* pink-400 */
                            300: '#fda4af', /* rose-300 */
                            800: '#9d174d'  /* rose-800 */
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #050510; color: #e2e8f0; overflow-x: hidden; }
        .glass-card { background: rgba(10, 5, 25, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(236, 72, 153, 0.2); }
        .pink-glow { text-shadow: 0 0 15px rgba(236, 72, 153, 0.5); }
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        .option-button {
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .option-button:hover:not(.selected):not(.correct):not(.incorrect) {
            background-color: rgba(236, 72, 153, 0.1);
            border-color: #ec4899;
            transform: translateY(-2px);
        }
        .option-button.selected {
            border-color: #ec4899;
            background-color: rgba(236, 72, 153, 0.2);
        }
        .option-button.correct {
            background-color: #10b981; /* emerald-500 */
            border-color: #059669; /* emerald-600 */
            color: white;
            animation: pulse-green 0.5s;
        }
        .option-button.incorrect {
            background-color: #ef4444; /* red-500 */
            border-color: #dc2626; /* red-600 */
            color: white;
            animation: shake 0.3s;
        }

        @keyframes pulse-green {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .ranking-item { transition: all 0.3s ease; }
        .ranking-item:hover { transform: translateX(5px); background-color: rgba(236, 72, 153, 0.05); }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050510; }
        ::-webkit-scrollbar-thumb { background: #4a042c; border-radius: 4px; } /* rose-950 */
        ::-webkit-scrollbar-thumb:hover { background: #ec4899; } /* pink-500 */
    </style>
</head>
<body class="font-sans antialiased flex flex-col min-h-screen">

    <canvas id="particles-js"></canvas>

    <nav class="fixed top-0 w-full z-50 p-4 md:p-6 flex flex-col md:flex-row justify-between items-center bg-gradient-to-b from-[#050510]/95 to-[#050510]/80 backdrop-blur-md border-b border-pink-900/40 transition-all">
        <div class="flex items-center gap-4 mb-4 md:mb-0 w-full md:w-auto justify-between md:justify-start">
            <a href="index.html" class="group flex items-center gap-2 px-4 py-2 rounded-lg bg-[#0f0a1a] border border-pink-500/50 text-pink-400 hover:bg-pink-500 hover:text-black transition-all shadow-[0_0_15px_rgba(236,72,153,0.1)]">
                <i class="fa-solid fa-chevron-left text-sm group-hover:-translate-x-1 transition-transform"></i>
                <span class="hidden md:inline text-xs uppercase tracking-widest font-bold">Voltar ao Início</span>
            </a>

            <div class="flex items-center gap-3">
                <i class="fa-solid fa-face-smile text-pink-500 text-xl md:text-2xl"></i>
                <span class="font-serif text-white text-lg md:text-xl tracking-widest font-bold">CLUBE DA BÍBLIA</span>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-4 relative z-10 pt-24 pb-12">
        <div id="quiz-container" class="glass-card rounded-xl p-8 md:p-10 max-w-2xl w-full text-center space-y-6 md:space-y-8 border-pink-500/30 shadow-2xl">
            <h1 class="font-serif text-3xl md:text-4xl text-white pink-glow uppercase tracking-widest mb-4 flex items-center justify-center gap-3">
                <i class="fa-solid fa-trophy text-quiztheme-500"></i>
                Quiz Filipenses
            </h1>
            <p id="quiz-intro" class="text-slate-300 text-base md:text-lg mb-6">Teste seus conhecimentos sobre a Epístola da Alegria!</p>
            <button id="start-button" class="bg-quiztheme-500 hover:bg-quiztheme-800 text-white font-bold py-3 px-8 rounded-lg text-lg uppercase tracking-wider transition transform hover:scale-105 shadow-lg">
                Começar Quiz
            </button>

            <div id="question-area" class="hidden space-y-6">
                <div class="text-left mb-6">
                    <p class="text-quiztheme-400 text-sm uppercase tracking-wide font-bold mb-2">Pergunta <span id="current-question-number">1</span> de <span id="total-questions">10</span></p>
                    <h2 id="question-text" class="font-serif text-xl md:text-2xl text-white leading-relaxed"></h2>
                </div>
                <div id="options-container" class="grid grid-cols-1 gap-4"></div>
                <div id="feedback-area" class="min-h-[40px] text-left text-sm md:text-base"></div>
                <button id="next-button" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-8 rounded-lg text-lg uppercase tracking-wider transition transform hover:scale-105 shadow-md">
                    Próxima Pergunta
                </button>
            </div>

            <div id="results-area" class="hidden space-y-6">
                <h2 class="font-serif text-2xl md:text-3xl text-white pink-glow mb-4">Quiz Concluído!</h2>
                <p class="text-slate-300 text-lg">Sua pontuação final: <strong id="final-score" class="text-quiztheme-400 text-2xl"></strong></p>
                <form id="save-score-form" class="space-y-4 pt-4">
                    <input type="text" id="player-name" placeholder="Seu nome" class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 text-white focus:outline-none focus:border-quiztheme-500" required>
                    <button type="submit" class="w-full bg-quiztheme-500 hover:bg-quiztheme-800 text-white font-bold py-3 px-8 rounded-lg text-lg uppercase tracking-wider transition transform hover:scale-105 shadow-lg">
                        Salvar Pontuação
                    </button>
                </form>
                <div class="mt-8 text-left">
                    <h3 class="font-serif text-xl text-quiztheme-400 border-b border-quiztheme-800 pb-2 mb-4">Ranking Top 5</h3>
                    <ul id="ranking-list" class="space-y-2 text-slate-300">
                        <li class="text-center italic text-slate-500">Carregando ranking...</li>
                    </ul>
                </div>
                <button id="restart-button" class="mt-6 bg-slate-700 hover:bg-slate-600 text-white font-bold py-2 px-6 rounded-lg text-base uppercase tracking-wider transition transform hover:scale-105 shadow-md">
                    Tentar Novamente
                </button>
            </div>
        </div>
    </main>

    <footer class="text-center py-6 text-slate-700 text-[10px] tracking-widest relative z-10 uppercase">
        &copy; 2026 CLUBE DA BÍBLIA - Todos os direitos reservados.
    </footer>

    <script>
        const quizData = [
            {
                question: "Qual o principal tema da Epístola de Filipenses, mencionada mais de 16 vezes por Paulo?",
                options: ["Fé", "Amor", "Alegria", "Esperança"],
                answerIndex: 2,
                explanation: "Filipenses é conhecida como a 'Epístola da Alegria', onde Paulo reitera o regozijo em Cristo, apesar de suas próprias prisões."
            },
            {
                question: "De onde Paulo escreveu a carta aos Filipenses?",
                options: ["Éfeso", "Corinto", "Roma (da prisão)", "Jerusalém"],
                answerIndex: 2,
                explanation: "Filipenses é uma das 'Cartas da Prisão', escrita por Paulo enquanto estava preso em Roma."
            },
            {
                question: "Qual palavra grega significa 'parceria' ou 'comunhão', e é usada em Filipenses 1:5 para descrever a relação dos filipenses com o evangelho?",
                options: ["Agapē", "Koinonia", "Pneuma", "Logos"],
                answerIndex: 1,
                explanation: "<i>Koinonia</i> (κοινωνία) significa comunhão, parceria ou participação, destacando a união dos filipenses na obra do evangelho."
            },
            {
                question: "Qual a famosa declaração de Paulo em Filipenses 1:21 que expressa seu propósito de vida?",
                options: ["Tudo posso naquele que me fortalece.", "O meu poder se aperfeiçoa na fraqueza.", "Para mim o viver é Cristo, e o morrer é lucro.", "Combati o bom combate, terminei a corrida, guardei a fé."],
                answerIndex: 2,
                explanation: "Filipenses 1:21 é uma das declarações mais poderosas de Paulo sobre o propósito de sua vida, centrado inteiramente em Cristo."
            },
            {
                question: "O que Paulo exorta os filipenses a ter em Filipenses 2:5, seguindo o exemplo de Cristo?",
                options: ["O mesmo espírito de guerra", "O mesmo sentimento de alegria", "O mesmo sentimento que houve também em Cristo Jesus", "O mesmo desejo de riquezas"],
                answerIndex: 2,
                explanation: "Em Filipenses 2:5, Paulo os convida a adotar a mesma atitude de humildade e serviço de Jesus."
            },
            {
                question: "O hino cristológico de Filipenses 2:6-11 descreve o 'esvaziamento' de Cristo. Qual o termo grego para esse esvaziamento?",
                options: ["Gnosis", "Kenosis", "Soteria", "Doxa"],
                answerIndex: 1,
                explanation: "<i>Kenosis</i> (κένωσις) descreve o ato de Cristo se despojar de seus privilégios divinos para assumir a forma de servo."
            },
            {
                question: "O que Paulo considerou como 'perda' ou 'esterco' (<i>skubala</i>) por causa da excelência do conhecimento de Cristo (Filipenses 3:7-8)?",
                options: ["Seus sofrimentos", "Seus discípulos", "Seus privilégios judaicos e justiça própria", "Seu apostolado"],
                answerIndex: 2,
                explanation: "Paulo renunciou a todos os seus méritos religiosos e étnicos, considerando-os lixo, para ganhar a justiça que vem de Cristo."
            },
            {
                question: "Qual a palavra grega para 'justiça' em Filipenses 3, que Paulo busca ter em Cristo?",
                options: ["Agape", "Eirene", "Dikaiosyne", "Koinonia"],
                answerIndex: 2,
                explanation: "<i>Dikaiosyne</i> (δικαιοσύνη) é a justiça que vem de Deus pela fé, em contraste com a justiça própria que Paulo tinha pela lei."
            },
            {
                question: "Em Filipenses 4, qual a principal instrução de Paulo para combater a ansiedade?",
                options: ["Trabalhar mais", "Não estar inquietos por coisa alguma, mas orar com ações de graças", "Buscar ajuda médica", "Ignorar os problemas"],
                answerIndex: 1,
                explanation: "Filipenses 4:6-7 instrui a levar todas as preocupações a Deus em oração, resultando na paz que excede todo o entendimento."
            },
            {
                question: "Qual a palavra grega para 'paz' mencionada em Filipenses 4:7, que excede todo entendimento?",
                options: ["Eirene", "Logos", "Philia", "Sophia"],
                answerIndex: 0,
                explanation: "<i>Eirene</i> (εἰρήνη) é a paz de Deus, que é a guardiã dos nossos corações e mentes em Cristo Jesus."
            },
            {
                question: "Qual é o segredo do contentamento de Paulo em todas as circunstâncias, revelado em Filipenses 4:11-13?",
                options: ["Sua grande riqueza", "Sua autossuficiência", "Aprender a viver em toda e qualquer situação, pois tudo pode em Cristo", "A ajuda de seus amigos"],
                answerIndex: 2,
                explanation: "Paulo aprendeu a estar contente em qualquer estado, pois a sua força vem de Cristo (Filipenses 4:13)."
            },
            {
                question: "Qual a palavra grega para 'poder' ou 'força' em Filipenses 4:13 ('Tudo posso naquele que me fortalece')?",
                options: ["Kratos", "Ischys", "Dynamis", "Exousia"],
                answerIndex: 2,
                explanation: "<i>Dynamis</i> (δύναμις) refere-se ao poder ou força inerente de Cristo que capacita o crente."
            },
            {
                question: "Paulo exorta os filipenses a pensar em tudo o que é verdadeiro, respeitável, justo, puro, amável e de boa fama. Onde essa instrução se encontra?",
                options: ["Filipenses 1:9", "Filipenses 2:3", "Filipenses 3:10", "Filipenses 4:8"],
                answerIndex: 3,
                explanation: "Filipenses 4:8 é uma lista de virtudes para a qual os cristãos devem direcionar seus pensamentos."
            },
            {
                question: "Qual foi a atitude de Jesus que Paulo usa como exemplo de humildade e que levou à Sua exaltação?",
                options: ["Ter nascido em uma família real", "Ter realizado muitos milagres", "Ter se humilhado, tornando-se obediente até a morte de cruz", "Ter perdoado a Pedro"],
                answerIndex: 2,
                explanation: "O hino cristológico em Filipenses 2:6-11 detalha a humildade de Cristo, que foi recompensada com Sua exaltação por Deus Pai."
            },
            {
                question: "Filipenses 4:19 afirma que Deus suprirá todas as suas necessidades 'segundo as suas riquezas em glória em Cristo Jesus'. A que se refere essa promessa?",
                options: ["Apenas a necessidades materiais", "A todas as necessidades, materiais e espirituais", "Apenas a necessidades espirituais", "A recompensas futuras no céu"],
                answerIndex: 1,
                explanation: "A promessa abrange todas as necessidades do crente, refletindo a vasta riqueza da glória de Deus em Cristo."
            }
        ];

        let selectedQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        const NUM_QUESTIONS_TO_SHOW = 10;
        const BOOK_NAME = 'filipenses'; // Used for API route and ranking ID

        const quizContainer = document.getElementById('quiz-container');
        const quizIntro = document.getElementById('quiz-intro');
        const startButton = document.getElementById('start-button');
        const questionArea = document.getElementById('question-area');
        const currentQuestionNumber = document.getElementById('current-question-number');
        const totalQuestions = document.getElementById('total-questions');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const feedbackArea = document.getElementById('feedback-area');
        const nextButton = document.getElementById('next-button');
        const resultsArea = document.getElementById('results-area');
        const finalScore = document.getElementById('final-score');
        const saveScoreForm = document.getElementById('save-score-form');
        const playerNameInput = document.getElementById('player-name');
        const rankingList = document.getElementById('ranking-list');
        const restartButton = document.getElementById('restart-button');

        function selectRandomQuestions() {
            const shuffled = [...quizData].sort(() => 0.5 - Math.random());
            selectedQuestions = shuffled.slice(0, NUM_QUESTIONS_TO_SHOW);
            totalQuestions.textContent = NUM_QUESTIONS_TO_SHOW;
        }

        function startQuiz() {
            selectRandomQuestions();
            currentQuestionIndex = 0;
            score = 0;
            quizIntro.classList.add('hidden');
            startButton.classList.add('hidden');
            resultsArea.classList.add('hidden');
            questionArea.classList.remove('hidden');
            nextButton.textContent = 'Próxima Pergunta';
            displayQuestion();
        }

        function displayQuestion() {
            feedbackArea.innerHTML = '';
            nextButton.disabled = true;
            nextButton.classList.remove('bg-quiztheme-500', 'hover:bg-quiztheme-800');
            nextButton.classList.add('bg-slate-700', 'hover:bg-slate-600');

            const question = selectedQuestions[currentQuestionIndex];
            currentQuestionNumber.textContent = currentQuestionIndex + 1;
            questionText.innerHTML = question.question;
            optionsContainer.innerHTML = '';

            question.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.classList.add('option-button', 'bg-slate-900/60', 'text-white', 'p-3', 'rounded-lg', 'text-base', 'md:text-lg', 'text-left');
                button.textContent = option;
                button.onclick = () => selectOption(index, button);
                optionsContainer.appendChild(button);
            });
        }

        let selectedOptionIndex = null;

        function selectOption(index, button) {
            // Only allow selection if not already answered
            if (selectedOptionIndex === null) {
                selectedOptionIndex = index;
                const buttons = optionsContainer.querySelectorAll('.option-button');
                buttons.forEach(btn => btn.classList.remove('selected'));
                button.classList.add('selected');
                
                nextButton.disabled = false;
                nextButton.classList.remove('bg-slate-700', 'hover:bg-slate-600');
                nextButton.classList.add('bg-quiztheme-500', 'hover:bg-quiztheme-800');
            }
        }

        function checkAnswer() {
            const question = selectedQuestions[currentQuestionIndex];
            const buttons = optionsContainer.querySelectorAll('.option-button');

            if (selectedOptionIndex === null) {
                feedbackArea.innerHTML = '<span class="text-red-400"><i class="fa-solid fa-circle-exclamation mr-2"></i>Por favor, selecione uma opção.</span>';
                return;
            }

            buttons.forEach((btn, idx) => {
                btn.disabled = true; // Disable all options after selection
                if (idx === question.answerIndex) {
                    btn.classList.add('correct');
                } else if (idx === selectedOptionIndex) {
                    btn.classList.add('incorrect');
                }
            });

            if (selectedOptionIndex === question.answerIndex) {
                score += 10; // Each correct answer gives 10 points
                feedbackArea.innerHTML = `<span class="text-emerald-400"><i class="fa-solid fa-check-circle mr-2"></i>Correto!</span> <br> <span class="text-slate-400">${question.explanation}</span>`;
            } else {
                feedbackArea.innerHTML = `<span class="text-red-400"><i class="fa-solid fa-times-circle mr-2"></i>Incorreto.</span> A resposta correta era: <strong class="text-emerald-400">${question.options[question.answerIndex]}</strong>. <br> <span class="text-slate-400">${question.explanation}</span>`;
            }
            selectedOptionIndex = -1; // Reset for next question
        }

        function nextQuestion() {
            if (selectedOptionIndex !== -1) { // Means an answer was checked
                currentQuestionIndex++;
                selectedOptionIndex = null; // Reset for next question
                if (currentQuestionIndex < NUM_QUESTIONS_TO_SHOW) {
                    displayQuestion();
                } else {
                    showResults();
                }
            } else {
                feedbackArea.innerHTML = '<span class="text-red-400"><i class="fa-solid fa-circle-exclamation mr-2"></i>Você precisa ver a resposta antes de prosseguir.</span>';
            }
        }

        function showResults() {
            questionArea.classList.add('hidden');
            resultsArea.classList.remove('hidden');
            finalScore.textContent = `${score} pontos`;
            loadRanking();
        }

        function loadRanking() {
            rankingList.innerHTML = '<li class="text-center italic text-slate-500">Carregando ranking...</li>';
            fetch(`api.php?acao=ranking_${BOOK_NAME}`)
                .then(res => res.json())
                .then(data => {
                    rankingList.innerHTML = '';
                    if (data.length === 0) {
                        rankingList.innerHTML = '<li class="text-center italic text-slate-500 py-4">Nenhum ranking ainda. Seja o primeiro!</li>';
                        return;
                    }
                    data.slice(0, 5).forEach((item, index) => { // Display only top 5
                        rankingList.innerHTML += `
                            <li class="flex justify-between items-center bg-slate-800/50 p-2 rounded-lg ranking-item">
                                <span class="font-bold text-quiztheme-400">${index + 1}º</span>
                                <span class="flex-grow text-left ml-4">${item.nome}</span>
                                <span class="font-mono text-white font-bold">${item.pontos}</span>
                            </li>
                        `;
                    });
                })
                .catch(err => {
                    console.error('Erro ao carregar ranking:', err);
                    rankingList.innerHTML = '<li class="text-center italic text-red-400">Erro ao carregar ranking.</li>';
                });
        }

        function saveScore(event) {
            event.preventDefault();
            const playerName = playerNameInput.value.trim();
            if (!playerName) {
                alert('Por favor, insira seu nome!');
                return;
            }

            const formData = new FormData();
            formData.append('acao', `salvar_quiz_${BOOK_NAME}`);
            formData.append('nome', playerName);
            formData.append('pontos', score);

            fetch('api.php', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.sucesso) {
                    alert('Pontuação salva com sucesso!');
                    loadRanking(); // Reload ranking to show new score
                    saveScoreForm.classList.add('hidden'); // Hide form after saving
                } else {
                    alert('Erro ao salvar pontuação: ' + data.mensagem);
                }
            })
            .catch(err => {
                alert('Erro de conexão ao salvar pontuação.');
                console.error('Erro:', err);
            });
        }

        function restartQuiz() {
            quizIntro.classList.remove('hidden');
            startButton.classList.remove('hidden');
            resultsArea.classList.add('hidden');
            saveScoreForm.classList.remove('hidden'); // Show form again for new attempt
            playerNameInput.value = '';
            selectedQuestions = [];
            currentQuestionIndex = 0;
            score = 0;
            selectedOptionIndex = null;
        }

        startButton.addEventListener('click', startQuiz);
        nextButton.addEventListener('click', () => {
            if (selectedOptionIndex === null) { // If option not selected yet, first click will check answer
                checkAnswer();
                if (currentQuestionIndex === NUM_QUESTIONS_TO_SHOW - 1) {
                    nextButton.textContent = 'Ver Resultados';
                }
            } else { // Second click will move to next question
                nextQuestion();
            }
        });
        saveScoreForm.addEventListener('submit', saveScore);
        restartButton.addEventListener('click', restartQuiz);

        // Particles.js setup
        const canvas = document.getElementById("particles-js");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        const particleColor = "rgba(236, 72, 153, 0.1)"; // pink-500 with 0.1 alpha
        for(let i=0; i<80; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, spcX: Math.random()*0.5-0.25, spcY: Math.random()*0.5-0.25 });
        function animateParticles() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = particleColor;
            particles.forEach(p => { p.x += p.spcX; p.y += p.spcY; if(p.x<0||p.x>canvas.width) p.spcX*=-1; if(p.y<0||p.y>canvas.height) p.spcY*=-1; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
    </script>
</body>
</html>
