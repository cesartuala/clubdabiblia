<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Filipenses | Clube da Bíblia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { serif: ['Cinzel', 'serif'], sans: ['Lato', 'sans-serif'] }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #050510; color: #e2e8f0; overflow-x: hidden; }
        .glass-card { background: rgba(35, 15, 25, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(236, 72, 153, 0.2); transition: all 0.4s ease; }
        .pink-glow { text-shadow: 0 0 15px rgba(236, 72, 153, 0.5); }
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        .option-btn { transition: all 0.3s ease; }
        .option-btn:hover:not(:disabled) { transform: translateX(5px); background-color: rgba(236, 72, 153, 0.15); border-color: #ec4899; }
        .option-correct { background-color: rgba(16, 185, 129, 0.2) !important; border-color: #10b981 !important; color: #34d399 !important; }
        .option-wrong { background-color: rgba(239, 68, 68, 0.2) !important; border-color: #ef4444 !important; color: #f87171 !important; }
    </style>
</head>
<body class="font-sans antialiased flex flex-col min-h-screen">

    <canvas id="particles-js"></canvas>

    <nav class="w-full z-50 p-6 flex justify-between items-center relative">
        <a href="index.html" class="group flex items-center gap-2 px-4 py-2 rounded-lg bg-[#1a0a10] border border-pink-500/50 text-pink-400 hover:bg-pink-500 hover:text-black transition-all">
            <i class="fa-solid fa-chevron-left text-sm group-hover:-translate-x-1 transition-transform"></i>
            <span class="hidden md:inline text-xs uppercase tracking-widest font-bold">Voltar ao Início</span>
        </a>
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-face-smile text-pink-500 text-xl"></i>
            <span class="font-serif text-white text-lg tracking-widest font-bold">CLUBE DA BÍBLIA</span>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-4 relative z-10 w-full max-w-3xl mx-auto">
        <div class="glass-card rounded-2xl w-full flex flex-col relative overflow-hidden shadow-[0_0_40px_rgba(236,72,153,0.15)]">
            <div class="h-1 w-full bg-gradient-to-r from-pink-600 via-rose-500 to-fuchsia-500" id="progressBar"></div>
            
            <div class="p-6 md:p-10 flex flex-col">
                <div class="flex justify-between items-center mb-6 border-b border-pink-500/20 pb-4">
                    <h1 class="font-serif text-2xl md:text-3xl text-white pink-glow">Quiz: Filipenses</h1>
                    <span id="questionCounter" class="bg-pink-900/50 text-pink-300 px-3 py-1 rounded-full text-xs font-bold tracking-widest border border-pink-500/30">1 / 10</span>
                </div>

                <div id="quizContainer">
                    <div id="questionText" class="text-lg md:text-xl text-slate-200 mb-6 font-light leading-relaxed"></div>
                    <div id="optionsContainer" class="space-y-3"></div>
                    <div id="feedbackContainer" class="mt-6 p-4 rounded-lg hidden text-sm leading-relaxed border"></div>

                    <button id="nextBtn" class="mt-8 w-full bg-pink-600 hover:bg-pink-500 text-white font-bold py-3 rounded-lg transition uppercase tracking-widest hidden shadow-lg shadow-pink-900/50">
                        Próxima Pergunta <i class="fa-solid fa-arrow-right ml-2"></i>
                    </button>
                </div>

                <div id="resultContainer" class="hidden flex-col items-center text-center py-8">
                    <i class="fa-solid fa-crown text-6xl text-pink-400 mb-4 drop-shadow-[0_0_15px_rgba(236,72,153,0.6)]"></i>
                    <h2 class="font-serif text-3xl text-white mb-2">Vitória em Cristo!</h2>
                    <p class="text-slate-300 text-lg mb-6">Você acertou <span id="finalScore" class="text-pink-400 font-bold text-2xl">0</span> de 10 perguntas.</p>
                    
                    <div class="w-full max-w-sm bg-slate-900/80 p-6 rounded-xl border border-slate-700">
                        <h3 class="text-xs uppercase tracking-widest text-pink-400 mb-4 font-bold">Salvar no Ranking</h3>
                        <form id="rankingForm" class="space-y-4">
                            <input type="hidden" name="acao" value="salvar_quiz_filipenses">
                            <input type="hidden" name="pontos" id="inputPontos" value="0">
                            <input type="hidden" name="acertos" id="inputAcertos" value="0">
                            <input type="text" name="nome" required placeholder="Seu Nome..." class="w-full bg-slate-800 border border-slate-600 rounded px-4 py-2 text-white focus:border-pink-500 focus:outline-none transition text-sm">
                            <button type="submit" class="w-full bg-gradient-to-r from-pink-600 to-rose-500 text-white font-bold py-2 rounded transition uppercase tracking-widest text-xs shadow-lg">Enviar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Data format base: quiz_efesios.html with 15 questions, sorted randomly giving 10.
        const quizDataFull = [
            {
                q: "Qual é o tema principal da Epístola aos Filipenses?",
                options: [
                    { t: "A justificação pela fé", c: false, r: "Isso é mais forte em Romanos e Gálatas." },
                    { t: "A alegria em Cristo, mesmo em meio ao sofrimento", c: true, r: "Alegria (chara) e o verbo regozijar (chairo) aparecem inúmeras vezes." },
                    { t: "A lei e a graça", c: false, r: "Paulo fala disso, mas não é o tema predominante." },
                    { t: "A organização da igreja", c: false, r: "Cartas como Timóteo tratam disso." }
                ]
            },
            {
                q: "Em que situação Paulo estava ao escrever a carta aos Filipenses?",
                options: [
                    { t: "Em uma viagem missionária", c: false, r: "Ele estava com o ir e vir limitado." },
                    { t: "Em liberdade, descansando", c: false, r: "Ele não estava descansando." },
                    { t: "Preso em Roma", c: true, r: "Filipenses faz parte das famosas 'Cartas da Prisão'." },
                    { t: "Em sua casa em Tarso", c: false, r: "Ele estava detido na capital do império." }
                ]
            },
            {
                q: "Qual termo grego é frequentemente usado na teologia para descrever o 'esvaziamento' de Cristo em Filipenses 2?",
                options: [
                    { t: "Agape", c: false, r: "Agape significa amor incondicional." },
                    { t: "Koinonia", c: false, r: "Koinonia significa comunhão." },
                    { t: "Kenosis", c: true, r: "Do verbo kenoö, 'Ele esvaziou-se a Si mesmo' abrindo mão de Sua glória." },
                    { t: "Dikaiosyne", c: false, r: "Significa justiça." }
                ]
            },
            {
                q: "O que Paulo exorta os filipenses a ter em comum, imitando a Cristo (Fp 2:5)?",
                options: [
                    { t: "A mesma riqueza material", c: false, r: "Não é sobre possessões materiais." },
                    { t: "O mesmo cargo na igreja", c: false, r: "Existem dons diferentes na Igreja." },
                    { t: "O mesmo sentimento (mente)", c: true, r: "'De sorte que haja em vós o mesmo sentimento (ou atitude) que houve também em Cristo Jesus'." },
                    { t: "O mesmo nível de conhecimento", c: false, r: "O dom do ensino não era para todos." }
                ]
            },
            {
                q: "Qual o nome do companheiro de Paulo que estava doente e foi enviado de volta à Filipos com a carta?",
                options: [
                    { t: "Timóteo", c: false, r: "Timóteo estava com Paulo, mas não esteve quase à morte." },
                    { t: "Lucas", c: false, r: "Lucas era o médico amado." },
                    { t: "Epafrodito", c: true, r: "Epafrodito quase morreu pela obra de Cristo, mas Deus teve misericórdia." },
                    { t: "Silas", c: false, r: "Silas foi companheiro em Filipos no passado (em Atos)." }
                ]
            },
            {
                q: "No capítulo 4, quais duas mulheres Paulo exorta a ter 'o mesmo sentir no Senhor'?",
                options: [
                    { t: "Maria e Marta", c: false, r: "Eram irmãs de Lázaro nos Evangelhos." },
                    { t: "Priscila e Áquila", c: false, r: "Amigos de Paulo mencionados em outras cartas. Áquila era homem." },
                    { t: "Euódia e Síntique", c: true, r: "Eram líderes cristãs que estavam em desentendimento." },
                    { t: "Lídia e Febe", c: false, r: "Lídia foi a primeira convertida em Filipos (Atos)." }
                ]
            },
            {
                q: "O que Paulo considera como 'esterco' (skubala) no capítulo 3, em comparação com Cristo?",
                options: [
                    { t: "A religião judaica de forma geral", c: false, r: "Ele ainda ama seu povo, referia-se aos próprios méritos." },
                    { t: "Suas credenciais farisaicas e justificação própria", c: true, r: "Seu status de 'hebreu de hebreus', circuncidado ao oitavo dia." },
                    { t: "Os dons espirituais", c: false, r: "Paulo exorta a buscar os melhores dons." },
                    { t: "Seus inimigos em Filipos", c: false, r: "Ele manda orar pelos inimigos." }
                ]
            },
            {
                q: "Qual promessa de Deus está em Filipenses 4:7 para aqueles que oram sem ansiedade?",
                options: [
                    { t: "A certeza da prosperidade", c: false, r: "Deus não promete a ausência de lutas." },
                    { t: "A libertação imediata de Roma", c: false, r: "Paulo continuou preso." },
                    { t: "A paz de Deus que excede todo o entendimento", c: true, r: "Essa paz guarda nossos corações e mentes em Cristo." },
                    { t: "A remoção de todos os problemas", c: false, r: "A paz atua apesar dos problemas." }
                ]
            },
            {
                q: "Qual a atitude sincera de Paulo sobre viver ou morrer, conforme Filipenses 1:21?",
                options: [
                    { t: "Viver é Cristo, morrer é ganho", c: true, r: "Se viver ele serve, e se morrer, estará com o Mestre." },
                    { t: "Viver é sofrer, morrer é descansar", c: false, r: "Essa é uma filosofia budista, não paulina." },
                    { t: "Viver é difícil, morrer é libertação", c: false, r: "Viver para ele era um privilégio de frutificar." },
                    { t: "Temer a morte a todo custo", c: false, r: "Ele ansiava por estar com Cristo." }
                ]
            },
            {
                q: "O que Paulo instrui os filipenses a fazerem em relação à sua salvação em Filipenses 2:12?",
                options: [
                    { t: "Tentar ganhá-la por obras", c: false, r: "Isso contradiz o ensino da Graça." },
                    { t: "Guardar o segredo até a morte", c: false, r: "Evangelho significa boas novas." },
                    { t: "Desenvolver com temor e tremor", c: true, r: "É sobre a santificação diária da salvação que já recebemos." },
                    { t: "Depender exclusivamente da presença de Paulo", c: false, r: "Ao contrário, ele os mandava fazer isso na ausência dele." }
                ]
            },
            {
                q: "Em qual contexto primário Paulo declara 'Posso todas as coisas naquele que me fortalece' (4:13)?",
                options: [
                    { t: "Ao falar que Deus lhe daria superpoderes", c: false, r: "Paulo era limitado em carne." },
                    { t: "No contexto de saber viver na abundância ou passar necessidade", c: true, r: "Ele se refere à força divina para lidar com as circunstâncias da vida." },
                    { t: "Ao ordenar a expulsão de demônios", c: false, r: "Não, isso é uma declaração pessoal de contentamento." },
                    { t: "Para motivar uma rebelião em Roma", c: false, r: "O Reino de Cristo não era daquele mundo." }
                ]
            },
            {
                q: "Qual a instrução direta de Paulo sobre a ansiedade em Filipenses 4:6?",
                options: [
                    { t: "Não andeis ansiosos de coisa alguma", c: true, r: "Recomenda apresentar as petições diante de Deus pela oração e com ações de graças." },
                    { t: "Sejam ansiosos pelo amanhã, pois é incerto", c: false, r: "Jesus falou o oposto." },
                    { t: "Tome atitudes impulsivas quando tiver ansiedade", c: false, r: "Ele pede que recorramos a Deus." },
                    { t: "Ignore os problemas fingindo que não existem", c: false, r: "O cristão encara os problemas com os joelhos dobrados." }
                ]
            },
            {
                q: "A quem Paulo duramente se refere com os termos 'cães' e 'maus obreiros' no capítulo 3?",
                options: [
                    { t: "Aos soldados romanos cruéis", c: false, r: "Ele respeitava as autoridades instituídas." },
                    { t: "Aos imperadores que perseguiam a Igreja", c: false, r: "Sua oposição espiritual era interna." },
                    { t: "Aos fariseus judaizantes", c: true, r: "Pessoas que queriam obrigar os gentios a viverem pelas leis judaicas, mutilando-se (circuncisão física)." },
                    { t: "Aos cristãos fracos de fé", c: false, r: "Paulo era compassivo com os mais fracos." }
                ]
            },
            {
                q: "Qual foi o diferencial carinhoso da igreja em Filipos na vida missionária de Paulo (cp 4)?",
                options: [
                    { t: "Foi a única igreja a enviar suprimento financeiro constante a ele.", c: true, r: "'nenhuma outra igreja associou-se comigo no tocante a dar e receber, senão unicamente vós'." },
                    { t: "Eram as pessoas que ele convertia por magia.", c: false, r: "Não o faziam." },
                    { t: "Fizeram uma estátua real dele na Macedônia.", c: false, r: "Ídolos eram intoleráveis nas igrejas originais." },
                    { t: "Era a igreja base de onde ele saiu nas 3 viagens.", c: false, r: "A igreja base dele foi a cidade de Antioquia." }
                ]
            },
            {
                q: "O que Paulo recomenda que os filipenses meditem/pensem em Filipenses 4:8?",
                options: [
                    { t: "Exclusivamente nas dores das cruzes futuras", c: false, r: "Ele pede foco em virtudes." },
                    { t: "Em táticas de fuga dos perseguidores", c: false, r: "Cristãos originais preferiam enfrentar a dor glorificando a Deus." },
                    { t: "Em tudo o que é verdadeiro, respeitável, justo e puro", c: true, r: "Esta é a lista do filtro mental do crente genuíno." },
                    { t: "Sobre os erros dos falsos mestres o dia todo", c: false, r: "Devemos ocupar nossa mente com a Glória de Deus e daquilo que O agrada." }
                ]
            }
        ];

        // Shuffle questions and pick 10
        const shuffled = quizDataFull.sort(() => 0.5 - Math.random());
        const quizData = shuffled.slice(0, 10);

        let currentQ = 0; let score = 0; let answered = false;
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const feedbackContainer = document.getElementById('feedbackContainer');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');

        function loadQuestion() {
            answered = false; feedbackContainer.classList.add('hidden'); nextBtn.classList.add('hidden');
            const qData = quizData[currentQ];
            document.getElementById('questionCounter').innerText = `${currentQ + 1} / ${quizData.length}`;
            questionText.innerText = qData.q;
            optionsContainer.innerHTML = '';
            qData.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left p-4 rounded-lg bg-slate-800/80 border border-slate-600 text-slate-300 text-sm md:text-base';
                btn.innerText = opt.t;
                btn.onclick = () => selectOption(btn, opt);
                optionsContainer.appendChild(btn);
            });
            progressBar.style.width = `${(currentQ / quizData.length) * 100}%`;
        }

        function selectOption(btn, opt) {
            if (answered) return; answered = true;
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);
            
            feedbackContainer.classList.remove('hidden', 'bg-red-900/30', 'border-red-500/50', 'bg-green-900/30', 'border-green-500/50');
            if (opt.c) {
                score += 10; btn.classList.add('option-correct');
                feedbackContainer.classList.add('bg-green-900/30', 'border-green-500/50', 'text-green-200');
                feedbackContainer.innerHTML = `<strong>Correto!</strong> ${opt.r}`;
            } else {
                btn.classList.add('option-wrong');
                feedbackContainer.classList.add('bg-red-900/30', 'border-red-500/50', 'text-red-200');
                feedbackContainer.innerHTML = `<strong>Incorreto.</strong> ${opt.r}`;
                buttons.forEach((b, i) => { if(quizData[currentQ].options[i].c) b.classList.add('option-correct'); });
            }
            nextBtn.classList.remove('hidden');
        }

        nextBtn.onclick = () => {
            currentQ++;
            if (currentQ < quizData.length) loadQuestion();
            else showResults();
        };

        function showResults() {
            progressBar.style.width = '100%';
            document.getElementById('quizContainer').classList.add('hidden');
            const res = document.getElementById('resultContainer');
            res.classList.remove('hidden'); res.classList.add('flex');
            document.getElementById('finalScore').innerText = score/10;
            document.getElementById('inputPontos').value = score;
            document.getElementById('inputAcertos').value = score/10;
        }

        document.getElementById('rankingForm').onsubmit = function(e) {
            e.preventDefault();
            const btn = this.querySelector('button'); btn.disabled = true; btn.innerText = "Salvando...";
            fetch('api.php', { method: 'POST', body: new FormData(this) })
            .then(() => window.location.href = 'index.html');
        };

        // Particles
        const canvas = document.getElementById("particles-js");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        for(let i=0; i<50; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, sx: Math.random()*0.5-0.25, sy: Math.random()*0.5-0.25 });
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(236, 72, 153, 0.2)"; // pink-500
            particles.forEach(p => { p.x+=p.sx; p.y+=p.sy; if(p.x<0||p.x>canvas.width)p.sx*=-1; if(p.y<0||p.y>canvas.height)p.sy*=-1; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); });
            requestAnimationFrame(animate);
        }
        animate();
        loadQuestion();
    </script>
</body>
</html>
