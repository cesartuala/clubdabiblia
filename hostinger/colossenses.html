    <script>
        const bibleData = {
            "intro_book": {
                title: "A CARTA AOS COLOSSENSES",
                date: null,
                desc: "<span class='text-xs uppercase tracking-[0.3em] text-teal-400 not-italic block mb-4'>Introdução: Sobre o Livro</span>\"A supremacia de Cristo sobre todas as coisas e a plenitude da vida cristã Nele.\"",
                blocks: [
                    {
                        title: "A Supremacia do Cristo Cósmico",
                        verse: "Ele é a imagem do Deus invisível, o primogênito de toda a criação; porque nele foram criadas todas as coisas. (Cl 1:15-16)",
                        exegesis: `
                            <h3>1. A Importância de Colossenses</h3>
                            <ul>
                                <li>Colossenses é uma carta notável de Paulo, escrita para uma igreja que ele nunca havia visitado pessoalmente, fundada por seu colaborador Epafras. Diferentemente de outras epístolas que corrigiam desordens morais ou doutrinárias amplas, Colossenses confronta uma heresia peculiar, um sincretismo perigoso que mesclava elementos do judaísmo (legalismo), filosofias gregas (gnosticismo embrionário, ascetismo) e misticismo oriental (adoração de anjos). Em essência, os falsos mestres estavam diminuindo a pessoa e a obra de Cristo.</li>
                            </ul>
                            
                            <h3>2. O Cristo Tudo em Todos</h3>
                            <ul>
                                <li>A resposta de Paulo é enfática e gloriosa: Jesus Cristo é absolutamente suficiente. Ele é superior a qualquer anjo, filosofia ou rito. O tema central é a <strong>supremacia de Cristo</strong> sobre toda a criação e Sua total suficiência para a salvação e a vida cristã. Tudo o que necessitamos está "nele". Esta carta eleva Cristo ao Seu devido lugar como o Criador, Sustentador e Redentor de todo o universo.</li>
                            </ul>

                            <h3>3. A Plenitude (Pleroma) em Cristo</h3>
                            <ul>
                                <li>A palavra <q>plenitude</q> (<i>pleroma - πλήρωμα - totalidade, completude</i>) é crucial em Colossenses. Paulo ensina que "nele habita corporalmente toda a plenitude da divindade" (Cl 2:9). Isso contraria diretamente as ideias gnósticas que viam Deus como distante e mediado por vários "eons" ou seres angelicais. Para Paulo, Cristo é o próprio Deus, e em Sua pessoa, tudo o que precisamos para nos relacionar com Deus foi completamente revelado e realizado. Não precisamos de nada "extra" para completar a nossa fé.</li>
                            </ul>
                        `
                    }
                ]
            },
            "intro_author": {
                title: "SOBRE O AUTOR",
                date: null,
                desc: "\"Paulo, apóstolo de Jesus Cristo, pela vontade de Deus...\"",
                blocks: [
                    {
                        title: "O Prisioneiro e a Igreja sob Pressão",
                        verse: "Por causa disto também eu, ouvindo a vossa fé em Cristo Jesus, e o amor que tendes para com todos os santos... (Cl 1:4)",
                        exegesis: `
                            <h3>1. Escrita das Correntes</h3>
                            <ul>
                                <li>Colossenses é uma das "Cartas da Prisão" (junto com Efésios, Filipenses e Filemom), escrita por Paulo por volta de 60-62 d.C. enquanto estava sob prisão domiciliar em Roma. Apesar de suas circunstâncias restritivas, Paulo demonstra uma visão expansiva e uma paixão inabalável pela glória de Cristo. Ele não estava limitado por suas correntes, mas via a sua situação como uma oportunidade para avançar o Evangelho.</li>
                            </ul>

                            <h3>2. O Contato Através de Epafras</h3>
                            <ul>
                                <li>Paulo tinha um profundo interesse pela igreja de Colossenses, mesmo não tendo visitado a cidade. Ele recebeu relatórios sobre a fé e o amor dos crentes através de Epafras, o evangelista que provavelmente levou o evangelho à região de Colossos, Laodicéia e Hierápolis. Epafras não era apenas um mensageiro, mas um "fiel ministro de Cristo" (Cl 1:7) e um intercessor dedicado por essas igrejas (Cl 4:12), trazendo a Paulo as notícias e as preocupações, incluindo as heresias que estavam se infiltrando.</li>
                            </ul>

                            <h3>3. A Resposta Pastoral e Apologética</h3>
                            <ul>
                                <li>A preocupação de Paulo não era meramente acadêmica; era pastoral. Ele estava profundamente preocupado que os colossenses fossem "feitos em presa" por filosofias vazias e enganosas (Cl 2:8). Sua carta, portanto, é uma defesa vigorosa da centralidade e suficiência de Cristo, desmantelando as falsas doutrinas com uma teologia elevada e uma exortação prática. Ele reitera que em Cristo, e somente em Cristo, reside a totalidade do plano redentor de Deus.</li>
                            </ul>
                        `
                    }
                ]
            },
            "colossenses_1": {
                title: "O CRISTO SUPREMO E A RECONCILIAÇÃO",
                date: "15/04 (Segunda)",
                desc: "\"Ele é a imagem do Deus invisível, o primogênito de toda a criação.\"",
                blocks: [
                    {
                        title: "A Majestade de Cristo e o Evangelho Cósmico",
                        verse: "Porque aprouve a Deus que nele habitasse toda a plenitude, e que, havendo por ele feito a paz pelo sangue da sua cruz, por meio dele reconciliasse consigo mesmo todas as coisas. (Cl 1:19-20)",
                        exegesis: `
                            <h3>1. Contexto e Exegese: A Oração e o Hino a Cristo</h3>
                            <ul>
                                <li>Paulo inicia a carta com uma oração de ação de graças pela fé e amor dos Colossenses, e intercede para que eles cresçam em conhecimento e sabedoria espiritual. A partir do v.15, ele explode em um hino cristológico que é um dos pontos altos da teologia paulina. Este trecho é uma resposta direta às heresias que diminuíam a pessoa de Cristo. Paulo declara a <strong>preeminência de Cristo</strong> tanto na Criação quanto na Redenção. Ele é a própria "imagem" (<i>eikon - εἰκών - representação exata</i>) do Deus invisível, não uma criatura. O termo "primogênito" (<i>prototokos - πρωτότοκος - preeminente, primário em status, não em nascimento temporal</i>) refere-se à Sua soberania sobre a criação, não que Ele tenha sido a primeira criatura. Nele e por Ele, tudo foi criado e subsiste.</li>
                            </ul>
                            
                            <h3>2. Análise Teológica: A Plenitude e a Reconciliação</h3>
                            <ul>
                                <li>A doutrina central deste capítulo é que em Cristo "habita toda a plenitude" (<i>pleroma - πλήρωμα - totalidade</i>) da divindade. Isso significa que não há deficiência em Jesus; Ele é plenamente Deus. Sua morte na cruz não foi apenas um evento terreno, mas teve implicações cósmicas: Ele "reconciliou consigo mesmo todas as coisas" (Cl 1:20). A reconciliação, que antes se pensava ser apenas entre Deus e a humanidade, é expandida para abranger "todas as coisas, tanto as que estão na terra como as que estão nos céus". Cristo é o reconciliador universal, restaurando a harmonia desfeita pelo pecado em toda a criação.</li>
                            </ul>

                            <h3>3. Aplicação Prática: A Centralidade de Cristo Hoje</h3>
                            <ul>
                                <li>Para nós hoje, a mensagem de Colossenses 1 é um poderoso lembrete da total suficiência de Cristo. Se Ele é o Criador e Sustentador de tudo, e o Reconciliador de todas as coisas, então não há área da nossa vida que esteja fora de Seu domínio ou de Seu cuidado. Não precisamos buscar sabedoria em filosofias humanas, nem segurança em rituais vazios, nem poder em misticismos. Nossa fé deve estar centrada exclusivamente em Cristo, o qual nos apresentou irrepreensíveis e santos diante de Deus (Cl 1:22). A nossa esperança está fundamentada Nele, e nossa vida deve refletir Sua glória.</li>
                            </ul>
                        `
                    }
                ]
            },
            "colossenses_2": {
                title: "PLENITUDE EM CRISTO E A LIBERDADE CRISTÃ",
                date: "16/04 (Terça)",
                desc: "\"Porque nele habita corporalmente toda a plenitude da divindade; e estais perfeitos nele.\"",
                blocks: [
                    {
                        title: "Contra as Filosofias Vazias e as Sombras",
                        verse: "Tende cuidado, para que ninguém vos faça presa sua, por meio de filosofias e vãs subtilezas, segundo a tradição dos homens, segundo os rudimentos do mundo, e não segundo Cristo. (Cl 2:8)",
                        exegesis: `
                            <h3>1. Contexto e Exegese: Advertência Contra a Heresia</h3>
                            <ul>
                                <li>Paulo expressa sua luta por Colossenses para que não sejam enganados por argumentos persuasivos. O capítulo 2 é o cerne apologético da carta, onde Paulo ataca diretamente a falsa doutrina que se infiltrara na igreja. Ele adverte contra as "filosofias e vãs subtilezas" que não procedem de Cristo. Essas filosofias incluíam o legalismo judaico (dietas, festas, sábados - "sombras das coisas futuras"), o ascetismo (autopunição do corpo), o misticismo (adoração de anjos, visões), e uma falsa humildade. A essência dessas heresias era que Cristo não era suficiente, e que algo mais era necessário para a "plenitude" espiritual.</li>
                            </ul>
                            
                            <h3>2. Análise Teológica: Completude em Cristo e o Triunfo da Cruz</h3>
                            <ul>
                                <li>Paulo responde a essas heresias declarando: "Nele habita corporalmente toda a plenitude da divindade; e estais perfeitos nele" (Cl 2:9-10). O termo "rudimentos do mundo" (<i>stoicheia - στοιχεῖα - elementos básicos ou princípios elementares do mundo</i>) refere-se a essas práticas religiosas e filosóficas vazias, que na verdade eram espiritualmente impotentes. Em Cristo, os crentes foram "circuncidados com a circuncisão de Cristo", um ato espiritual que envolve o "despojar do corpo dos pecados da carne", não um ritual físico (Cl 2:11). Pelo batismo e pela fé, fomos sepultados e ressuscitados com Ele. A cruz de Cristo cancelou a "cédula que era contra nós" (a lei que nos condenava), pregando-a na cruz (Cl 2:14). Com isso, Deus "despojou os principados e potestades, e os expôs publicamente, triunfando deles na cruz" (Cl 2:15). A vitória de Cristo sobre as forças espirituais malignas é absoluta.</li>
                            </ul>

                            <h3>3. Aplicação Prática: Viver na Liberdade do Evangelho</h3>
                            <ul>
                                <li>A mensagem de Colossenses 2 é de profunda liberdade. Não devemos permitir que ninguém nos julgue por questões de comida, bebida, festivais ou sábados, pois "estas coisas são sombra das coisas futuras; a realidade, porém, é Cristo" (Cl 2:16-17). Somos livres de regras feitas por homens que não têm poder para salvar ou santificar. A verdadeira espiritualidade não é encontrada na auto-negação extrema ou em experiências místicas fabricadas, mas em estar firmemente "arraigados e edificados nele, e confirmados na fé" (Cl 2:7). Nossa vida deve ser uma expressão da plenitude que já temos em Cristo, não uma busca por algo que nos falta.</li>
                            </ul>
                        `
                    }
                ]
            },
            "colossenses_3": {
                title: "A NOVA VIDA EM CRISTO: DO CELESTIAL AO COTIDIANO",
                date: "17/04 (Quarta)",
                desc: "\"Se, pois, fostes ressuscitados com Cristo, buscai as coisas que são de cima, onde Cristo está.\"",
                blocks: [
                    {
                        title: "Deixando o Velho Homem, Vestindo o Novo",
                        verse: "Mas agora, despojai-vos também de tudo isto: da ira, da cólera, da malícia, da maledicência e das palavras torpes da vossa boca. (Cl 3:8)",
                        exegesis: `
                            <h3>1. Contexto e Exegese: A Implicação da União com Cristo</h3>
                            <ul>
                                <li>Tendo estabelecido a supremacia de Cristo e a plenitude da salvação n'Ele, Paulo agora faz a transição da doutrina para a prática. O capítulo 3 começa com um imperativo lógico: "Se, pois, fostes ressuscitados com Cristo, buscai as coisas que são de cima, onde Cristo está" (Cl 3:1). Nossa nova identidade em Cristo – sepultados com Ele, ressuscitados com Ele, e nossa vida "escondida com Cristo em Deus" (Cl 3:3) – exige uma nova forma de viver. Isso envolve uma mudança radical de mente e comportamento, do terreno para o celestial.</li>
                            </ul>
                            
                            <h3>2. Análise Teológica: A Mortificação do Pecado e a Renovação Interior</h3>
                            <ul>
                                <li>Paulo usa uma metáfora de "despojar" e "revestir" (<i>enduo - ἐνδύω - vestir uma nova roupa</i>). Devemos "mortificar" (Cl 3:5) os membros terrenos – as paixões pecaminosas da velha natureza como imoralidade, impureza, avareza, ira, calúnia. Ele enfatiza que essas coisas são as que "trazem a ira de Deus sobre os filhos da desobediência". A nova humanidade em Cristo transcende divisões sociais e étnicas: "onde não há grego nem judeu, circuncisão nem incircuncisão, bárbaro, cita, escravo ou livre; mas Cristo é tudo em todos" (Cl 3:11). No lugar da velha natureza, devemos nos "revestir" de qualidades divinas: "misericórdia, bondade, humildade, mansidão, longanimidade" (Cl 3:12), e sobretudo, "o amor, que é o vínculo da perfeição" (Cl 3:14). Essa renovação (<i>ananeoo - ἀνανεόω - renovar, ser feito novo em mente e espírito</i>) não é uma melhora superficial, mas uma transformação profunda, à imagem do Criador.</li>
                            </ul>

                            <h3>3. Aplicação Prática: A Vida Doméstica e o Coração Agradecido</h3>
                            <ul>
                                <li>A nova vida em Cristo se manifesta no dia a dia. Paulo exorta à paz de Cristo governando nos corações, e a "palavra de Cristo habitar em vós abundantemente" (Cl 3:15-16), resultando em ensino mútuo e louvor. As instruções para o lar são fundamentais: esposas, sujeitem-se; maridos, amem; filhos, obedeçam; pais, não irritem; servos, obedeçam; senhores, deem justiça e equidade. Em todas as esferas, a motivação é servir ao Senhor, não aos homens, com um coração "agradecido" (Cl 3:3:17). Cada ação, palavra e relacionamento se torna um ato de adoração quando feito "em nome do Senhor Jesus".</li>
                            </ul>
                        `
                    }
                ]
            },
            "colossenses_4": {
                title: "ORAÇÃO, SABEDORIA E SAUDAÇÕES",
                date: "18/04 (Quinta)",
                desc: "\"Perseverai em oração, velando nela com ação de graças.\"",
                blocks: [
                    {
                        title: "Oração Constante e Testemunho Eficaz",
                        verse: "Andai em sabedoria para com os que estão de fora, usando bem cada oportunidade. A vossa palavra seja sempre agradável, temperada com sal, para que saibais como vos convém responder a cada um. (Cl 4:5-6)",
                        exegesis: `
                            <h3>1. Contexto e Exegese: Exortações Finais para a Vida Cristã</h3>
                            <ul>
                                <li>O último capítulo de Colossenses é rico em exortações práticas e saudações pessoais, que demonstram o coração pastoral de Paulo. Ele começa com uma chamada à perseverança na oração, com vigilância e gratidão, e um pedido específico para que Deus abra uma "porta à palavra" (Cl 4:3), permitindo-lhe pregar o mistério de Cristo, pelo qual ele estava preso. Isso sublinha a importância da oração não apenas para as necessidades pessoais, mas também para o avanço do Evangelho.</li>
                            </ul>
                            
                            <h3>2. Análise Teológica: Sabedoria e Graça no Testemunho</h3>
                            <ul>
                                <li>A instrução sobre "andar em sabedoria para com os que estão de fora" (Cl 4:5) é vital para o testemunho cristão. A palavra "oportunidade" (<i>kairos - καιρός - tempo oportuno, momento certo</i>) sugere a necessidade de discernimento para aproveitar os momentos certos para compartilhar a fé. Nossas palavras devem ser "sempre agradáveis, temperadas com sal" (Cl 4:6). O "sal" aqui simboliza o bom gosto, a pureza, a conservação e a sabedoria. Uma palavra "temperada com sal" (<i>logou - λόγου - discurso, mensagem</i>) é aquela que é interessante, instrutiva, convincente, e livre de vulgaridade, capaz de atrair e instruir. A comunicação cristã deve ser intencional e edificante, tanto para crentes quanto para descrentes.</li>
                            </ul>

                            <h3>3. Aplicação Prática: Relacionamentos e Lealdade na Missão</h3>
                            <ul>
                                <li>Paulo encerra a carta com uma série de saudações que revelam a sua rede de apoio e a coesão da igreja primitiva. Tíquico, que entregaria a carta, é descrito como "fiel ministro e conservo no Senhor", e Epafras, o fundador da igreja em Colossos, é elogiado por seu fervor na oração e seu "grande zelo" (Cl 4:12). Menciona também Marcos, Aristarco, Lucas (o médico amado) e Demas. A instrução para ler a carta também na igreja de Laodicéia e a troca de cartas entre as igrejas demonstra a interconexão e a importância da comunhão. A fidelidade desses colaboradores é um exemplo para nós de como a comunidade e a lealdade são essenciais na missão de Deus.</li>
                            </ul>
                        `
                    }
                ]
            }
        };

        // === LÓGICA GERAL ===
        let currentAudioBlob = null;
        let mediaRecorder;
        let audioChunks = [];

        function loadChapter(chapterKey) {
            const data = bibleData[chapterKey];
            if (!data) return;

            const heroTitle = document.getElementById('heroTitle');
            const heroDesc = document.getElementById('heroDesc');
            const dateBadge = document.getElementById('dateBadge');
            const dateValue = document.getElementById('dateValue');
            const communitySection = document.getElementById('community-section');
            const formChapterKey = document.getElementById('formChapterKey');
            
            heroTitle.style.opacity = '0';
            heroDesc.style.opacity = '0';
            dateBadge.style.opacity = '0';
            
            setTimeout(() => {
                if (data.date) {
                    dateValue.textContent = data.date;
                    dateBadge.classList.remove('hidden');
                    communitySection.classList.remove('hidden');
                    formChapterKey.value = chapterKey;
                    carregarComentarios(chapterKey);
                    setTimeout(() => { dateBadge.style.opacity = '1'; }, 100);
                } else {
                    dateBadge.classList.add('hidden');
                    communitySection.classList.add('hidden');
                }

                heroTitle.innerHTML = data.title;
                heroDesc.innerHTML = data.desc;
                heroTitle.style.opacity = '1';
                heroDesc.style.opacity = '1';
            }, 300);

            const mainContent = document.getElementById('content');
            mainContent.innerHTML = ''; 

            data.blocks.forEach((block) => {
                let borderColor = 'border-teal-600';
                let blurTop = 'bg-teal-600/5';
                let blurBottom = 'bg-teal-800/5';
                let borderPanel = 'border-teal-900/30';

                const html = `
                    <section class="reveal max-w-4xl mx-auto w-full relative">
                        <div class="absolute -inset-4 ${blurTop} to-transparent rounded-3xl blur-xl pointer-events-none"></div>
                        
                        <div class="space-y-6 relative z-10">
                            <div class="text-center mb-10">
                                <h2 class="text-3xl md:text-5xl font-serif text-white leading-tight mb-6">${block.title}</h2>
                                <div class="inline-block border-l-4 border-r-4 ${borderColor} px-6 py-4 italic text-slate-300 bg-[#0a0514]/50 shadow-sm max-w-3xl rounded-sm">
                                    "${block.verse}"
                                </div>
                            </div>
                            
                            <div class="bg-[#050510]/80 p-8 md:p-12 rounded-xl border ${borderPanel} transition shadow-2xl relative overflow-hidden">
                                <div class="absolute top-0 right-0 w-64 h-64 ${blurTop} rounded-full blur-3xl -mr-20 -mt-20 pointer-events-none"></div>
                                <div class="absolute bottom-0 left-0 w-64 h-64 ${blurBottom} rounded-full blur-3xl -ml-20 -mb-20 pointer-events-none"></div>
                                <div class="rich-text text-slate-300 text-[16px] md:text-lg leading-relaxed relative z-10 font-light">
                                    ${block.exegesis}
                                </div>
                            </div>
                        </div>
                    </section>
                `;
                mainContent.insertAdjacentHTML('beforeend', html);
            });
            resetObservers();
        }

        function carregarComentarios(capitulo) {
            const list = document.getElementById('commentsList');
            list.innerHTML = '<p class="text-center text-slate-500 text-sm animate-pulse">Carregando comentários...</p>';

            fetch(`api.php?acao=listar&capitulo=${capitulo}`)
            .then(res => res.json())
            .then(data => {
                list.innerHTML = '';
                if(!Array.isArray(data)) { // CRITICAL: Defensive programming
                    console.error('Dados recebidos da API não são um array:', data);
                    list.innerHTML = '<p class="text-center text-red-400 text-xs">Erro ao carregar comentários: formato de dados inválido.</p>';
                    return;
                }
                if(data.length === 0) {
                    list.innerHTML = '<p class="text-center text-slate-500 text-sm">Seja o primeiro a comentar!</p>';
                    return;
                }
                data.forEach(c => {
                    let mediaHtml = '';
                    if(c.foto) mediaHtml += `<img src="${c.foto}" onclick="openImage(this.src)" class="mt-4 rounded-lg max-h-48 border border-slate-700 cursor-pointer hover:scale-[1.02] transition shadow-lg">`;
                    if(c.audio) mediaHtml += `<audio controls src="${c.audio}" class="mt-4 w-full"></audio>`;

                    const jaCurtiu = localStorage.getItem(`reagiu_likes_${c.id}`);
                    const jaAmem = localStorage.getItem(`reagiu_amem_${c.id}`);
                    const jaGloria = localStorage.getItem(`reagiu_gloria_${c.id}`);

                    let themeColor = 'text-teal-400';
                    let panelBorder = 'hover:border-teal-500/50';

                    const html = `
                        <div class="glass-panel p-5 pb-12 rounded-xl border border-slate-800 relative group transition ${panelBorder} bg-[#0a0514]/60">
                            <div class="flex justify-between items-start mb-3 border-b border-slate-800 pb-2">
                                <strong class="${themeColor} text-sm tracking-wide font-serif">${c.nome}</strong>
                                <span class="text-[10px] text-slate-500 uppercase tracking-widest">${new Date(c.data_envio).toLocaleDateString('pt-BR')}</span>
                            </div>
                            <p class="text-slate-300 text-sm leading-relaxed">${c.mensagem}</p>
                            ${mediaHtml}
                            
                            <div class="absolute bottom-3 right-4 flex gap-2">
                                <button onclick="reagirComentario(${c.id}, 'likes', this)" class="text-xs transition flex items-center gap-1 bg-black/80 px-2 py-1 rounded-full border border-slate-700 ${jaCurtiu ? 'text-red-500 border-red-500/30' : 'text-slate-400 hover:text-red-400'}" ${jaCurtiu ? 'disabled' : ''}>
                                    <i class="fa-solid fa-heart"></i> <span class="count font-bold">${c.likes || 0}</span>
                                </button>
                                <button onclick="reagirComentario(${c.id}, 'amem', this)" class="text-xs transition flex items-center gap-1 bg-black/80 px-2 py-1 rounded-full border border-slate-700 ${jaAmem ? 'text-teal-400 border-teal-400/30' : 'text-slate-400 hover:text-teal-400'}" ${jaAmem ? 'disabled' : ''}>
                                    <i class="fa-solid fa-hands-praying"></i> <span class="count font-bold">${c.amem || 0}</span>
                                </button>
                                <button onclick="reagirComentario(${c.id}, 'gloria', this)" class="text-xs transition flex items-center gap-1 bg-black/80 px-2 py-1 rounded-full border border-slate-700 ${jaGloria ? 'text-blue-500 border-blue-500/30' : 'text-slate-400 hover:text-blue-500'}" ${jaGloria ? 'disabled' : ''}>
                                    <i class="fa-solid fa-fire"></i> <span class="count font-bold">${c.gloria || 0}</span>
                                </button>
                            </div>
                        </div>
                    `;
                    list.insertAdjacentHTML('beforeend', html);
                });
            })
            .catch(err => {
                list.innerHTML = '<p class="text-center text-red-400 text-xs">Erro ao carregar comentários. Por favor, tente novamente mais tarde.</p>';
                console.error('Erro na requisição de comentários:', err);
            });
        }

        function reagirComentario(id, tipo, btn) {
            if(localStorage.getItem(`reagiu_${tipo}_${id}`)) return;

            const icon = btn.querySelector('i');
            const countSpan = btn.querySelector('.count');
            let count = parseInt(countSpan.innerText);

            icon.classList.add('reacted-anim');
            btn.classList.remove('text-slate-400');
            
            if(tipo === 'likes') btn.classList.add('text-red-500', 'border-red-500/30');
            if(tipo === 'amem') btn.classList.add('text-teal-400', 'border-teal-400/30');
            if(tipo === 'gloria') btn.classList.add('text-blue-500', 'border-blue-500/30');

            countSpan.innerText = count + 1;
            btn.disabled = true;

            localStorage.setItem(`reagiu_${tipo}_${id}`, 'true');

            const formData = new FormData();
            formData.append('acao', 'reagir');
            formData.append('id', id);
            formData.append('tipo', tipo);

            fetch('api.php', { method: 'POST', body: formData })
            .catch(err => {
                console.error('Erro ao enviar reação:', err);
                // Optionally, revert UI changes if the reaction failed
            });
        }

        document.getElementById('commentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            const formData = new FormData(this);
            formData.append('acao', 'salvar');
            if(currentAudioBlob) {
                formData.append('audio', currentAudioBlob, 'audio.wav');
            }

            fetch('api.php', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if(data.sucesso) {
                    this.reset();
                    document.getElementById('filePreview').innerHTML = '';
                    document.getElementById('filePreview').classList.add('hidden'); // Ensure preview is hidden after submission
                    currentAudioBlob = null;
                    document.getElementById('recordText').innerText = "Gravar Áudio";
                    recordBtn.classList.remove('recording-pulse'); // Remove pulse animation
                    carregarComentarios(document.getElementById('formChapterKey').value);
                } else {
                    alert('Erro ao enviar o comentário: ' + (data.mensagem || 'Resposta inválida.'));
                }
            })
            .catch(err => {
                alert('Erro de conexão ao enviar o comentário. Por favor, verifique sua rede.');
                console.error('Erro de conexão:', err);
            })
            .finally(() => {
                btn.innerText = originalText;
                btn.disabled = false;
            });
        });

        function previewFile(input) {
            const preview = document.getElementById('filePreview');
            if(input.files && input.files[0]) {
                preview.innerHTML = `<i class="fa-solid fa-check text-green-400"></i> Imagem selecionada: ${input.files[0].name}`;
                preview.classList.remove('hidden');
            } else {
                preview.innerHTML = '';
                preview.classList.add('hidden');
            }
        }

        const recordBtn = document.getElementById('recordBtn');
        recordBtn.addEventListener('click', async () => {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                    mediaRecorder.onstop = () => {
                        currentAudioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        const filePreview = document.getElementById('filePreview');
                        filePreview.classList.remove('hidden');
                        filePreview.innerHTML += `<br><i class="fa-solid fa-microphone text-green-400"></i> Áudio gravado! (${Math.round(currentAudioBlob.size / 1024)} KB)`;
                    };
                    mediaRecorder.start();
                    recordBtn.classList.add('recording-pulse');
                    document.getElementById('recordText').innerText = "Parar Gravação";
                } catch (err) {
                    alert("Permita o uso do microfone para gravar seu áudio. Erro: " + err.message);
                    console.error("Erro ao iniciar gravação:", err);
                }
            } else {
                mediaRecorder.stop();
                recordBtn.classList.remove('recording-pulse');
                document.getElementById('recordText').innerText = "Gravar Áudio";
            }
        });

        function openImage(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('imageModal').classList.remove('hidden');
        }
        function closeImage() {
            document.getElementById('imageModal').classList.add('hidden');
        }

        function resetObservers() {
            // Ensure all reveal elements start hidden
            document.querySelectorAll('.reveal').forEach(el => {
                el.classList.remove('active');
            });

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                    // Optionally, remove 'active' when not intersecting to re-trigger on scroll back
                    // else {
                    //     entry.target.classList.remove('active');
                    // }
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        const canvas = document.getElementById("particles-js");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        for(let i=0; i<80; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, spcX: Math.random()*0.5-0.25, spcY: Math.random()*0.5-0.25 });
        function animateParticles() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(20, 184, 166, 0.15)"; /* Teal */
            particles.forEach(p => { p.x += p.spcX; p.y += p.spcY; if(p.x<0||p.x>canvas.width) p.spcX*=-1; if(p.y<0||p.y>canvas.height) p.spcY*=-1; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        loadChapter('intro_book');
    </script>
</body>
</html>
