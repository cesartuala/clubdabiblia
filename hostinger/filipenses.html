    <script>
        const bibleData = {
            "intro_book": {
                title: "A CARTA AOS FILIPENSES",
                date: null,
                desc: "<span class='text-xs uppercase tracking-[0.3em] text-pink-400 not-italic block mb-4'>Introdução: Sobre o Livro</span>\"A Epístola da Alegria, escrita por um prisioneiro, para um povo amado.\"",
                blocks: [
                    {
                        title: "A Epístola da Alegria em Cristo",
                        verse: "Regozijai-vos sempre no Senhor; outra vez digo, regozijai-vos. (Filipenses 4:4)",
                        exegesis: `
                            <p>Filipenses é muitas vezes chamada de "A Epístola da Alegria" ou "A Carta da Felicidade em Cristo". Apesar de ter sido escrita da prisão em Roma, o apóstolo Paulo menciona a palavra "alegria" ou "regozijo" mais de 16 vezes. Essa carta não é uma repreensão, mas uma expressão de profundo carinho, gratidão e encorajamento a uma das igrejas mais amadas por Paulo.</p>
                            
                            <h3>1. O Contexto Único: Uma Igreja sem Grandes Problemas</h3>
                            <ul>
                                <li>Ao contrário de Coríntios (cheia de controvérsias) ou Gálatas (defendendo a fé contra legalistas), a igreja de Filipos não enfrentava grandes escândalos morais ou desvios doutrinários internos. Seus desafios eram externos: perseguição e a necessidade de manter a unidade e a humildade. Esta carta é, portanto, mais pastoral e afetuosa, celebrando a fé e a generosidade dos filipenses.</li>
                            </ul>
                            
                            <h3>2. O Foco Cristocêntrico: Cristo como Tudo</h3>
                            <ul>
                                <li>A mensagem central de Filipenses é que <strong>Cristo é a vida</strong>, a alegria, a justiça e a força do crente. Paulo mostra que a verdadeira alegria (<i>chara</i> - χαρά) não depende das circunstâncias externas (prisão, pobreza), mas da pessoa e do poder de Cristo vivendo em nós. Ele usa a si mesmo como exemplo, um homem fisicamente acorrentado, mas espiritualmente livre e transbordando de alegria em seu Senhor.</li>
                            </ul>

                            <h3>3. Temas Principais</h3>
                            <ul>
                                <li><strong>Alegria em Cristo:</strong> A despeito de todas as adversidades.</li>
                                <li><strong>Unidade e Humildade:</strong> Inspirada na <em>kenosis</em> (κένωσις - esvaziamento) de Cristo.</li>
                                <li><strong>A Justiça pela Fé:</strong> A superioridade da justiça de Cristo sobre a justiça própria.</li>
                                <li><strong>Contentamento:</strong> O segredo de viver satisfeito em qualquer situação.</li>
                                <li><strong>Generosidade:</strong> A parceria dos filipenses com Paulo no avanço do Evangelho.</li>
                            </ul>
                        `
                    }
                ]
            },
            "intro_author": {
                title: "SOBRE O AUTOR",
                date: null,
                desc: "\"Paulo e Timóteo, servos de Jesus Cristo, a todos os santos em Cristo Jesus que estão em Filipos...\"",
                blocks: [
                    {
                        title: "O Prisioneiro que Transborda Alegria",
                        verse: "Pois para mim o viver é Cristo, e o morrer é lucro. (Filipenses 1:21)",
                        exegesis: `
                            <p>Filipenses é uma das quatro "Cartas da Prisão" (junto com Efésios, Colossenses e Filemom), escritas por Paulo enquanto aguardava seu julgamento em Roma, por volta dos anos 60-62 d.C. Sua circunstância era de incerteza, isolamento e, literalmente, de correntes. No entanto, é precisamente nesse cenário de restrição que a mensagem de liberdade e alegria de Paulo brilha com mais intensidade.</p>

                            <h3>1. A Fundação da Igreja em Filipos</h3>
                            <ul>
                                <li>A igreja de Filipos tem uma história especial. Foi a primeira igreja fundada por Paulo na Europa, durante sua segunda viagem missionária (Atos 16). Lá, ele experimentou milagres (como a conversão de Lídia e o terremoto na prisão que libertou o carcereiro), mas também perseguição e sofrimento. Isso forjou um vínculo único de afeto e gratidão mútua entre Paulo e os filipenses. Eles foram uma igreja notável por sua generosidade e parceria no Evangelho, enviando ajuda financeira a Paulo várias vezes.</li>
                            </ul>

                            <h3>2. O Espírito de Gratidão e Serviço (<i>Doulos</i>)</h3>
                            <ul>
                                <li>Paulo se apresenta não como "apóstolo" (título de autoridade que ele frequentemente usava em outras cartas), mas como "servo" (<i>doulos</i> - δοῦλος - um escravo voluntário) de Jesus Cristo. Isso reflete a profunda humildade e o foco em servir, que ele exorta os filipenses a imitarem. A gratidão pela parceria dos filipenses no evangelho permeia toda a carta, demonstrando um coração que, apesar das prisões, encontrava grande satisfação no progresso da obra de Deus.</li>
                            </ul>

                            <h3>3. Identificação com o Sofrimento de Cristo</h3>
                            <ul>
                                <li>A prisão de Paulo, para ele, não era um acidente, mas parte da sua <i>koinonia ton pathematon</i> (κοινωνία τῶν παθημάτων - comunhão dos sofrimentos) com Cristo. Ele via suas correntes como uma oportunidade para que o evangelho fosse mais amplamente conhecido, inclusive entre a guarda pretoriana. Sua experiência pessoal de sofrimento se torna um testemunho poderoso de que a alegria em Cristo não é superficial, mas profunda e resistente às adversidades da vida.</li>
                            </ul>
                        `
                    }
                ]
            },
            "filipenses_1": {
                title: "CRISTO É A NOSSA VIDA E PROPÓSITO",
                date: "11/04 (Quinta)",
                desc: "\"Estou persuadido de que aquele que começou boa obra em vós a aperfeiçoará até ao dia de Jesus Cristo.\"",
                blocks: [
                    {
                        title: "Alegria no Avanço do Evangelho e a Perspectiva da Morte",
                        verse: "Porque para mim o viver é Cristo, e o morrer é lucro. (Filipenses 1:21)",
                        exegesis: `
                            <h3>1. Graça, Paz e Parceria no Evangelho</h3>
                            <ul>
                                <li>Paulo começa com uma saudação que expressa a base da fé cristã: "Graça a vós, e paz, da parte de Deus nosso Pai e do Senhor Jesus Cristo". Imediatamente, ele passa a uma oração de gratidão, não por coisas materiais, mas pela "vossa participação (<i>koinonia</i> - κοινωνία) no evangelho". Isso destaca a generosidade e o engajamento ativo dos filipenses na missão de Deus. A certeza de que Deus é fiel para completar a obra que Ele começou neles é um poderoso encorajamento.</li>
                            </ul>
                            
                            <h3>2. Prisão como Oportunidade para o Evangelho</h3>
                            <ul>
                                <li>Mesmo acorrentado, Paulo não vê sua prisão como um obstáculo, mas como uma oportunidade. Suas cadeias serviram para que o evangelho fosse divulgado dentro da guarda pretoriana e para encorajar outros irmãos a pregar com mais ousadia. Sua declaração "para mim o viver é Cristo, e o morrer é lucro" revela uma perspectiva radical: a vida tem seu propósito e valor supremo em Cristo, e a morte é a porta para uma comunhão ainda mais plena com Ele. Esta é a essência do <i>euangelion</i> (εὐαγγέλιον - Boas Novas) que ele vivia e pregava.</li>
                            </ul>

                            <h3>3. Viver Dignamente e Manter a Unidade</h3>
                            <ul>
                                <li>Apesar do desejo pessoal de estar com Cristo, Paulo reconhece a necessidade de permanecer para o benefício espiritual dos filipenses. Ele os exorta a "viverem de modo digno do evangelho de Cristo", mantendo a unidade e o mesmo espírito na defesa da fé, sem se intimidar pelos adversários. A coragem diante da perseguição e a perseverança na fé são frutos do trabalho de Deus neles.</li>
                            </ul>
                        `
                    }
                ]
            },
            "filipenses_2": {
                title: "A MENTE DE CRISTO: HUMILDADE E UNIDADE",
                date: "12/04 (Sexta)",
                desc: "\"Tende entre vós o mesmo sentimento que houve também em Cristo Jesus.\"",
                blocks: [
                    {
                        title: "O Hino de Cristo e a Obediência que Transforma",
                        verse: "Que, sendo em forma de Deus, não teve por usurpação ser igual a Deus, mas esvaziou-se a si mesmo... (Filipenses 2:6-7)",
                        exegesis: `
                            <h3>1. Exortação à Unidade e Humildade</h3>
                            <ul>
                                <li>Paulo inicia o capítulo com um apelo fervoroso à unidade e à humildade, baseado em tudo o que os cristãos já possuem em Cristo (consolo, amor, comunhão do Espírito, misericórdia). Ele os desafia a ter "o mesmo sentimento", a pensar em si mesmos como menos importantes do que os outros, buscando o interesse alheio. A palavra <i>homothymadon</i> (ὁμοθυμαδόν - um só ânimo, unanimidade) ressoa aqui como a essência da vida comunitária cristã.</li>
                            </ul>
                            
                            <h3>2. O Hino Cristológico da <i>Kenosis</i></h3>
                            <ul>
                                <li>Os versículos 6-11 formam um dos mais profundos hinos cristológicos da Bíblia. Cristo, que existia em <i>morphe</i> (μορφή - forma, natureza) de Deus, não se apegou a esse direito, mas realizou uma <i>kenosis</i> (κένωσις - esvaziamento) voluntária. Ele não se esvaziou de sua divindade, mas de seus privilégios divinos, assumindo a forma de servo e humilhando-se até a morte de cruz. Esta é a imagem suprema da humildade que os filipenses são chamados a imitar. Por causa dessa obediência, Deus o exaltou sumamente, para que todo joelho se dobre diante de Jesus.</li>
                            </ul>

                            <h3>3. Operando a Salvação e Brilhando como Luzes</h3>
                            <ul>
                                <li>Paulo, então, exorta os crentes a "desenvolver (operar) a vossa salvação com temor e tremor". Isso não significa que a salvação é por obras, mas que a fé genuína se manifesta em obediência e santificação contínua, impulsionada pelo próprio Deus que "opera em vós tanto o querer como o efetuar". Os cristãos devem "brilhar como astros no mundo", sendo irrepreensíveis e puros em meio a uma geração corrompida, segurando firmemente a Palavra da vida.</li>
                            </ul>
                        `
                    }
                ]
            },
            "filipenses_3": {
                title: "A SUPREMA EXCELÊNCIA DO CONHECIMENTO DE CRISTO",
                date: "13/04 (Sábado)",
                desc: "\"E, na verdade, tenho também por perda todas as coisas, pela excelência do conhecimento de Cristo Jesus, meu Senhor.\"",
                blocks: [
                    {
                        title: "De Privilégios a <i>Skubala</i>: A Justiça de Deus pela Fé",
                        verse: "Considero tudo como perda, por causa da sublimidade do conhecimento de Cristo Jesus, meu Senhor. Por ele, tudo perdi e considero como <i>skubala</i>, para ganhar a Cristo... (Filipenses 3:8)",
                        exegesis: `
                            <h3>1. Advertência contra o Legalismo ("Os Mutiladores")</h3>
                            <ul>
                                <li>Paulo abruptamente muda o tom para advertir contra os "cães", os "maus obreiros", os "mutiladores" (um termo pejorativo para aqueles que insistiam na circuncisão e na guarda da lei para a salvação). Ele os chama de <i>skubala</i> (σκύβαλα - esterco, lixo) tudo o que antes valorizava para ganhar a Cristo. Isso mostra a veemência de Paulo contra qualquer coisa que comprometa a suficiência da salvação pela graça através da fé em Jesus.</li>
                            </ul>
                            
                            <h3>2. Os Privilégios Desprezados e a Verdadeira <i>Dikaiosyne</i></h3>
                            <ul>
                                <li>Para ilustrar a futilidade da justiça própria, Paulo enumera seus próprios impressionantes credenciais judaicas: circuncidado ao oitavo dia, da tribo de Benjamim, hebreu de hebreus, fariseu exemplar, perseguidor da igreja, irrepreensível quanto à lei. No entanto, ele declara que todas essas coisas, que antes eram "ganho", agora são consideradas "perda" (e <i>skubala</i> - esterco/lixo) por causa da "sublimidade do conhecimento de Cristo". Sua única busca é a <i>dikaiosyne</i> (δικαιοσύνη - justiça) que vem de Deus pela fé em Cristo, não de obras da lei.</li>
                            </ul>

                            <h3>3. Prossigo para o Alvo: A Cidadania Celestial</h3>
                            <ul>
                                <li>Com uma paixão intensa, Paulo declara seu alvo: conhecer a Cristo, o poder da Sua ressurreição e a comunhão de Seus sofrimentos. Ele não se considera perfeito, mas "prossigo para o alvo, para o prêmio da soberana vocação de Deus em Cristo Jesus". Ele encoraja os filipenses a imitá-lo e a se atentarem para aqueles que vivem de forma contrária ao Evangelho, cujo destino é a perdição. Os cristãos têm sua "cidadania nos céus", de onde aguardam o retorno do Salvador, Jesus Cristo, que transformará nossos corpos humilhados em corpos glorificados, semelhantes ao Seu.</li>
                            </ul>
                        `
                    }
                ]
            },
            "filipenses_4": {
                title: "PAZ, CONTENTAMENTO E FORÇA EM CRISTO",
                date: "14/04 (Domingo)",
                desc: "\"Tudo posso naquele que me fortalece.\"",
                blocks: [
                    {
                        title: "A Paz de Deus que Excede e o Segredo do Contentamento",
                        verse: "E a paz de Deus, que excede todo o entendimento, guardará os vossos corações e os vossos sentimentos em Cristo Jesus. (Filipenses 4:7)",
                        exegesis: `
                            <h3>1. Exortações Finais à Unidade e Alegria</h3>
                            <ul>
                                <li>Paulo encerra a carta com exortações práticas e poderosas. Primeiro, ele faz um apelo especial a Evódia e Síntique, duas mulheres na igreja que aparentemente estavam em desacordo, pedindo que vivessem em harmonia no Senhor. Ele reitera o mandamento central: "Regozijai-vos sempre no Senhor; outra vez digo, regozijai-vos". A alegria deve ser uma marca constante do cristão. Sua moderação e gentileza devem ser conhecidas por todos, pois "o Senhor está perto".</li>
                            </ul>
                            
                            <h3>2. Livres da Ansiedade: A <i>Eirene</i> de Deus</h3>
                            <ul>
                                <li>A chave para a alegria e a paz é a oração. "Não estejais inquietos (ansiosos) por coisa alguma; antes as vossas petições sejam em tudo conhecidas diante de Deus pela oração e súplica, com ações de graças." A promessa é extraordinária: "E a paz (<i>eirene</i> - εἰρήνη) de Deus, que excede todo o entendimento, guardará os vossos corações e os vossos sentimentos em Cristo Jesus". Esta paz é como um guarda que protege a mente e as emoções da invasão da ansiedade. Além disso, Paulo instrui os crentes a encherem suas mentes com pensamentos nobres, verdadeiros, justos, puros, amáveis e de boa fama.</li>
                            </ul>

                            <h3>3. O Segredo do Contentamento e a <i>Dynamis</i> de Cristo</h3>
                            <ul>
                                <li>Paulo revela um dos maiores segredos da vida cristã: o contentamento (<i>autarkes</i> - αὐτάρκης - no sentido de autossuficiência em Cristo, não de si mesmo). Ele aprendeu a estar "contente" (satisfeito) em qualquer situação, seja na abundância ou na necessidade. A fonte desse contentamento não está em suas próprias capacidades, mas em Cristo: "Tudo posso naquele que me fortalece (<i>dynamis</i> - δύναμις - poder, força)". Sua gratidão pela generosidade dos filipenses é evidente; ele vê as ofertas como um "cheiro suave, sacrifício agradável e aprazível a Deus", prometendo que Deus suprirá todas as suas necessidades segundo as Suas riquezas em glória em Cristo Jesus.</li>
                            </ul>
                        `
                    }
                ]
            }
        };

        // === LÓGICA GERAL ===
        let currentAudioBlob = null;
        let mediaRecorder;
        let audioChunks = [];

        function loadChapter(chapterKey) {
            const data = bibleData[chapterKey];
            if (!data) return;

            const heroTitle = document.getElementById('heroTitle');
            const heroDesc = document.getElementById('heroDesc');
            const dateBadge = document.getElementById('dateBadge');
            const dateValue = document.getElementById('dateValue');
            const communitySection = document.getElementById('community-section');
            const formChapterKey = document.getElementById('formChapterKey');
            
            heroTitle.style.opacity = '0';
            heroDesc.style.opacity = '0';
            dateBadge.style.opacity = '0';
            
            setTimeout(() => {
                if (data.date) {
                    dateValue.textContent = data.date;
                    dateBadge.classList.remove('hidden');
                    communitySection.classList.remove('hidden');
                    formChapterKey.value = chapterKey;
                    carregarComentarios(chapterKey);
                    setTimeout(() => { dateBadge.style.opacity = '1'; }, 100);
                } else {
                    dateBadge.classList.add('hidden');
                    communitySection.classList.add('hidden');
                }

                heroTitle.innerHTML = data.title;
                heroDesc.innerHTML = data.desc;
                heroTitle.style.opacity = '1';
                heroDesc.style.opacity = '1';
            }, 300);

            const mainContent = document.getElementById('content');
            mainContent.innerHTML = ''; 

            data.blocks.forEach((block) => {
                let borderColor = 'border-pink-600';
                let blurTop = 'bg-pink-600/5';
                let blurBottom = 'bg-pink-800/5';
                let borderPanel = 'border-pink-900/30';

                const html = `
                    <section class="reveal max-w-4xl mx-auto w-full relative">
                        <div class="absolute -inset-4 ${blurTop} to-transparent rounded-3xl blur-xl pointer-events-none"></div>
                        
                        <div class="space-y-6 relative z-10">
                            <div class="text-center mb-10">
                                <h2 class="text-3xl md:text-5xl font-serif text-white leading-tight mb-6">${block.title}</h2>
                                <div class="inline-block border-l-4 border-r-4 ${borderColor} px-6 py-4 italic text-slate-300 bg-[#0a0514]/50 shadow-sm max-w-3xl rounded-sm">
                                    "${block.verse}"
                                </div>
                            </div>
                            
                            <div class="bg-[#050510]/80 p-8 md:p-12 rounded-xl border ${borderPanel} transition shadow-2xl relative overflow-hidden">
                                <div class="absolute top-0 right-0 w-64 h-64 ${blurTop} rounded-full blur-3xl -mr-20 -mt-20 pointer-events-none"></div>
                                <div class="absolute bottom-0 left-0 w-64 h-64 ${blurBottom} rounded-full blur-3xl -ml-20 -mb-20 pointer-events-none"></div>
                                <div class="rich-text text-slate-300 text-[16px] md:text-lg leading-relaxed relative z-10 font-light">
                                    ${block.exegesis}
                                </div>
                            </div>
                        </div>
                    </section>
                `;
                mainContent.insertAdjacentHTML('beforeend', html);
            });
            resetObservers();
        }

        function carregarComentarios(capitulo) {
            const list = document.getElementById('commentsList');
            list.innerHTML = '<p class="text-center text-slate-500 text-sm animate-pulse">Carregando comentários...</p>';

            fetch(`api.php?acao=listar&capitulo=${capitulo}`)
            .then(res => res.json())
            .then(data => {
                list.innerHTML = '';
                if(data.length === 0) {
                    list.innerHTML = '<p class="text-center text-slate-500 text-sm">Seja o primeiro a comentar!</p>';
                    return;
                }
                data.forEach(c => {
                    let mediaHtml = '';
                    if(c.foto) mediaHtml += `<img src="${c.foto}" onclick="openImage(this.src)" class="mt-4 rounded-lg max-h-48 border border-slate-700 cursor-pointer hover:scale-[1.02] transition shadow-lg">`;
                    if(c.audio) mediaHtml += `<audio controls src="${c.audio}" class="mt-4 w-full"></audio>`;

                    const jaCurtiu = localStorage.getItem(`reagiu_likes_${c.id}`);
                    const jaAmem = localStorage.getItem(`reagiu_amem_${c.id}`);
                    const jaGloria = localStorage.getItem(`reagiu_gloria_${c.id}`);

                    let themeColor = 'text-pink-400';
                    let panelBorder = 'hover:border-pink-500/50';

                    const html = `
                        <div class="glass-panel p-5 pb-12 rounded-xl border border-slate-800 relative group transition ${panelBorder} bg-[#0a0514]/60">
                            <div class="flex justify-between items-start mb-3 border-b border-slate-800 pb-2">
                                <strong class="${themeColor} text-sm tracking-wide font-serif">${c.nome}</strong>
                                <span class="text-[10px] text-slate-500 uppercase tracking-widest">${new Date(c.data_envio).toLocaleDateString('pt-BR')}</span>
                            </div>
                            <p class="text-slate-300 text-sm leading-relaxed">${c.mensagem}</p>
                            ${mediaHtml}
                            
                            <div class="absolute bottom-3 right-4 flex gap-2">
                                <button onclick="reagirComentario(${c.id}, 'likes', this)" class="text-xs transition flex items-center gap-1 bg-black/80 px-2 py-1 rounded-full border border-slate-700 ${jaCurtiu ? 'text-pink-500 border-pink-500/30' : 'text-slate-400 hover:text-pink-400'}" ${jaCurtiu ? 'disabled' : ''}>
                                    <i class="fa-solid fa-heart"></i> <span class="count font-bold">${c.likes || 0}</span>
                                </button>
                                <button onclick="reagirComentario(${c.id}, 'amem', this)" class="text-xs transition flex items-center gap-1 bg-black/80 px-2 py-1 rounded-full border border-slate-700 ${jaAmem ? 'text-indigo-400 border-indigo-400/30' : 'text-slate-400 hover:text-indigo-400'}" ${jaAmem ? 'disabled' : ''}>
                                    <i class="fa-solid fa-hands-praying"></i> <span class="count font-bold">${c.amem || 0}</span>
                                </button>
                                <button onclick="reagirComentario(${c.id}, 'gloria', this)" class="text-xs transition flex items-center gap-1 bg-black/80 px-2 py-1 rounded-full border border-slate-700 ${jaGloria ? 'text-blue-500 border-blue-500/30' : 'text-slate-400 hover:text-blue-500'}" ${jaGloria ? 'disabled' : ''}>
                                    <i class="fa-solid fa-fire"></i> <span class="count font-bold">${c.gloria || 0}</span>
                                </button>
                            </div>
                        </div>
                    `;
                    list.insertAdjacentHTML('beforeend', html);
                });
            })
            .catch(err => {
                list.innerHTML = '<p class="text-center text-red-400 text-xs">Erro ao carregar comentários.</p>';
            });
        }

        function reagirComentario(id, tipo, btn) {
            if(localStorage.getItem(`reagiu_${tipo}_${id}`)) return;

            const icon = btn.querySelector('i');
            const countSpan = btn.querySelector('.count');
            let count = parseInt(countSpan.innerText);

            icon.classList.add('reacted-anim');
            btn.classList.remove('text-slate-400');
            
            if(tipo === 'likes') btn.classList.add('text-pink-500', 'border-pink-500/30');
            if(tipo === 'amem') btn.classList.add('text-indigo-400', 'border-indigo-400/30');
            if(tipo === 'gloria') btn.classList.add('text-blue-500', 'border-blue-500/30');

            countSpan.innerText = count + 1;
            btn.disabled = true;

            localStorage.setItem(`reagiu_${tipo}_${id}`, 'true');

            const formData = new FormData();
            formData.append('acao', 'reagir');
            formData.append('id', id);
            formData.append('tipo', tipo);

            fetch('api.php', { method: 'POST', body: formData });
        }

        document.getElementById('commentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            const formData = new FormData(this);
            formData.append('acao', 'salvar');
            if(currentAudioBlob) {
                formData.append('audio', currentAudioBlob, 'audio.wav');
            }

            fetch('api.php', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if(data.sucesso) {
                    this.reset();
                    document.getElementById('filePreview').innerHTML = '';
                    currentAudioBlob = null;
                    document.getElementById('recordText').innerText = "Gravar Áudio";
                    carregarComentarios(document.getElementById('formChapterKey').value);
                } else {
                    alert('Erro ao enviar.');
                }
            })
            .catch(() => alert('Erro de conexão.'))
            .finally(() => {
                btn.innerText = originalText;
                btn.disabled = false;
            });
        });

        function previewFile(input) {
            const preview = document.getElementById('filePreview');
            if(input.files && input.files[0]) {
                preview.innerHTML = `<i class="fa-solid fa-check text-green-400"></i> Imagem selecionada: ${input.files[0].name}`;
                preview.classList.remove('hidden');
            }
        }

        const recordBtn = document.getElementById('recordBtn');
        recordBtn.addEventListener('click', async () => {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                    mediaRecorder.onstop = () => {
                        currentAudioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        document.getElementById('filePreview').classList.remove('hidden');
                        document.getElementById('filePreview').innerHTML += '<br><i class="fa-solid fa-microphone text-green-400"></i> Áudio gravado!';
                    };
                    mediaRecorder.start();
                    recordBtn.classList.add('recording-pulse');
                    document.getElementById('recordText').innerText = "Parar Gravação";
                } catch (err) {
                    alert("Permita o uso do microfone para gravar.");
                }
            } else {
                mediaRecorder.stop();
                recordBtn.classList.remove('recording-pulse');
                document.getElementById('recordText').innerText = "Gravar Áudio";
            }
        });

        function openImage(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('imageModal').classList.remove('hidden');
        }
        function closeImage() {
            document.getElementById('imageModal').classList.add('hidden');
        }

        function resetObservers() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        const canvas = document.getElementById("particles-js");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        const particleColor = "rgba(236, 72, 153, 0.15)"; // Hex #ec4899 with 0.15 alpha
        for(let i=0; i<80; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, spcX: Math.random()*0.5-0.25, spcY: Math.random()*0.5-0.25 });
        function animateParticles() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = particleColor;
            particles.forEach(p => { p.x += p.spcX; p.y += p.spcY; if(p.x<0||p.x>canvas.width) p.spcX*=-1; if(p.y<0||p.y>canvas.height) p.spcY*=-1; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        loadChapter('intro_book');
    </script>
</body>
</html>
