        .rich-text li { margin-bottom: 15px; line-height: 1.8; text-align: justify; border-left: 3px solid #ec4899; padding-left: 20px; background: linear-gradient(to right, rgba(236,72,153,0.05), transparent); padding-top: 5px; padding-bottom: 5px; }

        @keyframes pop { 50% { transform: scale(1.4); } }

    <script>
        const bibleData = {
            "intro_book": {
                title: "A CARTA AOS FILIPENSES",
                date: null,
                desc: "<span class='text-xs uppercase tracking-[0.3em] text-pink-400 not-italic block mb-4'>Introdução: Sobre o Livro</span>\"A Epístola da alegria inesgotável, escrita das algemas, para a vida cristã vitoriosa.\"",
                blocks: [
                    {
                        title: "Alegria em Meio às Algemas",
                        verse: "Sempre em todas as minhas orações faço súplicas com alegria por todos vós. (Filipenses 1:4)",
                        exegesis: `
                            <p>Filipenses é frequentemente chamada de a "Epístola da Alegria". É notável porque Paulo a escreveu enquanto estava acorrentado em uma prisão romana, por volta de 60-62 d.C. Mesmo em circunstâncias tão adversas, a palavra "alegria" ou "regozijar-se" aparece mais de 16 vezes. Esta carta não é uma defesa teológica complexa, mas uma efusão de afeto, encorajamento e instrução prática para uma igreja que Paulo amava profundamente.</p>
                            
                            <h3>1. O Contexto e a Oração de Paulo</h3>
                            <ul>
                                <li>A igreja em Filipos foi a primeira fundada por Paulo na Europa (Atos 16). Era uma igreja missionária, que o havia apoiado financeiramente mais do que qualquer outra. A carta reflete o profundo vínculo entre Paulo e os filipenses. Ele começa com uma oração de gratidão e alegria pela <span class="rich-text"><i>koinonia</i> - κοινωνία - Comunhão</span> deles no Evangelho. A verdadeira alegria cristã não depende das circunstâncias externas, mas da nossa posição <span class="rich-text"><i>en Christo</i> - ἐν Χριστῷ - em Cristo</span>.</li>
                            </ul>
                            
                            <h3>2. Viver é Cristo, Morrer é Lucro</h3>
                            <ul>
                                <li>No capítulo 1, Paulo compartilha seu dilema pessoal: ele está "entre a espada e a parede", entre a vida e a morte. Se viver, é para servir a Cristo; se morrer, é para estar com Ele, o que é "muito melhor". Esta perspectiva radical transforma o sofrimento e a morte em oportunidades de glorificar a Cristo. Sua preocupação não é com seu próprio bem-estar, mas com o avanço do Evangelho, seja pela sua vida ou pela sua morte.</li>
                            </ul>

                            <h3>3. Permanecer Firme e Proclamar</h3>
                            <ul>
                                <li>Paulo os exorta a "permanecer firmes em um só espírito, com uma só alma, lutando juntos pela fé do evangelho" (Filipenses 1:27). Esta unidade e coragem são essenciais diante da oposição. A vida cristã é uma parceria ativa no Evangelho, que se manifesta na perseverança e na proclamação ousada, mesmo que isso signifique sofrimento por amor a Cristo.</li>
                            </ul>
                        `
                    }
                ]
            },
            "intro_author": {
                title: "SOBRE O AUTOR",
                date: null,
                desc: "\"Paulo e Timóteo, servos de Cristo Jesus, a todos os santos em Cristo Jesus que estão em Filipos...\"",
                blocks: [
                    {
                        title: "De Perseguidor a Prisioneiro de Cristo",
                        verse: "Porque a vós vos foi concedido, em relação a Cristo, não somente crer nele, como também padecer por ele. (Filipenses 1:29)",
                        exegesis: `
                            <p>A história de Paulo, o autor desta carta, é um testemunho vívido da transformação que ele prega. De um fariseu zeloso e perseguidor de cristãos a um apóstolo aprisionado por causa do Evangelho, a vida de Paulo é o palco onde a verdade da justificação pela fé é demonstrada.</p>

                            <h3>1. O Contexto de Escrita: Prisão Domiciliar em Roma</h3>
                            <ul>
                                <li>Filipenses é uma das "Cartas da Prisão", escrita enquanto Paulo estava em prisão domiciliar em Roma (c. 60-62 d.C.), aguardando seu julgamento perante César. Essa condição de aprisionamento, paradoxalmente, serviu para o "progresso do evangelho" (Filipenses 1:12). Sua prisão tornou-se um púlpito, e seus guardas pretorianos, sua audiência cativa. A carta revela um Paulo não abatido, mas transbordando de alegria e esperança, focado não em suas dores, mas na glória de <span class="rich-text"><i>Christos</i> - Χριστός - Ungido</span>.</li>
                            </ul>

                            <h3>2. A Comunidade de Filipos: Um Vínculo Especial</h3>
                            <ul>
                                <li>Ao contrário de algumas de suas outras cartas que abordavam heresias ou divisões, Filipenses é marcada por um tom de carinho e profunda afeição. Paulo tinha um relacionamento único com os filipenses, que o haviam apoiado consistentemente em suas missões. Ele os via como seus "cooperadores" no Evangelho. A igreja em Filipos era um farol de fé e generosidade, e Paulo os usa como exemplo de vida cristã.</li>
                            </ul>

                            <h3>3. A Mensagem Central do Autor: Cristo é Tudo</h3>
                            <ul>
                                <li>Para Paulo, a essência da vida cristã era Cristo. Seja para viver ou para morrer, Cristo era o centro. Ele exemplifica a renúncia de todos os privilégios e realizações pessoais para "ganhar a Cristo" (Filipenses 3:8). Sua autoridade como apóstolo não vinha de sua ascendência ou educação, mas de sua vocação divina e de seu sofrimento por Cristo. A carta é um reflexo do coração de um homem que encontrou sua completa satisfação e propósito em Jesus.</li>
                            </ul>
                        `
                    }
                ]
            },
            "filipenses_1": {
                title: "A RIQUEZA DA SALVAÇÃO EM SOFRIMENTO",
                date: "11/04 (Segunda)",
                desc: "\"Porque para mim o viver é Cristo, e o morrer é lucro.\"",
                blocks: [
                    {
                        title: "Parceria no Evangelho e o Dilema de Paulo",
                        verse: "Dou graças ao meu Deus todas as vezes que me lembro de vós. (Filipenses 1:3)",
                        exegesis: `
                            <h3>1. Ação de Graças pela <span class="rich-text"><i>Koinonia</i> - κοινωνία - Comunhão</span></h3>
                            <ul>
                                <li>Paulo inicia a carta expressando sua profunda gratidão e alegria pelos filipenses, lembrando-se da <span class="rich-text"><i>koinonia</i> - κοινωνia - Comunhão/Parceria</span> deles no Evangelho "desde o primeiro dia até agora". Isso sugere que a igreja de Filipos não apenas creu no Evangelho, mas ativamente o apoiou e participou de sua propagação. Esta parceria não era meramente financeira, mas uma união espiritual no propósito de Deus.</li>
                            </ul>
                            
                            <h3>2. O Dilema de Paulo: Viver ou Morrer</h3>
                            <ul>
                                <li>Em meio à sua prisão, Paulo enfrenta um dilema existencial. Para ele, "o viver é Cristo, e o morrer é lucro" (Filipenses 1:21). Sua vida tinha um único propósito: magnificar a <span class="rich-text"><i>Christos</i> - Χριστός - Ungido</span>. A morte não era um fim, mas um caminho para uma união ainda mais íntima com o Senhor. Ele anseia estar com Cristo, mas reconhece que sua permanência na terra é mais necessária para o "progresso e gozo da fé" dos filipenses.</li>
                            </ul>

                            <h3>3. Dignos do Evangelho e Sofrimento Compartilhado</h3>
                            <ul>
                                <li>Paulo exorta os filipenses a "andarem como é digno do evangelho de <span class="rich-text"><i>Christos</i> - Χριστός - Ungido</span>" (Filipenses 1:27). Isso implica unidade, coragem e firmeza diante da oposição. Ele lembra que o privilégio de crer em Cristo também inclui o privilégio de sofrer por Ele. O sofrimento por Cristo não é um sinal de fraqueza, mas uma demonstração de força e autenticidade da fé, unindo os crentes em uma luta comum pelo Evangelho.</li>
                            </ul>
                        `
                    }
                ]
            },
            "filipenses_2": {
                title: "HUMILDADE E A MENTE DE CRISTO",
                date: "12/04 (Terça)",
                desc: "\"Nada façais por partidarismo ou por vanglória; mas com humildade, considerando cada um os outros superiores a si mesmo.\"",
                blocks: [
                    {
                        title: "A <span class="rich-text"><i>Kenosis</i> - κένωσις - Esvaziamento</span> de Cristo e a Unidade",
                        verse: "Tende em vós o mesmo sentimento que houve também em Cristo Jesus. (Filipenses 2:5)",
                        exegesis: `
                            <h3>1. A Exortação à Unidade e Humildade</h3>
                            <ul>
                                <li>Com base na alegria e consolo em Cristo, Paulo faz uma poderosa exortação à unidade. Ele os insta a ter o mesmo "sentimento" ou "disposição mental" (φρονέω - phroneō) que Cristo. Isso significa nada fazer por ambição egoísta ou vaidade, mas com humildade, considerando os outros superiores a si mesmos. A humildade é o alicerce para a verdadeira unidade cristã.</li>
                            </ul>
                            
                            <h3>2. O Hino de <span class="rich-text"><i>Kenosis</i> - κένωσις - Esvaziamento</span> de Cristo</h3>
                            <ul>
                                <li>Os versículos 6-11 contêm um dos trechos mais profundos do Novo Testamento, descrevendo a encarnação e exaltação de Cristo. Embora tivesse a <span class="rich-text"><i>morphe</i> - μορφή - Forma/Natureza</span> divina, Ele não considerou o ser igual a Deus algo a ser retido. Ele se esvaziou, assumindo a <span class="rich-text"><i>morphe</i> - μορφή - Forma/Natureza</span> de servo, tornando-se obediente até a morte de cruz. Este é o exemplo máximo de humildade e serviço que os crentes devem imitar.</li>
                            </ul>

                            <h3>3. Trabalhando a Salvação com Temor e Tremor</h3>
                            <ul>
                                <li>Após apresentar o exemplo de Cristo, Paulo instrui os crentes a "desenvolverem a sua salvação com temor e tremor" (Filipenses 2:12). Isso não significa ganhar a salvação por obras, mas viver de acordo com a salvação já recebida, com reverência e seriedade. Deus está operando neles tanto o querer quanto o efetuar, reforçando a soberania divina e a responsabilidade humana. Eles devem brilhar como "luminares no mundo", contrastando com a geração "perversa e corrupta" ao redor.</li>
                            </ul>
                        `
                    }
                ]
            },
            "filipenses_3": {
                title: "GANHAR A CRISTO E AVANÇAR NA FÉ",
                date: "13/04 (Quarta)",
                desc: "\"Mas o que para mim era lucro, isto considerei perda por causa de Cristo.\"",
                blocks: [
                    {
                        title: "Cuidado com os Falsos Mestres e a <span class="rich-text"><i>Dikaiosyne</i> - δικαιοσύνη - Justiça</span> de Deus",
                        verse: "Tendo por perda todas as coisas, pela excelência do conhecimento de Cristo Jesus, meu Senhor. (Filipenses 3:8)",
                        exegesis: `
                            <h3>1. A Advertência Contra o Legalismo</h3>
                            <ul>
                                <li>Paulo adverte severamente contra os "cães" e os "maus obreiros", que são os judaizantes, legalistas que insistiam na circuncisão e na obediência à lei para a salvação. Ele os chama de "mutiladores" (Filipenses 3:2). Em contraste, Paulo descreve a verdadeira "circuncisão" como sendo aqueles que adoram a Deus no Espírito, se gloriam em Cristo Jesus e não depositam confiança na carne.</li>
                            </ul>
                            
                            <h3>2. A Renúncia das Realizações Pessoais: Tudo é <span class="rich-text"><i>Skubala</i> - σκύβαλα - Lixo</span></h3>
                            <ul>
                                <li>Para ilustrar seu ponto, Paulo lista suas próprias credenciais judaicas impecáveis: circuncidado ao oitavo dia, da tribo de Benjamim, fariseu exemplar, perseguidor da igreja e irrepreensível na justiça da lei. No entanto, ele declara que todas essas coisas, que antes considerava lucro, agora as tem por "perda" e <span class="rich-text"><i>skubala</i> - σκύβαλα - lixo/esterco</span> por causa da "excelência do conhecimento de Cristo Jesus". Sua maior aspiração é "ganhar a Cristo e ser achado Nele", tendo a <span class="rich-text"><i>dikaiosyne</i> - δικαιοσύνη - justiça</span> que vem de Deus, pela fé.</li>
                            </ul>

                            <h3>3. A Corrida para o Alvo</h3>
                            <ul>
                                <li>Paulo usa a metáfora de uma corrida para descrever a vida cristã. Ele "esquece as coisas que ficam para trás e avança para as que estão adiante" (Filipenses 3:13). Ele não considera ter já alcançado a perfeição, mas "prosseguirá para o alvo, pelo prêmio da soberana vocação de Deus em Cristo Jesus". Sua vida é um exemplo de busca contínua por Cristo, e ele os encoraja a imitá-lo, com os olhos fixos na "cidadania celestial" e na esperança da transformação do corpo humilhado.</li>
                            </ul>
                        `
                    }
                ]
            },
            "filipenses_4": {
                title: "ALEGRIA, PAZ E CONTENTAMENTO",
                date: "14/04 (Quinta)",
                desc: "\"Alegrai-vos sempre no Senhor; outra vez digo, alegrai-vos!\"",
                blocks: [
                    {
                        title: "A Paz que Excede Todo Entendimento e o Contentamento",
                        verse: "Não andeis ansiosos por coisa alguma; antes em tudo sejam os vossos pedidos conhecidos diante de Deus pela oração e súplica com ações de graças. (Filipenses 4:6)",
                        exegesis: `
                            <h3>1. Exortações Finais à Unidade e Alegria</h3>
                            <ul>
                                <li>Paulo conclui sua carta com exortações práticas e poderosas. Ele começa com um apelo direto a Evódia e Síntique, duas mulheres na igreja, para que se "harmonizem no Senhor", indicando uma possível desavença que ameaçava a unidade. Ele reitera o tema central: "Alegrai-vos sempre no Senhor; outra vez digo, alegrai-vos!" (Filipenses 4:4). Esta alegria é um mandamento e uma fonte de força, independente das circunstâncias.</li>
                            </ul>
                            
                            <h3>2. A Superação da Ansiedade com a <span class="rich-text"><i>Eirene</i> - εἰρήνη - Paz</span> de Deus</h3>
                            <ul>
                                <li>Contra a ansiedade que assola a vida humana, Paulo oferece uma solução divina: "Não andeis ansiosos por coisa alguma; antes em tudo sejam os vossos pedidos conhecidos diante de Deus pela oração e súplica com ações de graças" (Filipenses 4:6). A promessa é que a "<span class="rich-text"><i>eirene</i> - εἰρήνη - Paz</span> de Deus, que excede todo o entendimento", guardará os corações e mentes em <span class="rich-text"><i>Christos</i> - Χριστός - Ungido</span> Jesus. Esta paz é um muro protetor contra as preocupações e medos.</li>
                            </ul>

                            <h3>3. O Contentamento e o Poder em Cristo</h3>
                            <ul>
                                <li>Paulo os exorta a "<span class="rich-text"><i>logizomai</i> - λογίζομαι - Pensar/Considerar</span> em tudo que é verdadeiro, nobre, justo, puro, amável, de boa fama" (Filipenses 4:8), direcionando a mente para a santidade. Ele também revela o segredo de seu contentamento: "aprendi a adaptar-me a toda e qualquer circunstância" (Filipenses 4:11). Seja na abundância ou na escassez, a fonte de sua força é a famosa declaração: "Posso todas as coisas naquele que me fortalece" (Filipenses 4:13). Ele agradece a generosidade dos filipenses, vendo-a como um "sacrifício aceitável e agradável a Deus", e garante que "o meu Deus, segundo as suas riquezas em glória, há de suprir cada uma de vossas necessidades em Cristo Jesus".</li>
                            </ul>
                        `
                    }
                ]
            }
        };

        // === LÓGICA GERAL ===
        let currentAudioBlob = null;
        let mediaRecorder;
        let audioChunks = [];

        function loadChapter(chapterKey) {
            const data = bibleData[chapterKey];
            if (!data) return;

            const heroTitle = document.getElementById('heroTitle');
            const heroDesc = document.getElementById('heroDesc');
            const dateBadge = document.getElementById('dateBadge');
            const dateValue = document.getElementById('dateValue');
            const communitySection = document.getElementById('community-section');
            const formChapterKey = document.getElementById('formChapterKey');
            
            heroTitle.style.opacity = '0';
            heroDesc.style.opacity = '0';
            dateBadge.style.opacity = '0';
            
            setTimeout(() => {
                if (data.date) {
                    dateValue.textContent = data.date;
                    dateBadge.classList.remove('hidden');
                    communitySection.classList.remove('hidden');
                    formChapterKey.value = chapterKey;
                    carregarComentarios(chapterKey);
                    setTimeout(() => { dateBadge.style.opacity = '1'; }, 100);
                } else {
                    dateBadge.classList.add('hidden');
                    communitySection.classList.add('hidden');
                }

                heroTitle.innerHTML = data.title;
                heroDesc.innerHTML = data.desc;
                heroTitle.style.opacity = '1';
                heroDesc.style.opacity = '1';
            }, 300);

            const mainContent = document.getElementById('content');
            mainContent.innerHTML = ''; 

            data.blocks.forEach((block) => {
                let borderColor = 'border-pink-600';
                let blurTop = 'bg-pink-600/5';
                let blurBottom = 'bg-pink-800/5';
                let borderPanel = 'border-pink-900/30';

                const html = `
                    <section class="reveal max-w-4xl mx-auto w-full relative">
                        <div class="absolute -inset-4 ${blurTop} to-transparent rounded-3xl blur-xl pointer-events-none"></div>
                        
                        <div class="space-y-6 relative z-10">
                            <div class="text-center mb-10">
                                <h2 class="text-3xl md:text-5xl font-serif text-white leading-tight mb-6">${block.title}</h2>
                                <div class="inline-block border-l-4 border-r-4 ${borderColor} px-6 py-4 italic text-slate-300 bg-[#0a0514]/50 shadow-sm max-w-3xl rounded-sm">
                                    "${block.verse}"
                                </div>
                            </div>
                            
                            <div class="bg-[#050510]/80 p-8 md:p-12 rounded-xl border ${borderPanel} transition shadow-2xl relative overflow-hidden">
                                <div class="absolute top-0 right-0 w-64 h-64 ${blurTop} rounded-full blur-3xl -mr-20 -mt-20 pointer-events-none"></div>
                                <div class="absolute bottom-0 left-0 w-64 h-64 ${blurBottom} rounded-full blur-3xl -ml-20 -mb-20 pointer-events-none"></div>
                                <div class="rich-text text-slate-300 text-[16px] md:text-lg leading-relaxed relative z-10 font-light">
                                    ${block.exegesis}
                                </div>
                            </div>
                        </div>
                    </section>
                `;
                mainContent.insertAdjacentHTML('beforeend', html);
            });
            resetObservers();
        }

        function carregarComentarios(capitulo) {
            const list = document.getElementById('commentsList');
            list.innerHTML = '<p class="text-center text-slate-500 text-sm animate-pulse">Carregando comentários...</p>';

            fetch(`api.php?acao=listar&capitulo=${capitulo}`)
            .then(res => res.json())
            .then(data => {
                list.innerHTML = '';
                if(data.length === 0) {
                    list.innerHTML = '<p class="text-center text-slate-500 text-sm">Seja o primeiro a comentar!</p>';
                    return;
                }
                data.forEach(c => {
                    let mediaHtml = '';
                    if(c.foto) mediaHtml += `<img src="${c.foto}" onclick="openImage(this.src)" class="mt-4 rounded-lg max-h-48 border border-slate-700 cursor-pointer hover:scale-[1.02] transition shadow-lg">`;
                    if(c.audio) mediaHtml += `<audio controls src="${c.audio}" class="mt-4 w-full"></audio>`;

                    const jaCurtiu = localStorage.getItem(`reagiu_likes_${c.id}`);
                    const jaAmem = localStorage.getItem(`reagiu_amem_${c.id}`);
                    const jaGloria = localStorage.getItem(`reagiu_gloria_${c.id}`);

                    let themeColor = 'text-pink-400';
                    let panelBorder = 'hover:border-pink-500/50';

                    const html = `
                        <div class="glass-panel p-5 pb-12 rounded-xl border border-slate-800 relative group transition ${panelBorder} bg-[#0a0514]/60">
                            <div class="flex justify-between items-start mb-3 border-b border-slate-800 pb-2">
                                <strong class="${themeColor} text-sm tracking-wide font-serif">${c.nome}</strong>
                                <span class="text-[10px] text-slate-500 uppercase tracking-widest">${new Date(c.data_envio).toLocaleDateString('pt-BR')}</span>
                            </div>
                            <p class="text-slate-300 text-sm leading-relaxed">${c.mensagem}</p>
                            ${mediaHtml}
                            
                            <div class="absolute bottom-3 right-4 flex gap-2">
                                <button onclick="reagirComentario(${c.id}, 'likes', this)" class="text-xs transition flex items-center gap-1 bg-black/80 px-2 py-1 rounded-full border border-slate-700 ${jaCurtiu ? 'text-red-500 border-red-500/30' : 'text-slate-400 hover:text-red-400'}" ${jaCurtiu ? 'disabled' : ''}>
                                    <i class="fa-solid fa-heart"></i> <span class="count font-bold">${c.likes || 0}</span>
                                </button>
                                <button onclick="reagirComentario(${c.id}, 'amem', this)" class="text-xs transition flex items-center gap-1 bg-black/80 px-2 py-1 rounded-full border border-slate-700 ${jaAmem ? 'text-pink-400 border-pink-400/30' : 'text-slate-400 hover:text-pink-400'}" ${jaAmem ? 'disabled' : ''}>
                                    <i class="fa-solid fa-hands-praying"></i> <span class="count font-bold">${c.amem || 0}</span>
                                </button>
                                <button onclick="reagirComentario(${c.id}, 'gloria', this)" class="text-xs transition flex items-center gap-1 bg-black/80 px-2 py-1 rounded-full border border-slate-700 ${jaGloria ? 'text-blue-500 border-blue-500/30' : 'text-slate-400 hover:text-blue-500'}" ${jaGloria ? 'disabled' : ''}>
                                    <i class="fa-solid fa-fire"></i> <span class="count font-bold">${c.gloria || 0}</span>
                                </button>
                            </div>
                        </div>
                    `;
                    list.insertAdjacentHTML('beforeend', html);
                });
            })
            .catch(err => {
                list.innerHTML = '<p class="text-center text-red-400 text-xs">Erro ao carregar comentários.</p>';
            });
        }

        function reagirComentario(id, tipo, btn) {
            if(localStorage.getItem(`reagiu_${tipo}_${id}`)) return;

            const icon = btn.querySelector('i');
            const countSpan = btn.querySelector('.count');
            let count = parseInt(countSpan.innerText);

            icon.classList.add('reacted-anim');
            btn.classList.remove('text-slate-400');
            
            if(tipo === 'likes') btn.classList.add('text-red-500', 'border-red-500/30');
            if(tipo === 'amem') btn.classList.add('text-pink-400', 'border-pink-400/30');
            if(tipo === 'gloria') btn.classList.add('text-blue-500', 'border-blue-500/30');

            countSpan.innerText = count + 1;
            btn.disabled = true;

            localStorage.setItem(`reagiu_${tipo}_${id}`, 'true');

            const formData = new FormData();
            formData.append('acao', 'reagir');
            formData.append('id', id);
            formData.append('tipo', tipo);

            fetch('api.php', { method: 'POST', body: formData });
        }

        document.getElementById('commentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            const formData = new FormData(this);
            formData.append('acao', 'salvar');
            if(currentAudioBlob) {
                formData.append('audio', currentAudioBlob, 'audio.wav');
            }

            fetch('api.php', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if(data.sucesso) {
                    this.reset();
                    document.getElementById('filePreview').innerHTML = '';
                    currentAudioBlob = null;
                    document.getElementById('recordText').innerText = "Gravar Áudio";
                    carregarComentarios(document.getElementById('formChapterKey').value);
                } else {
                    alert('Erro ao enviar.');
                }
            })
            .catch(() => alert('Erro de conexão.'))
            .finally(() => {
                btn.innerText = originalText;
                btn.disabled = false;
            });
        });

        function previewFile(input) {
            const preview = document.getElementById('filePreview');
            if(input.files && input.files[0]) {
                preview.innerHTML = `<i class="fa-solid fa-check text-green-400"></i> Imagem selecionada: ${input.files[0].name}`;
                preview.classList.remove('hidden');
            }
        }

        const recordBtn = document.getElementById('recordBtn');
        recordBtn.addEventListener('click', async () => {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                    mediaRecorder.onstop = () => {
                        currentAudioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        document.getElementById('filePreview').classList.remove('hidden');
                        document.getElementById('filePreview').innerHTML += '<br><i class="fa-solid fa-microphone text-green-400"></i> Áudio gravado!';
                    };
                    mediaRecorder.start();
                    recordBtn.classList.add('recording-pulse');
                    document.getElementById('recordText').innerText = "Parar Gravação";
                } catch (err) {
                    alert("Permita o uso do microfone para gravar.");
                }
            } else {
                mediaRecorder.stop();
                recordBtn.classList.remove('recording-pulse');
                document.getElementById('recordText').innerText = "Gravar Áudio";
            }
        });

        function openImage(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('imageModal').classList.remove('hidden');
        }
        function closeImage() {
            document.getElementById('imageModal').classList.add('hidden');
        }

        function resetObservers() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        const canvas = document.getElementById("particles-js");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        const particleColor = "rgba(236, 72, 153, 0.15)"; /* Pink */
        for(let i=0; i<80; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, spcX: Math.random()*0.5-0.25, spcY: Math.random()*0.5-0.25 });
        function animateParticles() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = particleColor; 
            particles.forEach(p => { p.x += p.spcX; p.y += p.spcY; if(p.x<0||p.x>canvas.width) p.spcX*=-1; if(p.y<0||p.y>canvas.height) p.spcY*=-1; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        loadChapter('intro_book');
    </script>
</body>
</html>
