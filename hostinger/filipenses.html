    <script>
        const bibleData = {
            "intro_book": {
                title: "A CARTA AOS FILIPENSES",
                date: null,
                desc: "<span class='text-xs uppercase tracking-[0.3em] text-pink-400 not-italic block mb-4'>Introdução: Sobre o Livro</span>\"A alegria em Cristo: do cárcere à eternidade.\"",
                blocks: [
                    {
                        title: "A Epístola da Alegria Ilimitada",
                        verse: "Regozijai-vos sempre no Senhor; outra vez digo, regozijai-vos. (Filipenses 4:4)",
                        exegesis: `
                            <p>A Epístola aos Filipenses é uma carta de profundo afeto e encorajamento, escrita por Paulo a uma de suas igrejas mais queridas. Diferente de outras epístolas que abordavam sérios problemas doutrinários ou morais, Filipenses é permeada por um tom de gratidão e alegria. A palavra "alegria" ou "regozijar" aparece cerca de 16 vezes neste pequeno livro, tornando-o um manual para a alegria cristã em qualquer circunstância.</p>
                            
                            <h3>1. A Origem de Filipos: Colônia Romana</h3>
                            <ul>
                                <li>Filipos era uma colônia romana na Macedônia, fundada por Filipe II, pai de Alexandre, o Grande. Seus cidadãos tinham orgulho de sua herança romana, vivendo sob leis e costumes de Roma. Paulo visitou Filipos em sua segunda viagem missionária (Atos 16), onde fundou a primeira igreja cristã na Europa, após ter uma visão de um homem macedônio pedindo ajuda.</li>
                                <li>A comunidade era composta principalmente de gentios, com pouquíssimos judeus e nenhuma sinagoga formal. A igreja era marcada pela generosidade e parceria com Paulo no evangelho, enviando-lhe auxílio financeiro várias vezes.</li>
                            </ul>
                            
                            <h3>2. Alegria no Cárcere (Chara)</h3>
                            <ul>
                                <li>Paulo escreve Filipenses enquanto estava preso em Roma, provavelmente sob prisão domiciliar (60-62 d.C.). É uma das "Cartas da Prisão". A ironia e o poder desta carta são que o apóstolo, acorrentado e aguardando um julgamento que poderia resultar em sua morte, transborda de uma alegria genuína e inabalável.</li>
                                <li>Essa alegria (<i>χαρά - chara - alegria</i>) não é um sentimento superficial baseado nas circunstâncias externas, mas uma profunda satisfação espiritual derivada da sua união com Cristo. A carta nos ensina que a verdadeira alegria é fruto do Espírito e pode florescer mesmo em meio ao sofrimento e à adversidade.</li>
                            </ul>

                            <h3>3. Temas Centrais: Unidade, Humildade e Contentamento</h3>
                            <ul>
                                <li>Além da alegria, Filipenses explora a necessidade de unidade na igreja, usando a humildade de Cristo como o modelo supremo (Capítulo 2). Paulo também trata da justiça pela fé, alertando contra o legalismo (Capítulo 3), e encerra com exortações à paz, ao contentamento (<i>αὐτάρκης - autarkes - autossuficiente/contente</i>) e à generosidade (Capítulo 4).</li>
                                <li>É uma carta prática que nos convida a viver uma vida cristocêntrica, onde cada aspecto de nossa existência é filtrado pela perspectiva do Evangelho e pela pessoa de Jesus Cristo.</li>
                            </ul>
                        `
                    }
                ]
            },
            "intro_author": {
                title: "SOBRE O AUTOR",
                date: null,
                desc: "\"Paulo e Timóteo, servos de Cristo Jesus, a todos os santos em Cristo Jesus que estão em Filipos...\"",
                blocks: [
                    {
                        title: "O Prisioneiro que Transbordava Alegria",
                        verse: "Sabem, irmãos, que o que me aconteceu tem antes contribuído para o progresso do evangelho. (Filipenses 1:12)",
                        exegesis: `
                            <p>A identidade de Paulo como autor desta carta é inquestionável, e sua condição de "servo de Cristo Jesus" (v.1) é central para entender a mensagem de Filipenses.</p>

                            <h3>1. Escrita das Cadeias Romanas</h3>
                            <ul>
                                <li>Filipenses é uma das quatro "Cartas da Prisão", juntamente com Efésios, Colossenses e Filemom. Paulo a escreveu por volta dos anos 60-62 d.C. enquanto estava preso em Roma. Ele se refere a si mesmo como "prisioneiro por amor de Cristo Jesus" (Fp 1:13). É notável que, estando fisicamente limitado e enfrentando a possibilidade da morte, Paulo irradie uma mensagem tão poderosa de alegria e esperança.</li>
                                <li>Sua prisão não o impediu; antes, serviu como um catalisador para a expansão do Evangelho, pois os guardas pretorianos (a guarda de elite do imperador) e outros na corte de Nero ouviam a mensagem de salvação através de seu testemunho. A adversidade, para Paulo, era uma oportunidade para Cristo ser engrandecido.</li>
                            </ul>

                            <h3>2. O Relacionamento Afetivo com os Filipenses</h3>
                            <ul>
                                <li>A igreja de Filipos era especial para Paulo. Ele não apenas a fundou, mas também manteve um relacionamento de proximidade e gratidão com seus membros. Eles foram a única igreja que consistentemente apoiou Paulo financeiramente em suas missões (Fp 4:15-16).</li>
                                <li>Essa carta é um testemunho da profunda <i>afeição (σπλάγχνα - splanchna - entranhas/afeição profunda)</i> que Paulo sentia pelos filipenses, comparando-a ao amor de Cristo Jesus (Fp 1:8). Ele os via como seus "cooperadores na graça", uma parceria (<i>κοινωνία - koinonia - parceria/comunhão</i>) que ia além do financeiro, abrangendo o propósito divino de pregar o Evangelho.</li>
                            </ul>

                            <h3>3. A Perspectiva de Paulo sobre a Vida e o Sofrimento</h3>
                            <ul>
                                <li>A vida de Paulo era totalmente centrada em Cristo. Sua identidade, seu propósito e sua esperança estavam fundamentados Nele. Sua habilidade de encontrar alegria em todas as circunstâncias – na prisão, na perseguição, na abundância ou na necessidade – era um reflexo de sua completa dependência e satisfação em Jesus.</li>
                                <li>Ele exemplifica a verdade de que a alegria não é a ausência de problemas, mas a presença de Deus em meio a eles. Esta carta é um testamento de um homem que, apesar das tribulações, permaneceu fiel à sua vocação e incitou outros a fazerem o mesmo, sempre com os olhos fixos na coroa que o aguardava.</li>
                            </ul>
                        `
                    }
                ]
            },
            "filipenses_1": {
                title: "VIVER É CRISTO, MORRER É LUCRO",
                date: "11 Abr (Quinta)",
                desc: "\"Porque para mim o viver é Cristo, e o morrer é ganho.\"",
                blocks: [
                    {
                        title: "Avanço do Evangelho e o Dilema de Paulo",
                        verse: "Porque para mim o viver é Cristo, e o morrer é ganho. (Filipenses 1:21)",
                        exegesis: `
                            <h3>1. Saudações e Oração por Discernimento</h3>
                            <ul>
                                <li>Paulo inicia a carta com uma saudação calorosa aos "santos em Cristo Jesus" em Filipos, incluindo bispos e diáconos. Sua oração pelos filipenses revela seu coração pastoral: ele pede que o amor deles "abunde mais e mais em ciência e em todo o conhecimento" (v. 9), para que possam discernir o que é melhor e serem "sinceros e sem ofensa até ao Dia de Cristo".</li>
                                <li>Essa oração por discernimento prático (<i>γνῶσις - gnosis - conhecimento/discernimento</i>) mostra que a fé não é cega, mas busca a sabedoria divina para uma conduta irrepreensível.</li>
                            </ul>
                            
                            <h3>2. A Prisão como Plataforma Missionária</h3>
                            <ul>
                                <li>É surpreendente como Paulo vê sua prisão. Ele declara que suas "prisões em Cristo" se tornaram "manifestas em todo o pretório e a todos os mais" (v. 13). O que era para ser uma restrição tornou-se um megafone para o Evangelho. Os guardas pretorianos (a guarda imperial romana) ouviam o Evangelho diretamente dele, e outros irmãos, encorajados por sua ousadia, pregavam com ainda mais confiança.</li>
                                <li>Mesmo que alguns pregassem por motivos egoístas, Paulo se alegrava porque "Cristo, de toda a maneira, ou com pretexto ou de verdade, é anunciado" (v. 18). Sua prioridade era a glória de Cristo, não sua própria reputação.</li>
                            </ul>

                            <h3>3. O Dilema de Paulo: Viver ou Morrer</h3>
                            <ul>
                                <li>O famoso versículo 21 resume a filosofia de vida de Paulo: "Porque para mim o viver (<i>ζῆν - zen - viver</i>) é Cristo, e o morrer é ganho". Ele estava dividido entre dois desejos igualmente poderosos:
                                    <ul>
                                        <li><strong>Permanecer vivo:</strong> Para continuar ministrando e sendo útil à igreja ("para vosso progresso e alegria na fé", v. 25).</li>
                                        <li><strong>Morrer:</strong> Para estar "com Cristo, que é muito melhor" (v. 23). Esta não era uma fuga da realidade, mas uma convicção da glória da vida eterna.</li>
                                    </ul>
                                </li>
                                <li>Paulo escolhe permanecer, por enquanto, pela necessidade dos filipenses, mostrando sua prioridade de serviço sacrificial. Ele exorta os crentes a viverem de modo "digno do evangelho de Cristo", mantendo a unidade e não se intimidando pelos adversários.</li>
                            </ul>
                        `
                    }
                ]
            },
            "filipenses_2": {
                title: "A MENTE DE CRISTO",
                date: "12 Abr (Sexta)",
                desc: "\"De sorte que haja em vós o mesmo sentimento que houve também em Cristo Jesus.\"",
                blocks: [
                    {
                        title: "Humildade Exaltada e Serviço Sacrificial",
                        verse: "De sorte que haja em vós o mesmo sentimento que houve também em Cristo Jesus. (Filipenses 2:5)",
                        exegesis: `
                            <h3>1. O Clamor por Unidade e Humildade</h3>
                            <ul>
                                <li>Paulo inicia o capítulo com um apelo apaixonado à unidade e à humildade, exortando os filipenses a terem "o mesmo parecer, tendo o mesmo amor, o mesmo ânimo, sentindo uma mesma coisa" (v. 2). Ele adverte contra a rivalidade e a vanglória, encorajando-os a considerar os outros superiores a si mesmos.</li>
                                <li>A chave para essa unidade é a mentalidade de Cristo: "Nada façais por partidarismo ou por vanglória, mas com humildade, considerando uns aos outros superiores a si mesmos" (v.3). A vaidade (`κενόδοξος - kenodoxos - vanglória`) é o oposto do caráter cristão.</li>
                            </ul>
                            
                            <h3>2. O Hino de Cristo: Kénosis e Exaltação</h3>
                            <ul>
                                <li>Os versículos 5 a 11 contêm o que é conhecido como o "Hino de Cristo", uma das passagens mais profundas do Novo Testamento sobre a encarnação, humilhação e exaltação de Jesus. Ele é apresentado como o modelo supremo de humildade:
                                    <ul>
                                        <li><strong>Pré-existência Divina:</strong> Embora sendo "em forma (<i>μορφή - morphē - forma/natureza</i>) de Deus", Ele não considerou Sua igualdade com Deus algo a que se apegar.</li>
                                        <li><strong>Esvaziamento (Kénosis):</strong> Ele "esvaziou-se a si mesmo" (<i>κένωσις - kénosis - esvaziamento</i>), tomando a forma de servo. Este não foi um esvaziamento de Sua divindade, mas uma renúncia ao exercício independente de Seus atributos divinos para assumir a condição humana.</li>
                                        <li><strong>Obediência e Morte:</strong> Ele se humilhou, tornando-se obediente até a morte, e morte de cruz, a forma mais humilhante de execução.</li>
                                        <li><strong>Exaltação:</strong> Por isso, Deus o exaltou soberanamente, dando-lhe o nome que está acima de todo nome, para que ao nome de Jesus todo joelho se dobre.</li>
                                    </ul>
                                </li>
                                <li>Esta é a base teológica para a humildade que Paulo exige da igreja: se Cristo, sendo Deus, se humilhou, quanto mais nós devemos fazê-lo.</li>
                            </ul>

                            <h3>3. Trabalhando a Salvação e Exemplos de Serviço</h3>
                            <ul>
                                <li>Paulo exorta os filipenses a "desenvolverem a vossa salvação com temor e tremor" (v. 12). Isso não significa ganhar a salvação por obras, mas viver uma vida que evidencie a transformação operada por Deus, que é quem "opera em vós tanto o querer como o efetuar, segundo a sua boa vontade" (v. 13).</li>
                                <li>Ele oferece dois exemplos vivos dessa mentalidade de Cristo: Timóteo, que genuinamente se importa com o bem-estar deles, e Epafrodito, que arriscou sua vida por causa do Evangelho ao levar a oferta a Paulo, quase morrendo de enfermidade em serviço. Ambos eram modelos de serviço altruísta e devoção a Cristo.</li>
                            </ul>
                        `
                    }
                ]
            },
            "filipenses_3": {
                title: "GANHO POR CRISTO, PERDA PELAS OBRAS",
                date: "13 Abr (Sábado)",
                desc: "\"Mas o que para mim era ganho reputei-o perda por Cristo.\"",
                blocks: [
                    {
                        title: "Justiça pela Fé e a Corrida para o Alvo",
                        verse: "Mas o que para mim era ganho reputei-o perda por Cristo. (Filipenses 3:7)",
                        exegesis: `
                            <h3>1. Advertência Contra os Legalistas</h3>
                            <ul>
                                <li>Paulo começa este capítulo com um forte aviso contra os "cães", os "maus obreiros", os "mutiladores da carne" (v. 2). Ele se refere aos judaizantes, que insistiam na circuncisão e na observância da Lei mosaica como condição para a salvação, diminuindo a obra de Cristo na cruz. Para Paulo, a verdadeira "circuncisão" é a espiritual, realizada pelo Espírito de Deus.</li>
                                <li>Ele os chama de "mutiladores" (<i>κατατομή - katatomē - mutilação</i>), contrastando com a glória da verdadeira circuncisão espiritual.</li>
                            </ul>
                            
                            <h3>2. As Credenciais de Paulo: Lixo por Cristo</h3>
                            <ul>
                                <li>Para desqualificar os legalistas, Paulo usa um argumento poderoso: se alguém tinha motivos para confiar na carne (nas obras e na linhagem), esse alguém era ele! Ele lista suas impressionantes credenciais judaicas (v. 5-6):
                                    <ul>
                                        <li>Circuncidado ao oitavo dia (conforme a Lei)</li>
                                        <li>Da linhagem de Israel, da tribo de Benjamim (puro israelita)</li>
                                        <li>Hebreu de hebreus (manteve a cultura e língua hebraica)</li>
                                        <li>Fariseu (a seita mais rigorosa do judaísmo)</li>
                                        <li>Quanto ao zelo, perseguidor da igreja</li>
                                        <li>Quanto à justiça que há na Lei, irrepreensível.</li>
                                    </ul>
                                </li>
                                <li>No entanto, tudo isso – todo o seu "ganho" religioso e pessoal – ele o considera "perda por causa de Cristo" (v. 7). Mais ainda, ele classifica essas coisas como "esterco" (<i>σκύβαλα - skybala - refugo/esterco</i>) para poder "ganhar a Cristo" (v. 8). Essa linguagem chocante enfatiza a absoluta superioridade de Cristo e da justiça que vem pela fé.</li>
                            </ul>

                            <h3>3. Correndo para o Alvo da Justiça e Ressurreição</h3>
                            <ul>
                                <li>A meta de Paulo não era a sua própria justiça, mas ser achado "nele, não tendo a minha justiça que vem da lei, mas a que vem pela fé em Cristo, a saber, a justiça que vem de Deus pela fé" (v. 9). Sua paixão era conhecer a Cristo, o poder da Sua ressurreição, e a <i>comunhão (κοινωνία - koinonia - comunhão/participação)</i> nos Seus sofrimentos.</li>
                                <li>Ele se via como um atleta em uma corrida, esquecendo-se das coisas que ficam para trás e avançando para o que está à frente, buscando o "prêmio da soberana vocação de Deus em Cristo Jesus" (v. 14). Sua cidadania era nos céus, de onde esperava o Salvador, que transformaria seu corpo humilhado em um corpo glorioso.</li>
                            </ul>
                        `
                    }
                ]
            },
            "filipenses_4": {
                title: "PAZ, CONTENTAMENTO E O SEGREDO DA ALEGRIA",
                date: "14 Abr (Domingo)",
                desc: "\"Posso todas as coisas em Cristo que me fortalece.\"",
                blocks: [
                    {
                        title: "Reconciliação, Oração e a Provisão Divina",
                        verse: "Posso todas as coisas em Cristo que me fortalece. (Filipenses 4:13)",
                        exegesis: `
                            <h3>1. Exortações à Unidade e à Oração</h3>
                            <ul>
                                <li>Paulo começa o capítulo com um apelo pessoal a duas mulheres, Evódia e Síntique, para que se reconciliem e tenham "o mesmo sentir no Senhor" (v. 2). A desunião era uma ameaça real, e Paulo as exorta a trabalhar juntas. Ele também convoca os filipenses à alegria constante: "Regozijai-vos sempre no Senhor; outra vez digo, regozijai-vos!" (v. 4).</li>
                                <li>A mansidão (`ἐπιεικεία - epieikeia - mansidão/razoabilidade`) deve ser evidente a todos, pois "o Senhor está perto". A resposta à ansiedade é a oração: "Não andeis ansiosos por coisa alguma; antes em tudo sejam os vossos pedidos conhecidos diante de Deus pela oração (<i>προσευχή - proseuche - oração</i>) e súplica, com ações de graças" (v. 6). O resultado é a "paz de Deus, que excede todo o entendimento, guardará os vossos corações e os vossos sentimentos em Cristo Jesus".</li>
                            </ul>
                            
                            <h3>2. O Poder do Pensamento Positivo e Cristo como Força</h3>
                            <ul>
                                <li>A mente do crente deve ser disciplinada. Paulo os instrui a `φρονεῖτε (phroneite - pensai/considerai)` em tudo o que é verdadeiro, honesto, justo, puro, amável, de boa fama, e se há alguma virtude ou louvor, nisso pensei (v. 8). Essa lista é um filtro para os pensamentos, garantindo que a mente seja preenchida com o que edifica.</li>
                                <li>O famoso versículo 13, "Posso todas as coisas em Cristo que me fortalece", é frequentemente tirado do contexto, mas aqui significa que Paulo havia aprendido o segredo do contentamento (<i>αὐτάρκης - autarkes - autossuficiente/contente</i>) em todas as circunstâncias, seja na abundância ou na necessidade, através da força que Cristo lhe dava. Sua força vinha da união com Cristo, não de si mesmo.</li>
                            </ul>

                            <h3>3. Gratidão pela Generosidade Filipense</h3>
                            <ul>
                                <li>Paulo expressa profunda gratidão pelo apoio financeiro contínuo dos filipenses, especialmente a oferta que Epafrodito havia levado. Ele descreve a oferta deles como um "cheiro suave, sacrifício aceitável e aprazível a Deus" (v. 18). Isso demonstra a conexão espiritual entre o ofertante e Deus.</li>
                                <li>Sua promessa final é uma bênção: "O meu Deus, segundo as suas riquezas em glória, há de suprir cada uma de vossas necessidades em Cristo Jesus" (v. 19). Essa provisão divina não era apenas material, mas abarcava todas as dimensões da vida, conforme a infinita riqueza de Deus. A carta termina com saudações e uma bênção final, reiterando a graça do Senhor Jesus Cristo.</li>
                            </ul>
                        `
                    }
                ]
            }
        };

        // === LÓGICA GERAL ===
        let currentAudioBlob = null;
        let mediaRecorder;
        let audioChunks = [];

        function loadChapter(chapterKey) {
            const data = bibleData[chapterKey];
            if (!data) return;

            const heroTitle = document.getElementById('heroTitle');
            const heroDesc = document.getElementById('heroDesc');
            const dateBadge = document.getElementById('dateBadge');
            const dateValue = document.getElementById('dateValue');
            const communitySection = document.getElementById('community-section');
            const formChapterKey = document.getElementById('formChapterKey');
            
            heroTitle.style.opacity = '0';
            heroDesc.style.opacity = '0';
            dateBadge.style.opacity = '0';
            
            setTimeout(() => {
                if (data.date) {
                    dateValue.textContent = data.date;
                    dateBadge.classList.remove('hidden');
                    communitySection.classList.remove('hidden');
                    formChapterKey.value = chapterKey;
                    carregarComentarios(chapterKey);
                    setTimeout(() => { dateBadge.style.opacity = '1'; }, 100);
                } else {
                    dateBadge.classList.add('hidden');
                    communitySection.classList.add('hidden');
                }

                heroTitle.innerHTML = data.title;
                heroDesc.innerHTML = data.desc;
                heroTitle.style.opacity = '1';
                heroDesc.style.opacity = '1';
            }, 300);

            const mainContent = document.getElementById('content');
            mainContent.innerHTML = ''; 

            data.blocks.forEach((block) => {
                let borderColor = 'border-pink-600';
                let blurTop = 'bg-pink-600/5';
                let blurBottom = 'bg-pink-800/5';
                let borderPanel = 'border-pink-900/30';

                const html = `
                    <section class="reveal max-w-4xl mx-auto w-full relative">
                        <div class="absolute -inset-4 ${blurTop} to-transparent rounded-3xl blur-xl pointer-events-none"></div>
                        
                        <div class="space-y-6 relative z-10">
                            <div class="text-center mb-10">
                                <h2 class="text-3xl md:text-5xl font-serif text-white leading-tight mb-6">${block.title}</h2>
                                <div class="inline-block border-l-4 border-r-4 ${borderColor} px-6 py-4 italic text-slate-300 bg-[#0a0514]/50 shadow-sm max-w-3xl rounded-sm">
                                    "${block.verse}"
                                </div>
                            </div>
                            
                            <div class="bg-[#050510]/80 p-8 md:p-12 rounded-xl border ${borderPanel} transition shadow-2xl relative overflow-hidden">
                                <div class="absolute top-0 right-0 w-64 h-64 ${blurTop} rounded-full blur-3xl -mr-20 -mt-20 pointer-events-none"></div>
                                <div class="absolute bottom-0 left-0 w-64 h-64 ${blurBottom} rounded-full blur-3xl -ml-20 -mb-20 pointer-events-none"></div>
                                <div class="rich-text text-slate-300 text-[16px] md:text-lg leading-relaxed relative z-10 font-light">
                                    ${block.exegesis}
                                </div>
                            </div>
                        </div>
                    </section>
                `;
                mainContent.insertAdjacentHTML('beforeend', html);
            });
            resetObservers();
        }

        function carregarComentarios(capitulo) {
            const list = document.getElementById('commentsList');
            list.innerHTML = '<p class="text-center text-slate-500 text-sm animate-pulse">Carregando comentários...</p>';

            fetch(`api.php?acao=listar&capitulo=${capitulo}`)
            .then(res => res.json())
            .then(data => {
                list.innerHTML = '';
                if(data.length === 0) {
                    list.innerHTML = '<p class="text-center text-slate-500 text-sm">Seja o primeiro a comentar!</p>';
                    return;
                }
                data.forEach(c => {
                    let mediaHtml = '';
                    if(c.foto) mediaHtml += `<img src="${c.foto}" onclick="openImage(this.src)" class="mt-4 rounded-lg max-h-48 border border-slate-700 cursor-pointer hover:scale-[1.02] transition shadow-lg">`;
                    if(c.audio) mediaHtml += `<audio controls src="${c.audio}" class="mt-4 w-full"></audio>`;

                    const jaCurtiu = localStorage.getItem(`reagiu_likes_${c.id}`);
                    const jaAmem = localStorage.getItem(`reagiu_amem_${c.id}`);
                    const jaGloria = localStorage.getItem(`reagiu_gloria_${c.id}`);

                    let themeColor = 'text-pink-400';
                    let panelBorder = 'hover:border-pink-500/50';

                    const html = `
                        <div class="glass-panel p-5 pb-12 rounded-xl border border-slate-800 relative group transition ${panelBorder} bg-[#0a0514]/60">
                            <div class="flex justify-between items-start mb-3 border-b border-slate-800 pb-2">
                                <strong class="${themeColor} text-sm tracking-wide font-serif">${c.nome}</strong>
                                <span class="text-[10px] text-slate-500 uppercase tracking-widest">${new Date(c.data_envio).toLocaleDateString('pt-BR')}</span>
                            </div>
                            <p class="text-slate-300 text-sm leading-relaxed">${c.mensagem}</p>
                            ${mediaHtml}
                            
                            <div class="absolute bottom-3 right-4 flex gap-2">
                                <button onclick="reagirComentario(${c.id}, 'likes', this)" class="text-xs transition flex items-center gap-1 bg-black/80 px-2 py-1 rounded-full border border-slate-700 ${jaCurtiu ? 'text-red-500 border-red-500/30' : 'text-slate-400 hover:text-red-400'}" ${jaCurtiu ? 'disabled' : ''}>
                                    <i class="fa-solid fa-heart"></i> <span class="count font-bold">${c.likes || 0}</span>
                                </button>
                                <button onclick="reagirComentario(${c.id}, 'amem', this)" class="text-xs transition flex items-center gap-1 bg-black/80 px-2 py-1 rounded-full border border-slate-700 ${jaAmem ? 'text-pink-400 border-pink-400/30' : 'text-slate-400 hover:text-pink-400'}" ${jaAmem ? 'disabled' : ''}>
                                    <i class="fa-solid fa-hands-praying"></i> <span class="count font-bold">${c.amem || 0}</span>
                                </button>
                                <button onclick="reagirComentario(${c.id}, 'gloria', this)" class="text-xs transition flex items-center gap-1 bg-black/80 px-2 py-1 rounded-full border border-slate-700 ${jaGloria ? 'text-blue-500 border-blue-500/30' : 'text-slate-400 hover:text-blue-500'}" ${jaGloria ? 'disabled' : ''}>
                                    <i class="fa-solid fa-fire"></i> <span class="count font-bold">${c.gloria || 0}</span>
                                </button>
                            </div>
                        </div>
                    `;
                    list.insertAdjacentHTML('beforeend', html);
                });
            })
            .catch(err => {
                list.innerHTML = '<p class="text-center text-red-400 text-xs">Erro ao carregar comentários.</p>';
            });
        }

        function reagirComentario(id, tipo, btn) {
            if(localStorage.getItem(`reagiu_${tipo}_${id}`)) return;

            const icon = btn.querySelector('i');
            const countSpan = btn.querySelector('.count');
            let count = parseInt(countSpan.innerText);

            icon.classList.add('reacted-anim');
            btn.classList.remove('text-slate-400');
            
            if(tipo === 'likes') btn.classList.add('text-red-500', 'border-red-500/30');
            if(tipo === 'amem') btn.classList.add('text-pink-400', 'border-pink-400/30');
            if(tipo === 'gloria') btn.classList.add('text-blue-500', 'border-blue-500/30');

            countSpan.innerText = count + 1;
            btn.disabled = true;

            localStorage.setItem(`reagiu_${tipo}_${id}`, 'true');

            const formData = new FormData();
            formData.append('acao', 'reagir');
            formData.append('id', id);
            formData.append('tipo', tipo);

            fetch('api.php', { method: 'POST', body: formData });
        }

        document.getElementById('commentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            const formData = new FormData(this);
            formData.append('acao', 'salvar');
            if(currentAudioBlob) {
                formData.append('audio', currentAudioBlob, 'audio.wav');
            }

            fetch('api.php', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if(data.sucesso) {
                    this.reset();
                    document.getElementById('filePreview').innerHTML = '';
                    currentAudioBlob = null;
                    document.getElementById('recordText').innerText = "Gravar Áudio";
                    carregarComentarios(document.getElementById('formChapterKey').value);
                } else {
                    alert('Erro ao enviar.');
                }
            })
            .catch(() => alert('Erro de conexão.'))
            .finally(() => {
                btn.innerText = originalText;
                btn.disabled = false;
            });
        });

        function previewFile(input) {
            const preview = document.getElementById('filePreview');
            if(input.files && input.files[0]) {
                preview.innerHTML = `<i class="fa-solid fa-check text-green-400"></i> Imagem selecionada: ${input.files[0].name}`;
                preview.classList.remove('hidden');
            }
        }

        const recordBtn = document.getElementById('recordBtn');
        recordBtn.addEventListener('click', async () => {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                    mediaRecorder.onstop = () => {
                        currentAudioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        document.getElementById('filePreview').classList.remove('hidden');
                        document.getElementById('filePreview').innerHTML += '<br><i class="fa-solid fa-microphone text-green-400"></i> Áudio gravado!';
                    };
                    mediaRecorder.start();
                    recordBtn.classList.add('recording-pulse');
                    document.getElementById('recordText').innerText = "Parar Gravação";
                } catch (err) {
                    alert("Permita o uso do microfone para gravar.");
                }
            } else {
                mediaRecorder.stop();
                recordBtn.classList.remove('recording-pulse');
                document.getElementById('recordText').innerText = "Gravar Áudio";
            }
        });

        function openImage(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('imageModal').classList.remove('hidden');
        }
        function closeImage() {
            document.getElementById('imageModal').classList.add('hidden');
        }

        function resetObservers() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        const canvas = document.getElementById("particles-js");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        for(let i=0; i<80; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, spcX: Math.random()*0.5-0.25, spcY: Math.random()*0.5-0.25 });
        function animateParticles() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(236, 72, 153, 0.15)"; /* Pink */
            particles.forEach(p => { p.x += p.spcX; p.y += p.spcY; if(p.x<0||p.x>canvas.width) p.spcX*=-1; if(p.y<0||p.y>canvas.height) p.spcY*=-1; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        loadChapter('intro_book');
    </script>
</body>
</html>
