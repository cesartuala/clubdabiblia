    <script>
        const bibleData = {
            "intro_book": {
                title: "A CARTA AOS FILIPENSES",
                date: null,
                desc: "<span class='text-xs uppercase tracking-[0.3em] text-pink-400 not-italic block mb-4'>Introdução: Sobre o Livro</span>\"A epístola da alegria e do serviço, escrita da prisão.\"",
                blocks: [
                    {
                        title: "A Epístola da Alegria em Meio ao Sofrimento",
                        verse: "Tendo por certo isto mesmo, que aquele que em vós começou a boa obra a aperfeiçoará até ao Dia de Jesus Cristo. (Fp 1:6)",
                        exegesis: `
                            <h3>1. O Contexto Histórico: Filipos, uma Colônia Romana</h3>
                            <ul>
                                <li>Filipos foi a primeira cidade europeia a ouvir o Evangelho, durante a segunda viagem missionária de Paulo (Atos 16). Era uma cidade singular, uma colônia romana (<i>Colonia - kōlōnia - Colônia romana</i>), o que significa que seus cidadãos gozavam de privilégios e direitos de cidadania romana, refletindo o orgulho cívico e o patriotismo. A igreja em Filipos era um grupo de crentes leais e generosos, que apoiaram Paulo financeiramente mais do que qualquer outra igreja. Essa carta, portanto, é carregada de um profundo afeto e gratidão, escrita por Paulo enquanto estava preso em Roma, por volta de 60-62 d.C.</li>
                            </ul>
                            
                            <h3>2. Análise Teológica: A Centralidade de Cristo e a Alegria</h3>
                            <ul>
                                <li>Filipenses é muitas vezes chamada de "Epístola da Alegria", pois a palavra "alegria" ou "regozijar" aparece cerca de 16 vezes em apenas 4 capítulos. O notável é que Paulo escreve essa carta da prisão, enfrentando a incerteza de vida ou morte. A fonte da alegria de Paulo não estava nas circunstâncias, mas em Cristo. O tema central é a centralidade de Cristo em tudo: "para mim o viver é Cristo" (Fp 1:21). A carta também destaca a <i>koinonia</i> (<i>Koinonia - koinōnia - Comunhão/Parceria</i>) dos crentes no Evangelho e a humilhação e exaltação de Cristo como modelo para todos os crentes.</li>
                            </ul>

                            <h3>3. Aplicação Prática: Contentamento e Serviço</h3>
                            <ul>
                                <li>A carta de Filipenses nos desafia a encontrar alegria em todas as circunstâncias, assim como Paulo. Ela nos ensina que a verdadeira alegria não depende da ausência de problemas, mas da presença de Cristo em nossa vida. Além disso, enfatiza o serviço (<i>Diakonia - diakonia - Serviço</i>) humilde e abnegado, seguindo o exemplo de Cristo que se esvaziou de Sua glória para servir. Para os filipenses, e para nós, é um chamado a viver de forma digna do evangelho, com unidade, humildade e uma alegria inabalável, não importando o que aconteça ao nosso redor.</li>
                            </ul>
                        `
                    }
                ]
            },
            "intro_author": {
                title: "SOBRE O APÓSTOLO PAULO",
                date: null,
                desc: "\"Paulo, servo de Jesus Cristo, a todos os santos em Cristo Jesus, que estão em Filipos...\"",
                blocks: [
                    {
                        title: "O Prisioneiro que Prega a Liberdade",
                        verse: "Para que o que me aconteceu viesse antes a promover o evangelho. (Fp 1:12)",
                        exegesis: `
                            <h3>1. Escrita das Cadeias: A Perspectiva de um <i>Desmios</i></h3>
                            <ul>
                                <li>A Epístola aos Filipenses é uma das quatro "Cartas da Prisão" (juntamente com Efésios, Colossenses e Filemom). Paulo a escreveu enquanto estava acorrentado em Roma, aguardando um julgamento que poderia significar sua execução. Ele se refere a si mesmo como "prisioneiro de Cristo Jesus" (<i>Desmios - desmios - Prisioneiro</i>), uma expressão que transforma sua privação física em uma designação de honra divina. A localização mais provável de sua prisão era no quartel general da Guarda Pretoriana (<i>Praetorion - praitorion - Quartel general pretoriano</i>), o que lhe deu acesso a influenciar a própria guarda imperial com o Evangelho, como ele mesmo atesta.</li>
                            </ul>

                            <h3>2. A Renúncia de Tudo por Causa de Cristo</h3>
                            <ul>
                                <li>A vida de Paulo é um testemunho vívido da mensagem que ele prega. Antes de sua conversão, ele tinha tudo que o judaísmo podia oferecer: linhagem, status, zelo. No entanto, ele considerou todas essas coisas como "perda" ou "esterco" por causa da "excelência do conhecimento de Cristo Jesus, meu Senhor" (Fp 3:7-8). Essa radicalidade mostra a profundidade de sua transformação e seu foco singular em Cristo. Sua vida é um exemplo de <i>kenosis</i> (<i>Kenosis - kenōsis - Esvaziamento</i>) pessoal, um eco do próprio Cristo.</li>
                            </ul>

                            <h3>3. O Legado do Evangelho</h3>
                            <ul>
                                <li>Apesar de sua prisão e das provações, Paulo mantinha uma perspectiva eterna. Para ele, a própria prisão servia para o avanço do Evangelho (Fp 1:12). Ele não se via como vítima, mas como um instrumento nas mãos de Deus. Seu amor pelos filipenses era genuíno, e sua preocupação primordial era que eles vivessem em unidade e perseverassem na fé. Ele nos lembra que a verdadeira <i>dikaiosynē</i> (<i>Dikaiosyne - dikaiosynē - Justiça</i>) vem de Deus por meio da fé, e não por méritos humanos. Seu legado é uma poderosa demonstração de alegria e contentamento em qualquer circunstância, sempre com o foco inabalável na glória de Cristo.</li>
                            </ul>
                        `
                    }
                ]
            },
            "filipenses_1": {
                title: "O TRIUNFO NO SOFRIMENTO",
                date: "11 Abr (Quinta)",
                desc: "\"Porque para mim o viver é Cristo, e o morrer é ganho.\"",
                blocks: [
                    {
                        title: "Alegria e Parceria no Avanço do Evangelho",
                        verse: "Tendo por certo isto mesmo, que aquele que em vós começou a boa obra a aperfeiçoará até ao Dia de Jesus Cristo. (Fp 1:6)",
                        exegesis: `
                            <h3>1. O Propósito da Prisão de Paulo</h3>
                            <ul>
                                <li>Paulo inicia a carta com uma oração de gratidão e alegria pelos filipenses, lembrando-se da "vossa <i>koinonia</i> no evangelho" (<i>Koinonia - koinōnia - Parceria</i>) desde o primeiro dia (v. 5). Ele assegura que sua prisão não é um revés para o Evangelho, mas uma oportunidade para ele avançar. As suas cadeias se tornaram conhecidas em todo o quartel do pretório e entre todos os demais, e encorajaram outros irmãos a pregar o Evangelho com mais ousadia (v. 12-14). Mesmo com alguns pregando por inveja, Paulo se alegra, pois Cristo está sendo proclamado. Isso demonstra uma perspectiva de <i>philanthropia</i> (<i>Philanthropia - philanthropia - Amor à humanidade</i>) divina que transcende as motivações humanas.</li>
                            </ul>
                            
                            <h3>2. O Dilema: Viver é Cristo, Morrer é Ganho</h3>
                            <ul>
                                <li>Paulo expressa um profundo dilema pessoal no versículo 21: "Porque para mim o viver é Cristo, e o morrer é ganho." Para ele, a <i>zoe</i> (<i>Zoe - zōē - Vida</i>) terrena é totalmente dedicada a Cristo, e o prolongamento dela significa mais serviço e fruto para o Evangelho. No entanto, a <i>thanatos</i> (<i>Thanatos - thanatos - Morte</i>) representa um ganho incomparável, pois o levaria à imediata presença de Cristo. Ele está "em aperto entre esses dois", mas opta por permanecer na carne para o benefício e progresso espiritual dos filipenses (v. 23-26).</li>
                            </ul>

                            <h3>3. Viver Digno do Evangelho em Unidade e Coragem</h3>
                            <ul>
                                <li>O apelo final do capítulo é para que os filipenses vivam de maneira digna do Evangelho (v. 27). Isso implica manter a unidade, lutar juntos pela fé e não se intimidar pelos adversários, o que é um sinal da salvação para eles e perdição para os inimigos. Paulo lembra-os que lhes foi concedido não apenas crer em Cristo, mas também sofrer por Ele (v. 29). A participação nos sofrimentos de Cristo é um privilégio, não um fardo. Esta exortação serve para fortalecer a igreja a permanecer firme, independentemente das perseguições externas.</li>
                            </ul>
                        `
                    }
                ]
            },
            "filipenses_2": {
                title: "A HUMILDE EXALTAÇÃO DE CRISTO",
                date: "12 Abr (Sexta)",
                desc: "\"De sorte que haja em vós o mesmo sentimento que houve também em Cristo Jesus.\"",
                blocks: [
                    {
                        title: "Unidade, Humildade e o Hino de Cristo",
                        verse: "De sorte que haja em vós o mesmo sentimento que houve também em Cristo Jesus. (Fp 2:5)",
                        exegesis: `
                            <h3>1. O Chamado à Unidade e à Humildade</h3>
                            <ul>
                                <li>Paulo implora aos filipenses por unidade e humildade, baseando-se nas consolações de Cristo, no conforto do amor, na comunhão do Espírito e na ternura e compaixões (v. 1). A exortação é clara: "Nada façais por contenda ou por vanglória, mas por <i>tapeinophrosyne</i> (<i>Tapeinophrosyne - tapeinophrosynē - Humildade</i>) cada um considere os outros superiores a si mesmo" (v. 3). Essa atitude altruísta é a chave para evitar divisões e promover um espírito de serviço uns aos outros, refletindo a essência do caráter de Cristo.</li>
                            </ul>
                            
                            <h3>2. O Hino Cristológico da <i>Kenosis</i> e Exaltação</h3>
                            <ul>
                                <li>Os versículos 6-11 contêm um dos mais profundos hinos cristológicos do Novo Testamento, descrevendo a encarnação e exaltação de Cristo. Ele, que era "em <i>morphē</i> (<i>Morphē - morphē - Forma</i>) de Deus", não considerou o ser igual a Deus como algo a que se apegar, mas "esvaziou-se a si mesmo" (<i>kenosis</i>), assumindo a forma de <i>doulos</i> (<i>Doulos - doulos - Servo</i>), tornando-se semelhante aos homens (v. 6-7). Sua obediência culminou na morte de cruz, e por isso, Deus o exaltou soberanamente, dando-lhe o nome que está acima de todo nome, para que todo joelho se dobre e toda língua confesse que Jesus Cristo é <i>Kyrios</i> (<i>Kyrios - kyrios - Senhor</i>), para a glória de Deus Pai.</li>
                            </ul>

                            <h3>3. A Aplicação: Trabalhar na Salvação com Temor</h3>
                            <ul>
                                <li>Com base no exemplo de Cristo, Paulo exorta os filipenses a "operardes a vossa salvação com temor e tremor" (v. 12). Isso não significa que a salvação é alcançada por obras, mas que a vida de fé deve manifestar-se em ações que correspondam à graça recebida. A frase "Deus é quem efetua em vós tanto o querer como o realizar" (v. 13) reforça a soberania de Deus na capacitação do crente. Eles deveriam brilhar como luzes no mundo (v. 15), segurando firmemente a palavra da vida, para que Paulo não tivesse trabalhado em vão. Timóteo e Epafrodito são apresentados como exemplos de serviço e sacrifício, ecoando o modelo de Cristo.</li>
                            </ul>
                        `
                    }
                ]
            },
            "filipenses_3": {
                title: "A SUPREMA EXCELÊNCIA DE CONHECER A CRISTO",
                date: "13 Abr (Sábado)",
                desc: "\"Mas o que para mim era ganho, reputei-o perda por Cristo.\"",
                blocks: [
                    {
                        title: "Perda por Cristo e a Busca pela Justiça Divina",
                        verse: "Mas o que para mim era ganho, reputei-o perda por Cristo. (Fp 3:7)",
                        exegesis: `
                            <h3>1. Advertência Contra os Falsos Mestres</h3>
                            <ul>
                                <li>Paulo começa este capítulo com um tom de alegria, mas rapidamente muda para uma advertência severa contra aqueles que ele chama de "cães", "maus obreiros" e "mutiladores" (v. 2) – referindo-se aos judaizantes que insistiam na necessidade da circuncisão e da obediência à Lei para a salvação. Ele os contrasta com os "verdadeiros circuncisos", que servem a Deus no Espírito, gloriam-se em Cristo Jesus e não confiam na carne. A <i>gnosis</i> (<i>Gnosis - gnōsis - Conhecimento</i>) verdadeira não reside em rituais, mas em uma experiência transformadora com o Salvador.</li>
                            </ul>
                            
                            <h3>2. As Credenciais de Paulo e a Perda por Cristo</h3>
                            <ul>
                                <li>Para desqualificar os judaizantes, Paulo lista suas próprias credenciais judaicas impecáveis: circuncidado ao oitavo dia, da tribo de Benjamim, hebreu de hebreus, fariseu quanto à lei, perseguidor da Igreja e irrepreensível quanto à justiça legal (v. 5-6). No entanto, ele declara que todas essas vantagens, que antes considerava "ganho", agora as reputa como "perda por causa de Cristo" (v. 7). Mais ainda, ele as considera <i>skubalon</i> (<i>Skubalon - skybalon - Lixo/Excremento</i>) para alcançar a excelência do conhecimento de Cristo, ser achado Nele, não tendo sua própria justiça, mas a justiça que vem de Deus pela fé (v. 8-9). Esta é a essência da <i>dikaiōsis</i> (<i>Dikaiōsis - dikaiōsis - Justificação</i>) pela fé.</li>
                            </ul>

                            <h3>3. A Aspiração: Conhecer a Cristo e a Perfeição Futura</h3>
                            <ul>
                                <li>A grande aspiração de Paulo é conhecer a Cristo profundamente: "para conhecê-lo, e à virtude da sua ressurreição, e à comunicação de suas aflições, sendo feito conforme a sua morte" (v. 10). Ele não considera ter já alcançado a perfeição, mas prossegue para o alvo, pelo prêmio da soberana vocação de Deus em Cristo Jesus (v. 12-14). Os crentes são cidadãos dos céus, de onde esperam o Salvador, o Senhor Jesus Cristo, que transformará o nosso corpo de humilhação em corpo glorioso, à semelhança do seu (v. 20-21). Esta escatologia reforça a futilidade de confiar em méritos terrenos e a necessidade de viver com uma perspectiva eterna, baseada na <i>pistis</i> (<i>Pistis - pistis - Fé</i>).</li>
                            </ul>
                        `
                    }
                ]
            },
            "filipenses_4": {
                title: "A PAZ QUE EXCEDE TODO ENTENDIMENTO",
                date: "14 Abr (Domingo)",
                desc: "\"Alegrai-vos sempre no Senhor; outra vez digo, alegrai-vos.\"",
                blocks: [
                    {
                        title: "Alegria, Paz e o Segredo do Contentamento",
                        verse: "Alegrai-vos sempre no Senhor; outra vez digo, alegrai-vos. (Fp 4:4)",
                        exegesis: `
                            <h3>1. Exortações Finais à Alegria e Paz</h3>
                            <ul>
                                <li>Paulo encerra a carta com uma série de exortações práticas, começando novamente com o mandamento à alegria: "Alegrai-vos sempre no Senhor; outra vez digo, alegrai-vos" (v. 4). Essa alegria não é uma emoção passageira, mas uma disposição constante enraizada na soberania de Deus. Ele também encoraja a moderação e a bondade ("seja a vossa moderação conhecida de todos os homens," v. 5). O Senhor está próximo, o que confere urgência a essas exortações. A chave para a <i>eirene</i> (<i>Eirene - eirēnē - Paz</i>) é a oração e a gratidão.</li>
                            </ul>
                            
                            <h3>2. A Superação da Ansiedade e o Contentamento</h3>
                            <ul>
                                <li>O famoso versículo 6 instrui os crentes a não se angustiarem com nada ("Não estejais inquietos por <i>panta</i> (<i>Panta - panta - Tudo</i>)"), mas a apresentarem todas as suas petições a Deus por meio de oração, súplica e ações de graças. O resultado é a "paz de Deus, que excede todo o entendimento" e que guardará os seus corações e pensamentos em Cristo Jesus (v. 7). Paulo ensina a cultivar uma mente cheia de coisas verdadeiras, honestas, justas, puras, amáveis e de boa fama (v. 8). Mais importante, ele revela o "segredo" de seu contentamento em todas as circunstâncias, seja na abundância ou na necessidade: "Tudo posso naquele que me fortalece" (v. 11-13). Ele é <i>autarkes</i> (<i>Autarkes - autarkēs - Contente/Autossuficiente</i>) por Cristo.</li>
                            </ul>

                            <h3>3. A Generosidade dos Filipenses e a Graça de Deus</h3>
                            <ul>
                                <li>Paulo agradece calorosamente a generosidade dos filipenses, que o haviam socorrido em suas necessidades (v. 10, 14-18). Ele reconhece que eles eram os únicos a compartilhar com ele "quanto a dar e receber" (v. 15), demonstrando sua fidelidade e parceria no Evangelho. Ele não busca o presente em si, mas o "fruto que aumente para o crédito deles" (v. 17). O apóstolo conclui com uma poderosa promessa de provisão divina: "O meu Deus, segundo as suas riquezas em glória, há de suprir cada uma das vossas necessidades em Cristo Jesus" (v. 19). Essa carta termina com saudações e uma bênção final, selando a profunda relação de amor e alegria entre Paulo e os crentes de Filipos.</li>
                            </ul>
                        `
                    }
                ]
            }
        };

        // === LÓGICA GERAL ===
        let currentAudioBlob = null;
        let mediaRecorder;
        let audioChunks = [];

        function loadChapter(chapterKey) {
            const data = bibleData[chapterKey];
            if (!data) return;

            const heroTitle = document.getElementById('heroTitle');
            const heroDesc = document.getElementById('heroDesc');
            const dateBadge = document.getElementById('dateBadge');
            const dateValue = document.getElementById('dateValue');
            const communitySection = document.getElementById('community-section');
            const formChapterKey = document.getElementById('formChapterKey');
            
            heroTitle.style.opacity = '0';
            heroDesc.style.opacity = '0';
            dateBadge.style.opacity = '0';
            
            setTimeout(() => {
                if (data.date) {
                    dateValue.textContent = data.date;
                    dateBadge.classList.remove('hidden');
                    communitySection.classList.remove('hidden');
                    formChapterKey.value = chapterKey;
                    carregarComentarios(chapterKey);
                    setTimeout(() => { dateBadge.style.opacity = '1'; }, 100);
                } else {
                    dateBadge.classList.add('hidden');
                    communitySection.classList.add('hidden');
                }

                heroTitle.innerHTML = data.title;
                heroDesc.innerHTML = data.desc;
                heroTitle.style.opacity = '1';
                heroDesc.style.opacity = '1';
            }, 300);

            const mainContent = document.getElementById('content');
            mainContent.innerHTML = ''; 

            data.blocks.forEach((block) => {
                let borderColor = 'border-pink-600';
                let blurTop = 'bg-pink-600/5';
                let blurBottom = 'bg-pink-800/5';
                let borderPanel = 'border-pink-900/30';

                const html = `
                    <section class="reveal max-w-4xl mx-auto w-full relative">
                        <div class="absolute -inset-4 ${blurTop} to-transparent rounded-3xl blur-xl pointer-events-none"></div>
                        
                        <div class="space-y-6 relative z-10">
                            <div class="text-center mb-10">
                                <h2 class="text-3xl md:text-5xl font-serif text-white leading-tight mb-6">${block.title}</h2>
                                <div class="inline-block border-l-4 border-r-4 ${borderColor} px-6 py-4 italic text-slate-300 bg-[#0a0514]/50 shadow-sm max-w-3xl rounded-sm">
                                    "${block.verse}"
                                </div>
                            </div>
                            
                            <div class="bg-[#050510]/80 p-8 md:p-12 rounded-xl border ${borderPanel} transition shadow-2xl relative overflow-hidden">
                                <div class="absolute top-0 right-0 w-64 h-64 ${blurTop} rounded-full blur-3xl -mr-20 -mt-20 pointer-events-none"></div>
                                <div class="absolute bottom-0 left-0 w-64 h-64 ${blurBottom} rounded-full blur-3xl -ml-20 -mb-20 pointer-events-none"></div>
                                <div class="rich-text text-slate-300 text-[16px] md:text-lg leading-relaxed relative z-10 font-light">
                                    ${block.exegesis}
                                </div>
                            </div>
                        </div>
                    </section>
                `;
                mainContent.insertAdjacentHTML('beforeend', html);
            });
            resetObservers();
        }

        function carregarComentarios(capitulo) {
            const list = document.getElementById('commentsList');
            list.innerHTML = '<p class="text-center text-slate-500 text-sm animate-pulse">Carregando comentários...</p>';

            fetch(`api.php?acao=listar&capitulo=${capitulo}`)
            .then(res => res.json())
            .then(data => {
                list.innerHTML = '';
                if(data.length === 0) {
                    list.innerHTML = '<p class="text-center text-slate-500 text-sm">Seja o primeiro a comentar!</p>';
                    return;
                }
                data.forEach(c => {
                    let mediaHtml = '';
                    if(c.foto) mediaHtml += `<img src="${c.foto}" onclick="openImage(this.src)" class="mt-4 rounded-lg max-h-48 border border-slate-700 cursor-pointer hover:scale-[1.02] transition shadow-lg">`;
                    if(c.audio) mediaHtml += `<audio controls src="${c.audio}" class="mt-4 w-full"></audio>`;

                    const jaCurtiu = localStorage.getItem(`reagiu_likes_${c.id}`);
                    const jaAmem = localStorage.getItem(`reagiu_amem_${c.id}`);
                    const jaGloria = localStorage.getItem(`reagiu_gloria_${c.id}`);

                    let themeColor = 'text-pink-400';
                    let panelBorder = 'hover:border-pink-500/50';

                    const html = `
                        <div class="glass-panel p-5 pb-12 rounded-xl border border-slate-800 relative group transition ${panelBorder} bg-[#0a0514]/60">
                            <div class="flex justify-between items-start mb-3 border-b border-slate-800 pb-2">
                                <strong class="${themeColor} text-sm tracking-wide font-serif">${c.nome}</strong>
                                <span class="text-[10px] text-slate-500 uppercase tracking-widest">${new Date(c.data_envio).toLocaleDateString('pt-BR')}</span>
                            </div>
                            <p class="text-slate-300 text-sm leading-relaxed">${c.mensagem}</p>
                            ${mediaHtml}
                            
                            <div class="absolute bottom-3 right-4 flex gap-2">
                                <button onclick="reagirComentario(${c.id}, 'likes', this)" class="text-xs transition flex items-center gap-1 bg-black/80 px-2 py-1 rounded-full border border-slate-700 ${jaCurtiu ? 'text-red-500 border-red-500/30' : 'text-slate-400 hover:text-red-400'}" ${jaCurtiu ? 'disabled' : ''}>
                                    <i class="fa-solid fa-heart"></i> <span class="count font-bold">${c.likes || 0}</span>
                                </button>
                                <button onclick="reagirComentario(${c.id}, 'amem', this)" class="text-xs transition flex items-center gap-1 bg-black/80 px-2 py-1 rounded-full border border-slate-700 ${jaAmem ? 'text-pink-400 border-pink-400/30' : 'text-slate-400 hover:text-pink-400'}" ${jaAmem ? 'disabled' : ''}>
                                    <i class="fa-solid fa-hands-praying"></i> <span class="count font-bold">${c.amem || 0}</span>
                                </button>
                                <button onclick="reagirComentario(${c.id}, 'gloria', this)" class="text-xs transition flex items-center gap-1 bg-black/80 px-2 py-1 rounded-full border border-slate-700 ${jaGloria ? 'text-blue-500 border-blue-500/30' : 'text-slate-400 hover:text-blue-500'}" ${jaGloria ? 'disabled' : ''}>
                                    <i class="fa-solid fa-fire"></i> <span class="count font-bold">${c.gloria || 0}</span>
                                </button>
                            </div>
                        </div>
                    `;
                    list.insertAdjacentHTML('beforeend', html);
                });
            })
            .catch(err => {
                list.innerHTML = '<p class="text-center text-red-400 text-xs">Erro ao carregar comentários.</p>';
            });
        }

        function reagirComentario(id, tipo, btn) {
            if(localStorage.getItem(`reagiu_${tipo}_${id}`)) return;

            const icon = btn.querySelector('i');
            const countSpan = btn.querySelector('.count');
            let count = parseInt(countSpan.innerText);

            icon.classList.add('reacted-anim');
            btn.classList.remove('text-slate-400');
            
            if(tipo === 'likes') btn.classList.add('text-red-500', 'border-red-500/30');
            if(tipo === 'amem') btn.classList.add('text-pink-400', 'border-pink-400/30');
            if(tipo === 'gloria') btn.classList.add('text-blue-500', 'border-blue-500/30');

            countSpan.innerText = count + 1;
            btn.disabled = true;

            localStorage.setItem(`reagiu_${tipo}_${id}`, 'true');

            const formData = new FormData();
            formData.append('acao', 'reagir');
            formData.append('id', id);
            formData.append('tipo', tipo);

            fetch('api.php', { method: 'POST', body: formData });
        }

        document.getElementById('commentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            const formData = new FormData(this);
            formData.append('acao', 'salvar');
            if(currentAudioBlob) {
                formData.append('audio', currentAudioBlob, 'audio.wav');
            }

            fetch('api.php', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if(data.sucesso) {
                    this.reset();
                    document.getElementById('filePreview').innerHTML = '';
                    currentAudioBlob = null;
                    document.getElementById('recordText').innerText = "Gravar Áudio";
                    carregarComentarios(document.getElementById('formChapterKey').value);
                } else {
                    alert('Erro ao enviar.');
                }
            })
            .catch(() => alert('Erro de conexão.'))
            .finally(() => {
                btn.innerText = originalText;
                btn.disabled = false;
            });
        });

        function previewFile(input) {
            const preview = document.getElementById('filePreview');
            if(input.files && input.files[0]) {
                preview.innerHTML = `<i class="fa-solid fa-check text-green-400"></i> Imagem selecionada: ${input.files[0].name}`;
                preview.classList.remove('hidden');
            }
        }

        const recordBtn = document.getElementById('recordBtn');
        recordBtn.addEventListener('click', async () => {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                    mediaRecorder.onstop = () => {
                        currentAudioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        document.getElementById('filePreview').classList.remove('hidden');
                        document.getElementById('filePreview').innerHTML += '<br><i class="fa-solid fa-microphone text-green-400"></i> Áudio gravado!';
                    };
                    mediaRecorder.start();
                    recordBtn.classList.add('recording-pulse');
                    document.getElementById('recordText').innerText = "Parar Gravação";
                } catch (err) {
                    alert("Permita o uso do microfone para gravar.");
                }
            } else {
                mediaRecorder.stop();
                recordBtn.classList.remove('recording-pulse');
                document.getElementById('recordText').innerText = "Gravar Áudio";
            }
        });

        function openImage(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('imageModal').classList.remove('hidden');
        }
        function closeImage() {
            document.getElementById('imageModal').classList.add('hidden');
        }

        function resetObservers() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        const canvas = document.getElementById("particles-js");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        const particleColor = "rgba(236, 72, 153, 0.15)"; /* Pink for Filipenses */
        for(let i=0; i<80; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, spcX: Math.random()*0.5-0.25, spcY: Math.random()*0.5-0.25 });
        function animateParticles() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = particleColor;
            particles.forEach(p => { p.x += p.spcX; p.y += p.spcY; if(p.x<0||p.x>canvas.width) p.spcX*=-1; if(p.y<0||p.y>canvas.height) p.spcY*=-1; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        loadChapter('intro_book');
    </script>
</body>
</html>
