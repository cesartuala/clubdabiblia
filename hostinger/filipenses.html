    <script>
        const bibleData = {
            "intro_book": {
                title: "A CARTA AOS FILIPENSES",
                date: null,
                desc: "<span class='text-xs uppercase tracking-[0.3em] text-pink-400 not-italic block mb-4'>Introdução: Sobre o Livro</span>\"A epístola da alegria e do serviço, escrita da prisão.\"",
                blocks: [
                    {
                        title: "Uma Carta de Alegria Inesgotável",
                        verse: "Regozijai-vos sempre no Senhor; outra vez digo, regozijai-vos. (Filipenses 4:4)",
                        exegesis: `
                            <p>Filipenses é, sem dúvida, a "Epístola da Alegria". Escrita por Paulo enquanto estava acorrentado em uma prisão romana, ela transborda com o tema da alegria (<i>chairō</i> - alegria, regozijo) e suas variantes, aparecendo mais de 16 vezes em apenas quatro capítulos. Longe de ser uma carta de lamentação, ela demonstra como a alegria pode ser encontrada em todas as circunstâncias, até mesmo no sofrimento, quando o centro da vida é Cristo.</p>
                            
                            <h3>1. O Contexto de Amor e Parceria (Koinonia)</h3>
                            <ul>
                                <li>A cidade de Filipos, na Macedônia, era uma colônia romana e a primeira cidade europeia onde Paulo pregou o evangelho. A igreja ali era muito especial para ele. Não há repreensões nesta carta, apenas um profundo afeto e gratidão pela <i>(Koinonia - Κοινωνία - comunhão/parceria)</i> dos filipenses no evangelho, tanto em apoio financeiro quanto em oração e sofrimento. Esta carta é um testemunho de um relacionamento saudável entre apóstolo e igreja.</li>
                            </ul>
                            
                            <h3>2. Cristo Como a Vida, o Exemplo e o Alvo</h3>
                            <ul>
                                <li>O tema central de Filipenses é a exaltação de Cristo. Para Paulo, Cristo é tudo. Ele é o motivo da vida (Fil 1:21), o exemplo máximo de humildade e serviço (Fil 2:5-11), e o alvo supremo pelo qual ele abandona tudo (Fil 3:8-14). A vida cristã é definida por essa centralidade de Cristo, que transforma o sofrimento em oportunidade de avanço do evangelho e a humildade em glória.</li>
                            </ul>

                            <h3>3. A Estrutura Prática da Alegria</h3>
                            <ul>
                                <li>A carta pode ser vista em quatro movimentos principais, cada um contribuindo para a compreensão da alegria cristã:
                                    <br>• <strong>Capítulo 1:</strong> A alegria na propagação do evangelho (mesmo na prisão).
                                    <br>• <strong>Capítulo 2:</strong> A alegria na humildade e serviço (o exemplo de Cristo).
                                    <br>• <strong>Capítulo 3:</strong> A alegria no conhecimento de Cristo (despojando-se da carne).
                                    <br>• <strong>Capítulo 4:</strong> A alegria na paz e na suficiência de Deus (superando a ansiedade).
                                </li>
                            </ul>
                        `
                    }
                ]
            },
            "intro_author": {
                title: "SOBRE O AUTOR",
                date: null,
                desc: "\"Paulo e Timóteo, servos de Jesus Cristo, a todos os santos em Cristo Jesus que estão em Filipos...\"",
                blocks: [
                    {
                        title: "O Prisioneiro e Sua Amada Igreja",
                        verse: "Dou graças ao meu Deus todas as vezes que me lembro de vós. (Filipenses 1:3)",
                        exegesis: `
                            <p>A Epístola aos Filipenses, escrita por Paulo por volta de 60-62 d.C., é uma das "Cartas da Prisão", juntamente com Efésios, Colossenses e Filemom. Ela revela a mente e o coração de um apóstolo que, apesar de algemado, vivia em liberdade espiritual e alegria inabalável.</p>

                            <h3>1. O Apóstolo em Correntes</h3>
                            <ul>
                                <li>Paulo escreve de sua prisão domiciliar em Roma. Não era um calabouço escuro, mas uma casa alugada onde ele podia receber visitas e continuar a pregar, embora sob guarda militar. Esta situação, que para muitos seria desoladora, era para Paulo uma oportunidade divina para o avanço do evangelho (Fil 1:12-14). Ele via suas correntes como um testemunho para a guarda pretoriana e para todos os outros, demonstrando que o evangelho não podia ser acorrentado. Sua persistência e alegria em tal cenário são um poderoso exemplo de fé e resiliência.</li>
                            </ul>

                            <h3>2. Um Vínculo Único com Filipos</h3>
                            <ul>
                                <li>A igreja de Filipos tinha um lugar especial no coração de Paulo. Desde sua fundação (Atos 16), marcada pela conversão de Lídia e do carcereiro, a igreja manteve uma relação calorosa e de apoio com o apóstolo. Eles foram a única igreja a enviar-lhe sustento financeiro repetidamente (Fil 4:15-16), o que era raro, pois Paulo geralmente preferia sustentar-se com seu próprio trabalho. O nome de Lídia, por exemplo, é de origem grega e significa "mulher da Lídia" (<i>Lydia - Λυδία - região da Ásia Menor</i>), ressaltando sua origem gentia e a universalidade do evangelho. O nome "Filipos" significa "cidade de Filipe", em homenagem a Filipe II da Macedônia, pai de Alexandre, o Grande.</li>
                            </ul>

                            <h3>3. O Legado de um Servo Fiel</h3>
                            <ul>
                                <li>A autoridade de Paulo não vinha de seu status social ou liberdade, mas de sua identificação total como "servo de Cristo Jesus" (Fil 1:1). Sua vida era uma demonstração prática do que pregava: viver para Cristo, morrer é lucro. Ele é um modelo de contentamento, foco espiritual e serviço abnegado, mesmo em face de adversidade. Ele enviou Timóteo, seu "verdadeiro filho na fé", para os filipenses, demonstrando a confiança e a parceria de serviço (<i>synergos - συνεργός - cooperador</i>) no ministério.</li>
                            </ul>
                        `
                    }
                ]
            },
            "filipenses_1": {
                title: "VIVER É CRISTO, MORRER É LUCRO",
                date: "11/04 (Segunda)",
                desc: "\"Porque para mim o viver é Cristo e o morrer é ganho.\"",
                blocks: [
                    {
                        title: "O Evangelho Inabalável de um Prisioneiro",
                        verse: "De maneira que as minhas prisões em Cristo foram manifestas em todo o pretório, e a todos os demais. (Filipenses 1:13)",
                        exegesis: `
                            <h3>1. O Conflito Interior de Paulo (Stenochoria)</h3>
                            <ul>
                                <li>Paulo inicia a carta expressando sua profunda gratidão e oração pelos filipenses. Ele não está focado em sua própria libertação, mas no avanço do evangelho. Ele revela um dilema pessoal intenso: o desejo de partir e estar com Cristo (o que seria "muitíssimo melhor") e a necessidade de permanecer na carne para o benefício da igreja. Este conflito (<i>stenochoria - στενοχωρία - angústia, aperto</i>) mostra sua completa submissão à vontade de Deus, onde seu próprio desejo de estar com Cristo é secundário ao propósito divino para os outros.</li>
                            </ul>
                            
                            <h3>2. As Correntes do Apóstolo e o Avanço do Evangelho</h3>
                            <ul>
                                <li>Incrivelmente, a prisão de Paulo não impediu, mas acelerou o evangelho. Ele menciona que suas "prisões em Cristo" se tornaram conhecidas em todo o pretório (a guarda imperial romana) e entre todos os demais. Isso significa que os soldados que o guardavam estavam ouvindo o evangelho continuamente. Além disso, seu exemplo encorajou outros crentes a pregar a Palavra com mais ousadia, sem temor. O sofrimento de Paulo tornou-se uma plataforma para a glória de Deus, transformando um cativeiro físico em liberdade espiritual para muitos.</li>
                            </ul>

                            <h3>3. A Centralidade de Cristo na Vida e na Morte (Logos Zoes)</h3>
                            <ul>
                                <li>A declaração central de Paulo: "Para mim o viver é Cristo e o morrer é lucro" (Fil 1:21), é uma das mais profundas afirmações de fé na Bíblia. Não é um hedonismo espiritual, mas uma total identificação com a pessoa e o propósito de Jesus. Viver sem Cristo não tem sentido; morrer, se for para estar com Ele, é a maior das recompensas. Esta é a essência do evangelho, a "palavra da vida" (<i>logos zoes - λόγος ζωῆς - palavra da vida</i>) que dá significado à existência e esperança à morte. O cristão é chamado a viver de forma digna do evangelho, permanecendo firme e lutando juntos pela fé.</li>
                            </ul>
                        `
                    }
                ]
            },
            "filipenses_2": {
                title: "A HUMILDADE DE CRISTO E A UNIDADE",
                date: "12/04 (Terça)",
                desc: "\"Tende em vós o mesmo sentimento que houve também em Cristo Jesus.\"",
                blocks: [
                    {
                        title: "O Hino da Kénosis e o Serviço Abnegado",
                        verse: "Nada façais por partidarismo ou por vaidade, mas com humildade, considerando cada um os outros superiores a si mesmo. (Filipenses 2:3)",
                        exegesis: `
                            <h3>1. Chamado à Unidade e Humildade (Tapeinophrosyne)</h3>
                            <ul>
                                <li>Paulo faz um apelo apaixonado à unidade na igreja de Filipos, exortando-os a ter "o mesmo sentimento" e a "um mesmo ânimo". A raiz de muitos conflitos e divisões é o egoísmo e a vaidade. Por isso, ele os instrui a "nada fazer por partidarismo ou por vanglória, mas por humildade (<i>tapeinophrosyne - ταπεινοφροσύνη - humildade, modéstia</i>), considerando cada um os outros superiores a si mesmos". Esta mentalidade é a chave para a paz e a cooperação, refletindo o caráter de Cristo e garantindo que o amor genuíno prevaleça sobre a rivalidade humana.</li>
                            </ul>
                            
                            <h3>2. O Hino de Cristo (Kénosis)</h3>
                            <ul>
                                <li>Os versículos 5 a 11 contêm um dos hinos cristológicos mais sublimes do Novo Testamento, descrevendo a humildade (<i>kénosis - κένωσις - esvaziamento</i>) e a exaltação de Cristo. Jesus, sendo Deus em sua forma e essência, não se apegou à sua igualdade com Deus, mas "esvaziou-se a si mesmo", assumindo a forma de servo (<i>doulos - δοῦλος - escravo/servo</i>) e tornando-se semelhante aos homens. Ele humilhou-se ainda mais, sendo obediente até a morte, e morte de cruz. Por isso, Deus o exaltou sobremaneira, dando-lhe o nome que está acima de todo nome, para que todo joelho se dobre a Ele. Este é o padrão supremo de serviço e sacrifício para os crentes.</li>
                            </ul>

                            <h3>3. Trabalhando a Salvação com Temor e Tremor</h3>
                            <ul>
                                <li>Paulo exorta os filipenses a "desenvolver a sua salvação com temor e tremor". Isso não significa que a salvação é alcançada por obras, mas que a vida de fé deve ser vivida ativamente, com seriedade e reverência a Deus. A razão para isso é que "é Deus quem efetua em vós tanto o querer como o realizar, segundo a Sua boa vontade". É uma colaboração divina-humana, onde Deus capacita o crente a viver de acordo com Sua vontade. A igreja deve brilhar como "luzeiros no mundo", mantendo firme a palavra da vida, através de testemunho e pureza. Paulo menciona Epafrodito e Timóteo como exemplos de serviço abnegado, prontos a arriscar suas vidas pelo evangelho.</li>
                            </ul>
                        `
                    }
                ]
            },
            "filipenses_3": {
                title: "A SUPREMA EXCELÊNCIA DE CONHECER A CRISTO",
                date: "13/04 (Quarta)",
                desc: "\"Mas o que para mim era ganho, reputei-o perda por causa de Cristo.\"",
                blocks: [
                    {
                        title: "Advertência Contra o Legalismo e a Busca Pelo Inestimável",
                        verse: "Considero tudo como perda, por causa da suprema excelência do conhecimento de Cristo Jesus, meu Senhor. (Filipenses 3:8)",
                        exegesis: `
                            <h3>1. Cuidado com os "Cães" e "Maus Obreiros" (Kynes)</h3>
                            <ul>
                                <li>Paulo inicia este capítulo com uma forte advertência contra os judaizantes (aqueles que insistiam na circuncisão e na lei para a salvação). Ele os chama de "cães" (<i>kynes - κύνες - cães, metáfora para impuros</i>), "maus obreiros" e "mutiladores da carne". Essas eram expressões duras, mas necessárias para proteger o evangelho puro da graça. Paulo, que tinha um currículo impressionante (circuncidado ao oitavo dia, da tribo de Benjamim, hebreu de hebreus, fariseu, irrepreensível na lei), demonstra que toda sua "justiça" própria era apenas lixo (<i>skubala - σκύβαλα - refugo, lixo</i>) comparado ao valor inestimável de Cristo.</li>
                            </ul>
                            
                            <h3>2. A Suprema Excelência do Conhecimento de Cristo (Gnosis)</h3>
                            <ul>
                                <li>O coração da mensagem de Paulo aqui é a "suprema excelência do conhecimento de Cristo Jesus, meu Senhor". Ele deseja não apenas conhecer fatos sobre Cristo, mas experimentar um conhecimento íntimo e transformador (<i>gnosis - γνῶσις - conhecimento experimental</i>), compartilhar dos Seus sofrimentos e experimentar o poder da Sua ressurreição. Ele abandona tudo o que antes valorizava para ganhar a Cristo e ser achado n'Ele, não tendo a sua própria justiça, mas a justiça que vem de Deus pela fé. Para Paulo, a vida é uma corrida onde o prêmio é a união cada vez mais profunda com Cristo.</li>
                            </ul>

                            <h3>3. Avançando para o Alvo e a Cidadania Celestial</h3>
                            <ul>
                                <li>Paulo se descreve como um atleta que "esquece as coisas que ficam para trás e avança para as que estão adiante", prosseguindo para o "alvo, pelo prêmio da soberana vocação de Deus em Cristo Jesus". A vida cristã não é estática; é um progresso constante em direção à maturidade espiritual, buscando cada vez mais conformidade com Cristo. Ele contrasta essa busca com aqueles cujo "fim é a perdição, cujo deus é o ventre, e cuja glória está na sua desonra". A verdadeira esperança do crente é que "a nossa pátria (<i>politeuma - πολίτευμα - cidadania</i>) está nos céus", de onde aguardamos o Salvador, o Senhor Jesus Cristo, que transformará nosso corpo humilhado para ser semelhante ao Seu corpo glorioso.</li>
                            </ul>
                        `
                    }
                ]
            },
            "filipenses_4": {
                title: "ALEGRIA, PAZ E CONTENTAMENTO",
                date: "14/04 (Quarta)",
                desc: "\"Nada vos inquieteis; antes, em tudo, pela oração e súplica, com ações de graças, sejam conhecidas diante de Deus as vossas petições.\"",
                blocks: [
                    {
                        title: "A Paz de Deus em Meio à Inquietação",
                        verse: "E a paz de Deus, que excede todo o entendimento, guardará os vossos corações e os vossos sentimentos em Cristo Jesus. (Filipenses 4:7)",
                        exegesis: `
                            <h3>1. Exortações Finais à Unidade e Alegria</h3>
                            <ul>
                                <li>Paulo começa o último capítulo com um apelo pessoal à unidade entre Evódia e Síntique, duas mulheres importantes na igreja de Filipos que estavam em desacordo. Ele as exorta a "terem o mesmo sentimento no Senhor", enfatizando que a unidade é crucial para o testemunho cristão. Novamente, a alegria é um tema central: "Regozijai-vos sempre no Senhor; outra vez digo, regozijai-vos". A alegria cristã não é baseada em circunstâncias, mas na presença e soberania de Deus. A "equidade" ou "gentileza" (<i>epieikeia - ἐπιείκεια - moderação, gentileza</i>) dos crentes deve ser conhecida por todos, pois o Senhor está perto.</li>
                            </ul>
                            
                            <h3>2. O Antídoto para a Ansiedade: Oração e a Paz de Deus (Eirene)</h3>
                            <ul>
                                <li>A receita de Paulo para lidar com a ansiedade é uma das passagens mais conhecidas da Bíblia: "Não andeis ansiosos por coisa alguma; antes, em tudo, pela oração e súplica, com ações de graças, sejam as vossas petições conhecidas diante de Deus". Em vez de se preocupar, o crente deve orar com gratidão, confiando suas necessidades a Deus. O resultado é miraculoso: "E a paz de Deus (<i>eirene - εἰρήνη - paz, tranquilidade</i>), que excede todo o entendimento, guardará os vossos corações e os vossos sentimentos em Cristo Jesus". Esta paz não é apenas a ausência de conflito, mas uma plenitude e bem-estar que Deus concede, protegendo mente e emoções.</li>
                            </ul>

                            <h3>3. O Contentamento em Todas as Circunstâncias (Panta)</h3>
                            <ul>
                                <li>Paulo conclui com um testemunho poderoso de seu próprio contentamento: "Sei passar necessidade e sei também ter abundância; em toda maneira, e em todas as coisas (<i>panta - πάντα - todas as coisas</i>) fui instruído, tanto a ter fartura, como a ter fome; tanto a ter abundância, como a padecer necessidade. Posso todas as coisas naquele que me fortalece". Esta não é uma declaração de onipotência humana, mas de dependência divina. A verdadeira força e contentamento vêm de Cristo, que capacita o crente a enfrentar qualquer situação. Ele expressa gratidão pelo apoio financeiro dos filipenses, assegurando-lhes que "o meu Deus suprirá todas as vossas necessidades segundo as Suas riquezas na glória em Cristo Jesus".</li>
                            </ul>
                        `
                    }
                ]
            }
        };

        // === LÓGICA GERAL ===
        let currentAudioBlob = null;
        let mediaRecorder;
        let audioChunks = [];

        function loadChapter(chapterKey) {
            const data = bibleData[chapterKey];
            if (!data) return;

            const heroTitle = document.getElementById('heroTitle');
            const heroDesc = document.getElementById('heroDesc');
            const dateBadge = document.getElementById('dateBadge');
            const dateValue = document.getElementById('dateValue');
            const communitySection = document.getElementById('community-section');
            const formChapterKey = document.getElementById('formChapterKey');
            
            heroTitle.style.opacity = '0';
            heroDesc.style.opacity = '0';
            dateBadge.style.opacity = '0';
            
            setTimeout(() => {
                if (data.date) {
                    dateValue.textContent = data.date;
                    dateBadge.classList.remove('hidden');
                    communitySection.classList.remove('hidden');
                    formChapterKey.value = chapterKey;
                    carregarComentarios(chapterKey);
                    setTimeout(() => { dateBadge.style.opacity = '1'; }, 100);
                } else {
                    dateBadge.classList.add('hidden');
                    communitySection.classList.add('hidden');
                }

                heroTitle.innerHTML = data.title;
                heroDesc.innerHTML = data.desc;
                heroTitle.style.opacity = '1';
                heroDesc.style.opacity = '1';
            }, 300);

            const mainContent = document.getElementById('content');
            mainContent.innerHTML = ''; 

            data.blocks.forEach((block) => {
                let borderColor = 'border-pink-600';
                let blurTop = 'bg-pink-600/5';
                let blurBottom = 'bg-pink-800/5';
                let borderPanel = 'border-pink-900/30';

                const html = `
                    <section class="reveal max-w-4xl mx-auto w-full relative">
                        <div class="absolute -inset-4 ${blurTop} to-transparent rounded-3xl blur-xl pointer-events-none"></div>
                        
                        <div class="space-y-6 relative z-10">
                            <div class="text-center mb-10">
                                <h2 class="text-3xl md:text-5xl font-serif text-white leading-tight mb-6">${block.title}</h2>
                                <div class="inline-block border-l-4 border-r-4 ${borderColor} px-6 py-4 italic text-slate-300 bg-[#0a0514]/50 shadow-sm max-w-3xl rounded-sm">
                                    "${block.verse}"
                                </div>
                            </div>
                            
                            <div class="bg-[#050510]/80 p-8 md:p-12 rounded-xl border ${borderPanel} transition shadow-2xl relative overflow-hidden">
                                <div class="absolute top-0 right-0 w-64 h-64 ${blurTop} rounded-full blur-3xl -mr-20 -mt-20 pointer-events-none"></div>
                                <div class="absolute bottom-0 left-0 w-64 h-64 ${blurBottom} rounded-full blur-3xl -ml-20 -mb-20 pointer-events-none"></div>
                                <div class="rich-text text-slate-300 text-[16px] md:text-lg leading-relaxed relative z-10 font-light">
                                    ${block.exegesis}
                                </div>
                            </div>
                        </div>
                    </section>
                `;
                mainContent.insertAdjacentHTML('beforeend', html);
            });
            resetObservers();
        }

        function carregarComentarios(capitulo) {
            const list = document.getElementById('commentsList');
            list.innerHTML = '<p class="text-center text-slate-500 text-sm animate-pulse">Carregando comentários...</p>';

            fetch(`api.php?acao=listar&capitulo=${capitulo}`)
            .then(res => res.json())
            .then(data => {
                list.innerHTML = '';
                if(data.length === 0) {
                    list.innerHTML = '<p class="text-center text-slate-500 text-sm">Seja o primeiro a comentar!</p>';
                    return;
                }
                data.forEach(c => {
                    let mediaHtml = '';
                    if(c.foto) mediaHtml += `<img src="${c.foto}" onclick="openImage(this.src)" class="mt-4 rounded-lg max-h-48 border border-slate-700 cursor-pointer hover:scale-[1.02] transition shadow-lg">`;
                    if(c.audio) mediaHtml += `<audio controls src="${c.audio}" class="mt-4 w-full"></audio>`;

                    const jaCurtiu = localStorage.getItem(`reagiu_likes_${c.id}`);
                    const jaAmem = localStorage.getItem(`reagiu_amem_${c.id}`);
                    const jaGloria = localStorage.getItem(`reagiu_gloria_${c.id}`);

                    let themeColor = 'text-pink-400';
                    let panelBorder = 'hover:border-pink-500/50';

                    const html = `
                        <div class="glass-panel p-5 pb-12 rounded-xl border border-slate-800 relative group transition ${panelBorder} bg-[#0a0514]/60">
                            <div class="flex justify-between items-start mb-3 border-b border-slate-800 pb-2">
                                <strong class="${themeColor} text-sm tracking-wide font-serif">${c.nome}</strong>
                                <span class="text-[10px] text-slate-500 uppercase tracking-widest">${new Date(c.data_envio).toLocaleDateString('pt-BR')}</span>
                            </div>
                            <p class="text-slate-300 text-sm leading-relaxed">${c.mensagem}</p>
                            ${mediaHtml}
                            
                            <div class="absolute bottom-3 right-4 flex gap-2">
                                <button onclick="reagirComentario(${c.id}, 'likes', this)" class="text-xs transition flex items-center gap-1 bg-black/80 px-2 py-1 rounded-full border border-slate-700 ${jaCurtiu ? 'text-red-500 border-red-500/30' : 'text-slate-400 hover:text-red-400'}" ${jaCurtiu ? 'disabled' : ''}>
                                    <i class="fa-solid fa-heart"></i> <span class="count font-bold">${c.likes || 0}</span>
                                </button>
                                <button onclick="reagirComentario(${c.id}, 'amem', this)" class="text-xs transition flex items-center gap-1 bg-black/80 px-2 py-1 rounded-full border border-slate-700 ${jaAmem ? 'text-pink-400 border-pink-400/30' : 'text-slate-400 hover:text-pink-400'}" ${jaAmem ? 'disabled' : ''}>
                                    <i class="fa-solid fa-hands-praying"></i> <span class="count font-bold">${c.amem || 0}</span>
                                </button>
                                <button onclick="reagirComentario(${c.id}, 'gloria', this)" class="text-xs transition flex items-center gap-1 bg-black/80 px-2 py-1 rounded-full border border-slate-700 ${jaGloria ? 'text-blue-500 border-blue-500/30' : 'text-slate-400 hover:text-blue-500'}" ${jaGloria ? 'disabled' : ''}>
                                    <i class="fa-solid fa-fire"></i> <span class="count font-bold">${c.gloria || 0}</span>
                                </button>
                            </div>
                        </div>
                    `;
                    list.insertAdjacentHTML('beforeend', html);
                });
            })
            .catch(err => {
                list.innerHTML = '<p class="text-center text-red-400 text-xs">Erro ao carregar comentários.</p>';
            });
        }

        function reagirComentario(id, tipo, btn) {
            if(localStorage.getItem(`reagiu_${tipo}_${id}`)) return;

            const icon = btn.querySelector('i');
            const countSpan = btn.querySelector('.count');
            let count = parseInt(countSpan.innerText);

            icon.classList.add('reacted-anim');
            btn.classList.remove('text-slate-400');
            
            if(tipo === 'likes') btn.classList.add('text-red-500', 'border-red-500/30');
            if(tipo === 'amem') btn.classList.add('text-pink-400', 'border-pink-400/30');
            if(tipo === 'gloria') btn.classList.add('text-blue-500', 'border-blue-500/30');

            countSpan.innerText = count + 1;
            btn.disabled = true;

            localStorage.setItem(`reagiu_${tipo}_${id}`, 'true');

            const formData = new FormData();
            formData.append('acao', 'reagir');
            formData.append('id', id);
            formData.append('tipo', tipo);

            fetch('api.php', { method: 'POST', body: formData });
        }

        document.getElementById('commentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            const formData = new FormData(this);
            formData.append('acao', 'salvar');
            if(currentAudioBlob) {
                formData.append('audio', currentAudioBlob, 'audio.wav');
            }

            fetch('api.php', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if(data.sucesso) {
                    this.reset();
                    document.getElementById('filePreview').innerHTML = '';
                    currentAudioBlob = null;
                    document.getElementById('recordText').innerText = "Gravar Áudio";
                    carregarComentarios(document.getElementById('formChapterKey').value);
                } else {
                    alert('Erro ao enviar.');
                }
            })
            .catch(() => alert('Erro de conexão.'))
            .finally(() => {
                btn.innerText = originalText;
                btn.disabled = false;
            });
        });

        function previewFile(input) {
            const preview = document.getElementById('filePreview');
            if(input.files && input.files[0]) {
                preview.innerHTML = `<i class="fa-solid fa-check text-green-400"></i> Imagem selecionada: ${input.files[0].name}`;
                preview.classList.remove('hidden');
            }
        }

        const recordBtn = document.getElementById('recordBtn');
        recordBtn.addEventListener('click', async () => {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                    mediaRecorder.onstop = () => {
                        currentAudioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        document.getElementById('filePreview').classList.remove('hidden');
                        document.getElementById('filePreview').innerHTML += '<br><i class="fa-solid fa-microphone text-green-400"></i> Áudio gravado!';
                    };
                    mediaRecorder.start();
                    recordBtn.classList.add('recording-pulse');
                    document.getElementById('recordText').innerText = "Parar Gravação";
                } catch (err) {
                    alert("Permita o uso do microfone para gravar.");
                }
            } else {
                mediaRecorder.stop();
                recordBtn.classList.remove('recording-pulse');
                document.getElementById('recordText').innerText = "Gravar Áudio";
            }
        });

        function openImage(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('imageModal').classList.remove('hidden');
        }
        function closeImage() {
            document.getElementById('imageModal').classList.add('hidden');
        }

        function resetObservers() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        const canvas = document.getElementById("particles-js");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        for(let i=0; i<80; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, spcX: Math.random()*0.5-0.25, spcY: Math.random()*0.5-0.25 });
        function animateParticles() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(236, 72, 153, 0.15)"; /* Pink */
            particles.forEach(p => { p.x += p.spcX; p.y += p.spcY; if(p.x<0||p.x>canvas.width) p.spcX*=-1; if(p.y<0||p.y>canvas.height) p.spcY*=-1; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        loadChapter('intro_book');
    </script>
</body>
</html>
