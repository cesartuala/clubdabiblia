        let quizData = [];
        let currentQ = 0; let score = 0; let answered = false;
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const feedbackContainer = document.getElementById('feedbackContainer');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initializeQuiz() {
            shuffleArray(allQuizQuestions);
            quizData = allQuizQuestions.slice(0, 10); // Use only 10 questions
            currentQ = 0;
            score = 0;
            loadQuestion();
        }

        function loadQuestion() {
            answered = false; feedbackContainer.classList.add('hidden'); nextBtn.classList.add('hidden');
            const qData = quizData[currentQ];
            document.getElementById('questionCounter').innerText = `${currentQ + 1} / ${quizData.length}`;
            questionText.innerText = qData.q;
            optionsContainer.innerHTML = '';
            
            const shuffledOptions = [...qData.options];
            shuffleArray(shuffledOptions); // Shuffle options for each question
            
            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left p-4 rounded-lg bg-slate-800/80 border border-slate-600 text-slate-300 text-sm md:text-base';
                btn.innerText = opt.t;
                btn.onclick = () => selectOption(btn, opt);
                optionsContainer.appendChild(btn);
            });
            progressBar.style.width = `${((currentQ) / quizData.length) * 100}%`;
        }

        function selectOption(btn, opt) {
            if (answered) return; answered = true;
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);
            
            feedbackContainer.classList.remove('hidden', 'bg-red-900/30', 'border-red-500/50', 'bg-green-900/30', 'border-green-500/50', 'text-green-200', 'text-red-200');
            if (opt.c) {
                score += 1; // Increment score by 1 for correct answer, total points will be score * 10
                btn.classList.add('option-correct');
                feedbackContainer.classList.add('bg-green-900/30', 'border-green-500/50', 'text-green-200');
                feedbackContainer.innerHTML = `<strong>Correto!</strong> ${opt.r}`;
            } else {
                btn.classList.add('option-wrong');
                feedbackContainer.classList.add('bg-red-900/30', 'border-red-500/50', 'text-red-200');
                feedbackContainer.innerHTML = `<strong>Incorreto.</strong> ${opt.r}`;
                buttons.forEach((b) => { 
                    const originalOption = quizData[currentQ].options.find(o => o.t === b.innerText);
                    if(originalOption && originalOption.c) {
                        b.classList.add('option-correct'); 
                    }
                });
            }
            nextBtn.classList.remove('hidden');
        }

        nextBtn.onclick = () => {
            currentQ++;
            if (currentQ < quizData.length) loadQuestion();
            else showResults();
        };

        function showResults() {
            progressBar.style.width = '100%';
            document.getElementById('quizContainer').classList.add('hidden');
            const res = document.getElementById('resultContainer');
            res.classList.remove('hidden'); res.classList.add('flex');
            document.getElementById('finalScore').innerText = score; // Display number of correct answers
            document.getElementById('inputPontos').value = score * 10; // Save points (e.g., 10 points per correct answer)
            document.getElementById('inputAcertos').value = score; // Save number of correct answers
        }

        document.getElementById('rankingForm').onsubmit = function(e) {
            e.preventDefault();
            const btn = this.querySelector('button'); btn.disabled = true; btn.innerText = "Salvando...";
            fetch('api.php', { method: 'POST', body: new FormData(this) })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                if(data.sucesso) {
                    window.location.href = 'index.html';
                } else {
                    alert('Erro ao salvar ranking: ' + (data.mensagem || 'Resposta inválida.'));
                    btn.disabled = false;
                    btn.innerText = "Enviar";
                }
            })
            .catch(error => {
                console.error("Erro ao salvar ranking:", error);
                alert('Erro de conexão ao salvar ranking. Verifique sua rede.');
                btn.disabled = false;
                btn.innerText = "Enviar";
            });
        };

        // Particles
        const canvas = document.getElementById("particles-js");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        for(let i=0; i<50; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, sx: Math.random()*0.5-0.25, sy: Math.random()*0.5-0.25 });
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(8, 145, 178, 0.2)"; /* Cyan-600 */
            particles.forEach(p => { p.x+=p.sx; p.y+=p.sy; if(p.x<0||p.x>canvas.width)p.sx*=-1; if(p.y<0||p.y>canvas.height)p.sy*=-1; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); });
            requestAnimationFrame(animate);
        }
        animate();
        initializeQuiz();
    </script>
</body>
</html>
