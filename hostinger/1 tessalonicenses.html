    <script>
        const bibleData = {

                date: null,
                desc: "<span class='text-xs uppercase tracking-[0.3em] text-cyan-400 not-italic block mb-4'>Introdução: Sobre o Livro</span>\"A vida cristã em meio à perseguição, a esperança da volta de Cristo e o chamado à santidade.\"",
                blocks: [
                    {
                        title: "A Igreja Modelo e o Retorno Iminente",
                        verse: "Ora, quanto aos tempos e às estações, irmãos, não necessitais de que vos escreva. (1 Ts 5:1)",
                        exegesis: `
                            <h3>1. A Carta Mais Antiga de Paulo</h3>
                            <ul>
                                <li>A Primeira Epístola aos Tessalonicenses é considerada por muitos a carta mais antiga de Paulo, escrita por volta de 50-52 d.C., apenas alguns anos após a fundação da igreja. Ela nos dá um vislumbre fascinante do cristianismo em sua fase inicial. É uma carta que pulsa com o calor do coração de Paulo, seu afeto pastoral e sua profunda preocupação com a jovem comunidade de fé em Tessalônica.</li>
                            </ul>
                            
                            <h3>2. A Igreja Modelo em Meio à Perseguição</h3>
                            <ul>
                                <li>A igreja de Tessalônica, recém-formada, enfrentava severa perseguição por parte dos judeus e da população grega. No entanto, sua fé era tão vibrante que se tornou um "exemplo para todos os crentes na Macedônia e Acaia" (1 Ts 1:7). Paulo os elogia por sua <i class="ref">ἔργον πίστεως</i> (ergon pisteos - obra da fé), <i class="ref">κόπου ἀγάπης</i> (kopou agapēs - trabalho de amor) e <i class="ref">ὑπομονὴ ἐλπίδος</i> (hypomonē elpidos - perseverança da esperança). Este livro é um testemunho de como a fé genuína pode florescer em circunstâncias adversas.</li>
                            </ul>
                            
                            <h3>3. O Tema Central: A Escatologia Prática</h3>
                            <ul>
                                <li>Um dos temas mais proeminentes de 1 Tessalonicenses é a escatologia, ou a doutrina das últimas coisas, particularmente a segunda vinda de Cristo. A cada capítulo, Paulo aborda o retorno do Senhor Jesus, oferecendo consolo aos aflitos e exortação à vigilância. No entanto, para Paulo, a esperança da volta de Cristo não é uma desculpa para a ociosidade, mas um poderoso incentivo para a santidade, o amor e o trabalho diligente. Ele ensina que a expectativa do Senhor deve moldar a vida diária do crente.</li>
                            </ul>
                        `
                    }
                ]
            },
            "intro_author": {
                title: "SOBRE O AUTOR PAULO",
                date: null,
                desc: "\"Paulo, Silvano e Timóteo, à igreja dos tessalonicenses em Deus Pai e no Senhor Jesus Cristo.\"",
                blocks: [
                    {
                        title: "O Apóstolo e a Jovem Igreja Perseguida",
                        verse: "Vós mesmos sabeis, irmãos, de que a nossa entrada para convosco não foi vã. (1 Ts 2:1)",
                        exegesis: `
                            <h3>1. A Missão em Tessalônica</h3>
                            <ul>
                                <li>Paulo, acompanhado de Silvano (Silas) e Timóteo, chegou a Tessalônica durante sua segunda viagem missionária (Atos 17:1-9). Em apenas três semanas de ministério intenso na sinagoga, um grupo significativo de judeus e gentios creu no evangelho. Essa rápida propagação da fé, no entanto, gerou inveja e perseguição por parte dos judeus descrentes, forçando Paulo e seus companheiros a fugir da cidade.</li>
                            </ul>
                            
                            <h3>2. A Preocupação de Paulo</h3>
                            <ul>
                                <li>Embora forçado a sair, o coração de Paulo permaneceu com os tessalonicenses. Ele estava profundamente preocupado com a capacidade deles de resistir à perseguição e manter a fé. Por isso, enviou Timóteo de Atenas para os encorajar e trazer notícias (1 Ts 3:1-5). A notícia trazida por Timóteo era, em grande parte, positiva: a igreja estava firme na fé e no amor, mas havia algumas questões que precisavam ser abordadas.</li>
                            </ul>
                            
                            <h3>3. Propósito da Carta</h3>
                            <ul>
                                <li>A principal intenção de Paulo ao escrever esta carta era tripla: primeiramente, expressar sua alegria e gratidão pela fé e perseverança da igreja; segundo, defender a integridade de seu ministério contra quaisquer acusações maliciosas; e terceiro, instruir os crentes em áreas de ética sexual, amor fraternal e, crucialmente, corrigir mal-entendidos sobre o retorno de Cristo e o estado dos que já haviam morrido. Esta carta é um exemplo brilhante do cuidado pastoral de Paulo, combinando encorajamento, exortação e ensino doutrinário.</li>
                            </ul>
                        `
                    }
                ]
            },
            "1tessalonicenses_1": {
                title: "A FÉ EXEMPLAR DA IGREJA",
                date: "19/04 (Sexta)",
                desc: "\"Dando sempre graças a Deus por vós todos, fazendo menção de vós em nossas orações...\"",
                blocks: [
                    {
                        title: "O Triunfo da Graça em Tessalônica",
                        verse: "Porque o nosso evangelho não foi a vós somente em palavra, mas também em poder, e no Espírito Santo, e em muita certeza. (1 Ts 1:5)",
                        exegesis: `
                            <h3>1. A Ação da Trindade e a Genuinidade da Conversão</h3>
                            <ul>
                                <li>Paulo inicia a carta com uma vibrante ação de graças, destacando a genuinidade da conversão dos tessalonicenses. Ele atribui a obra da fé em suas vidas à poderosa atuação da Trindade. O evangelho não veio a eles "somente em palavra", mas "em poder, e no Espírito Santo, e em muita certeza". Isso sublinha que a verdadeira conversão é um evento transformador, não meramente intelectual, onde a Palavra de Deus é confirmada pelo Espírito com convicção divina. É uma demonstração de que a graça de Deus opera de forma sobrenatural no coração humano.</li>
                            </ul>
                            
                            <h3>2. As Três Marcas Essenciais da Fé Viva</h3>
                            <ul>
                                <li>Paulo elogia os tessalonicenses por três características fundamentais que se tornaram sua marca registrada: a <i class="ref">ἔργον πίστεως</i> (ergon pisteos - obra da fé), o <i class="ref">κόπου ἀγάπης</i> (kopou agapēs - trabalho de amor) e a <i class="ref">ὑπομονὴ ἐλπίδος</i> (hypomonē elpidos - perseverança da esperança). A fé autêntica sempre produz obras; o amor verdadeiro se manifesta em serviço sacrificial; e a esperança na volta de Cristo fortalece a perseverança em meio às dificuldades. Essas três virtudes não são passivas, mas dinâmicas, impulsionando a vida cristã em ação.</li>
                            </ul>

                            <h3>3. Um Exemplo para Todos os Crentes</h3>
                            <ul>
                                <li>Apesar de serem uma igreja jovem e perseguida, os tessalonicenses se tornaram um modelo para outras comunidades cristãs. Sua reputação de fé se espalhou por toda a Macedônia e Acaia. Eles haviam "recebido a palavra em muita tribulação, com gozo do Espírito Santo" (1 Ts 1:6), virando-se dos ídolos para servir ao Deus vivo e verdadeiro e esperar "dos céus a seu Filho". Este capítulo nos lembra que uma igreja que vive com fé ativa, amor sacrificial e esperança viva na volta de Cristo se torna um testemunho poderoso, independentemente de seu tamanho ou idade.</li>
                            </ul>
                        `
                    }
                ]
            },
            "1tessalonicenses_2": {
                title: "O CORAÇÃO DO MINISTÉRIO APOSTÓLICO",
                date: "20/04 (Sábado)",
                desc: "\"Porque nunca usamos de palavras lisonjeiras, como bem sabeis, nem pretexto de avareza; Deus é testemunha.\"",

                    {
                        title: "A Integridade do Evangelho e o Cuidado Pastoral",
                        verse: "Antes fomos brandos entre vós, como a ama que cria seus filhos. (1 Ts 2:7)",
                        exegesis: `
                            <h3>1. O Ministério de Paulo em Transparência</h3>
                            <ul>
                                <li>Neste capítulo, Paulo defende a integridade de seu ministério contra possíveis acusações de desonestidade ou motivações ocultas. Ele afirma que sua entrada entre eles não foi "vã" nem marcada por "engano", "impureza" ou "dolo". Em vez disso, pregou com <i class="ref">παρρησίᾳ</i> (parrēsia - ousadia e liberdade), não buscando agradar a homens, mas a Deus. Ele se recusou a usar "palavras lisonjeiras" ou ter "pretexto de avareza", demonstrando um desapego financeiro radical que contrastava com muitos filósofos e retóricos da época. Sua vida era um livro aberto, um modelo de conduta cristã.</li>
                            </ul>
                            
                            <h3>2. O Amor de uma Mãe e de um Pai</h3>
                            <ul>
                                <li>Paulo descreve seu cuidado pelos tessalonicenses com duas metáforas poderosas e ternas. Primeiramente, ele agiu como uma <i class="ref">τροφὸς</i> (trophos - ama ou nutriz) que cuida de seus próprios filhos, compartilhando não apenas o evangelho, mas também a própria alma. Esse amor sacrificial é a marca de um verdadeiro pastor. Em segundo lugar, ele os exortou e encorajou "como um pai a seus filhos" (1 Ts 2:11), guiando-os para viverem de modo digno de Deus. Essas imagens pintam um quadro de um apóstolo que não era um pregador distante, mas um pai e uma mãe espiritual para aqueles a quem servia.</li>
                            </ul>

                            <h3>3. A Resposta à Palavra e a Oposição</h3>
                            <ul>
                                <li>Os tessalonicenses são elogiados novamente por terem recebido a palavra pregada não como "palavra de homens", mas como "palavra de Deus", que "opera eficazmente" neles. Essa disposição em crer trouxe-lhes sofrimento, pois, à semelhança das igrejas da Judeia, eles suportaram perseguição de seus próprios compatriotas. Paulo expressa sua frustração com os judeus que o perseguiam, impedindo que o evangelho fosse pregado aos gentios, e adverte sobre o juízo divino que se aproxima para aqueles que consistentemente rejeitam e se opõem ao plano de salvação de Deus.</li>
                            </ul>
                        `
                    }
                ]
            },
            "1tessalonicenses_3": {
                title: "CONSOLO E ALEGRIA NA FÉ",
                date: "21/04 (Domingo)",
                desc: "\"Para vos confirmar e exortar acerca da vossa fé...\"",
                blocks: [
                    {
                        title: "A Preocupação de Paulo e o Relatório de Timóteo",
                        verse: "Por isso, irmãos, em toda a nossa aflição e necessidade, fomos consolados acerca de vós, pela vossa fé. (1 Ts 3:7)",
                        exegesis: `
                            <h3>1. A Aflição de Paulo e o Envio de Timóteo</h3>
                            <ul>
                                <li>Paulo revela a profundidade de sua ansiedade pelos tessalonicenses após ter sido separado deles. Ele estava tão preocupado com a possibilidade de sua fé sucumbir à perseguição que, mesmo estando "só em Atenas", decidiu enviar Timóteo. O objetivo de Timóteo era <i class="ref">παρακαλέσαι</i> (parakalesai - encorajar e consolar) e "confirmar" a fé deles, para que ninguém fosse abalado pelas <i class="ref">θλίψεις</i> (thlipseis - aflições ou tribulações). Este ato demonstra a prioridade de Paulo em assegurar a estabilidade espiritual das jovens igrejas, mesmo à custa de seu próprio conforto.</li>
                            </ul>
                            
                            <h3>2. O Relatório Reconfortante e a Grande Alegria</h3>
                            <ul>
                                <li>O retorno de Timóteo com boas notícias trouxe imenso alívio e alegria a Paulo. Ele havia trazido "boas novas da vossa fé e caridade", informando que eles ainda se lembravam com carinho de Paulo e desejavam vê-lo. Essa notícia não apenas consolou Paulo em sua própria "aflição e necessidade", mas o fez "viver" novamente. A alegria de Paulo pela perseverança da fé dos tessalonicenses é tão grande que ele não encontra palavras adequadas para agradecer a Deus. A estabilidade da igreja em Tessalônica era a prova da eficácia do evangelho e da fidelidade de Deus.</li>
                            </ul>

                            <h3>3. Oração por Crescimento e Santificação</h3>
                            <ul>
                                <li>Em resposta ao relatório, Paulo eleva uma oração fervorosa. Ele pede que Deus "endireite o nosso caminho para vós" (indicando seu desejo de retornar) e, mais importante, que o Senhor "vos faça crescer e aumentar em amor uns para com os outros, e para com todos". Além disso, ele ora para que seus corações sejam "confirmados, irrepreensíveis em santidade diante de nosso Deus e Pai, na vinda de nosso Senhor Jesus Cristo com todos os seus santos". Esta oração final conecta o amor fraternal e a santidade presente à expectativa da gloriosa volta de Cristo, mostrando que a escatologia de Paulo sempre tinha implicações éticas e relacionais.</li>
                            </ul>
                        `
                    }
                ]
            },
            "1tessalonicenses_4": {
                title: "SANTIDADE E A ESPERANÇA FUTURA",
                date: "22/04 (Segunda)",
                desc: "\"Porque esta é a vontade de Deus, a vossa santificação...\"",
                blocks: [
                    {
                        title: "Viver em Santidade e Aguardar o Senhor",
                        verse: "Porque o mesmo Senhor descerá do céu com alarido, e com voz de arcanjo, e com a trombeta de Deus; e os que morreram em Cristo ressuscitarão primeiro. (1 Ts 4:16)",
                        exegesis: `
                            <h3>1. A Vontade de Deus: Vossa Santificação</h3>
                            <ul>
                                <li>A partir do capítulo 4, Paulo muda o foco para a exortação prática. Ele começa com a declaração enfática: "Esta é a vontade de Deus, a vossa <i class="ref">ἁγιασμός</i> (hagiasmos - santificação)". Isso não é uma opção, mas o propósito divino para cada crente. A santificação inclui a abstinência da impureza sexual ("cada um de vós saiba possuir o seu vaso em santificação e honra"). Em uma cultura onde a imoralidade sexual era comum e até mesmo ritualística, Paulo chama os cristãos a um padrão mais elevado, distinguindo-os dos gentios que "não conhecem a Deus". Viver em santidade é respeitar a Deus e ao Espírito Santo que habita neles.</li>
                            </ul>
                            
                            <h3>2. O Amor Fraternal e o Trabalho Honesto</h3>
                            <ul>
                                <li>Além da pureza sexual, Paulo exorta os tessalonicenses a crescerem em <i class="ref">φιλαδελφία</i> (filadelfia - amor fraternal). Eles já praticavam o amor uns pelos outros, mas Paulo os encoraja a "abundar cada vez mais", estendendo esse amor a todos os irmãos. Ele também os instrui a viverem tranquilamente, tratando "dos vossos próprios negócios" e "trabalhando com vossas próprias mãos". Essa exortação à diligência e autossuficiência visava combater a ociosidade, talvez motivada por mal-entendidos sobre a iminência da volta de Cristo, e garantir um testemunho respeitável perante os de fora.</li>
                            </ul>

                            <h3>3. O Arrebatamento e o Consolo da Ressurreição</h3>
                            <ul>
                                <li>O ponto culminante deste capítulo é o ensino de Paulo sobre a segunda vinda de Cristo e o que acontece com os crentes que já morreram. Ele quer consolar aqueles que estavam "tristes como os outros que não têm esperança". Os mortos em Cristo não estão perdidos, mas "dormem" na esperança da ressurreição. Quando o Senhor voltar, com "alarido, e com voz de arcanjo, e com a trombeta de Deus", os mortos em Cristo ressuscitarão primeiro. Em seguida, os crentes que estiverem vivos serão <i class="ref">ἁρπαγησόμεθα</i> (harpagēsometha - arrebatados) juntamente com eles nas nuvens, para encontrar o Senhor nos ares. Esta promessa é uma fonte de imenso consolo: "e assim estaremos sempre com o Senhor".</li>
                            </ul>
                        `
                    }
                ]
            },
            "1tessalonicenses_5": {
                title: "VIGILÂNCIA E VIDA CRISTÃ PLENA",
                date: "23/04 (Terça)",
                desc: "\"Vigiai e sede sóbrios; porque todos vós sois filhos da luz e filhos do dia.\"",
                blocks: [
                    {
                        title: "A Vinda do Senhor e a Vida no Espírito",
                        verse: "Ora, o mesmo Deus de paz vos santifique completamente; e todo o vosso espírito, e alma, e corpo sejam plenamente conservados irrepreensíveis para a vinda de nosso Senhor Jesus Cristo. (1 Ts 5:23)",
                        exegesis: `
                            <h3>1. O Dia do Senhor Virá como Ladrão</h3>
                            <ul>
                                <li>Paulo retoma o tema da volta de Cristo, enfatizando a sua súbita e inesperada natureza. Ele afirma que "o Dia do Senhor virá <i class="ref">ὡς κλέπτης</i> (hōs kleptēs - como ladrão) de noite". Para os descrentes, que dizem "Paz e segurança!", virá "repentina destruição". No entanto, para os crentes, que são "filhos da luz" e "filhos do dia", a vinda do Senhor não deve ser uma surpresa, pois eles devem "vigiar e ser sóbrios", não dormir como os outros. Isso implica uma prontidão espiritual constante, vivendo em conformidade com a luz que receberam.</li>
                            </ul>
                            
                            <h3>2. A Armadura Espiritual e as Exortações Práticas</h3>
                            <ul>
                                <li>Para a vigilância, Paulo instrui os crentes a se revestirem da "couraça da fé e da caridade" e do "capacete da esperança da salvação". Esta armadura não é para a batalha contra o pecado em si (como em Efésios 6), mas para a prontidão e sobriedade em vista do retorno de Cristo. Ele então oferece uma série de exortações curtas e diretas sobre a vida em comunidade: respeitar os que trabalham entre eles, admoestar os desordeiros, consolar os desanimados, sustentar os fracos e ser paciente com todos. A vida da igreja deve ser marcada pela paz, pela busca do bem e pelo perdão.</li>
                            </ul>

                            <h3>3. Mandamentos Finais e a Oração pela Santificação Total</h3>
                            <ul>
                                <li>O capítulo culmina com alguns dos mandamentos mais conhecidos de Paulo: "Regozijai-vos sempre. Orai <i class="ref">ἀδιαλείπτως</i> (adialeiptōs - sem cessar). Em tudo dai graças". Estas não são meras sugestões, mas imperativos para uma vida cheia do Espírito, que não deve ser "extinto". Paulo também ordena que "não desprezeis as profecias", mas que "examineis tudo" e "retende o bem", fugindo de toda a "aparência do mal". A carta termina com uma poderosa oração: "Ora, o mesmo Deus de paz vos santifique completamente; e todo o vosso espírito, e alma, e corpo sejam plenamente conservados irrepreensíveis para a vinda de nosso Senhor Jesus Cristo." Esta é uma oração pela santificação holística, abrangendo cada aspecto da existência humana, e pela fidelidade de Deus em cumprir sua promessa.</li>
                            </ul>
                        `
                    }
                ]
            }
        };

        // === LÓGICA GERAL ===
        let currentAudioBlob = null;
        let mediaRecorder;
        let audioChunks = [];

        function loadChapter(chapterKey) {
            const data = bibleData[chapterKey];
            if (!data) return;

            const heroTitle = document.getElementById('heroTitle');
            const heroDesc = document.getElementById('heroDesc');
            const dateBadge = document.getElementById('dateBadge');
            const dateValue = document.getElementById('dateValue');
            const communitySection = document.getElementById('community-section');
            const formChapterKey = document.getElementById('formChapterKey');
            
            heroTitle.style.opacity = '0';
            heroDesc.style.opacity = '0';
            dateBadge.style.opacity = '0';
            
            setTimeout(() => {
                if (data.date) {
                    dateValue.textContent = data.date;
                    dateBadge.classList.remove('hidden');
                    communitySection.classList.remove('hidden');
                    formChapterKey.value = chapterKey;
                    carregarComentarios(chapterKey);
                    setTimeout(() => { dateBadge.style.opacity = '1'; }, 100);
                } else {
                    dateBadge.classList.add('hidden');
                    communitySection.classList.add('hidden');
                }

                heroTitle.innerHTML = data.title;
                heroDesc.innerHTML = data.desc;
                heroTitle.style.opacity = '1';
                heroDesc.style.opacity = '1';
            }, 300);

            const mainContent = document.getElementById('content');
            mainContent.innerHTML = ''; 

            data.blocks.forEach((block) => {
                let borderColor = 'border-cyan-600';
                let blurTop = 'bg-cyan-600/5';
                let blurBottom = 'bg-cyan-800/5';
                let borderPanel = 'border-cyan-900/30';

                const html = `
                    <section class="reveal max-w-4xl mx-auto w-full relative">
                        <div class="absolute -inset-4 ${blurTop} to-transparent rounded-3xl blur-xl pointer-events-none"></div>
                        
                        <div class="space-y-6 relative z-10">
                            <div class="text-center mb-10">
                                <h2 class="text-3xl md:text-5xl font-serif text-white leading-tight mb-6">${block.title}</h2>
                                <div class="inline-block border-l-4 border-r-4 ${borderColor} px-6 py-4 italic text-slate-300 bg-[#0a0514]/50 shadow-sm max-w-3xl rounded-sm">
                                    "${block.verse}"
                                </div>
                            </div>
                            
                            <div class="bg-[#050510]/80 p-8 md:p-12 rounded-xl border ${borderPanel} transition shadow-2xl relative overflow-hidden">
                                <div class="absolute top-0 right-0 w-64 h-64 ${blurTop} rounded-full blur-3xl -mr-20 -mt-20 pointer-events-none"></div>
                                <div class="absolute bottom-0 left-0 w-64 h-64 ${blurBottom} rounded-full blur-3xl -ml-20 -mb-20 pointer-events-none"></div>
                                <div class="rich-text text-slate-300 text-[16px] md:text-lg leading-relaxed relative z-10 font-light">
                                    ${block.exegesis}
                                </div>
                            </div>
                        </div>
                    </section>
                `;
                mainContent.insertAdjacentHTML('beforeend', html);
            });
            resetObservers();
        }

        function carregarComentarios(capitulo) {
            const list = document.getElementById('commentsList');
            list.innerHTML = '<p class="text-center text-slate-500 text-sm animate-pulse">Carregando comentários...</p>';

            fetch(`api.php?acao=listar&capitulo=${capitulo}`)
            .then(res => res.json())
            .then(data => {
                list.innerHTML = '';
                if(!Array.isArray(data)) { // CRÍTICO: Validação de Array
                    console.error("Dados recebidos da API não são um Array:", data);
                    list.innerHTML = '<p class="text-center text-red-400 text-xs">Erro ao carregar comentários.</p>';
                    return;
                }
                if(data.length === 0) {
                    list.innerHTML = '<p class="text-center text-slate-500 text-sm">Seja o primeiro a comentar!</p>';
                    return;
                }
                data.forEach(c => {
                    let mediaHtml = '';
                    if(c.foto) mediaHtml += `<img src="${c.foto}" onclick="openImage(this.src)" class="mt-4 rounded-lg max-h-48 border border-slate-700 cursor-pointer hover:scale-[1.02] transition shadow-lg">`;
                    if(c.audio) mediaHtml += `<audio controls src="${c.audio}" class="mt-4 w-full"></audio>`;

                    const jaCurtiu = localStorage.getItem(`reagiu_likes_${c.id}`);
                    const jaAmem = localStorage.getItem(`reagiu_amem_${c.id}`);
                    const jaGloria = localStorage.getItem(`reagiu_gloria_${c.id}`);

                    let themeColor = 'text-cyan-400';
                    let panelBorder = 'hover:border-cyan-500/50';

                    const html = `
                        <div class="glass-panel p-5 pb-12 rounded-xl border border-slate-800 relative group transition ${panelBorder} bg-[#0a0514]/60">
                            <div class="flex justify-between items-start mb-3 border-b border-slate-800 pb-2">
                                <strong class="${themeColor} text-sm tracking-wide font-serif">${c.nome}</strong>
                                <span class="text-[10px] text-slate-500 uppercase tracking-widest">${new Date(c.data_envio).toLocaleDateString('pt-BR')}</span>
                            </div>
                            <p class="text-slate-300 text-sm leading-relaxed">${c.mensagem}</p>
                            ${mediaHtml}
                            
                            <div class="absolute bottom-3 right-4 flex gap-2">
                                <button onclick="reagirComentario(${c.id}, 'likes', this)" class="text-xs transition flex items-center gap-1 bg-black/80 px-2 py-1 rounded-full border border-slate-700 ${jaCurtiu ? 'text-red-500 border-red-500/30' : 'text-slate-400 hover:text-red-400'}" ${jaCurtiu ? 'disabled' : ''}>
                                    <i class="fa-solid fa-heart"></i> <span class="count font-bold">${c.likes || 0}</span>
                                </button>
                                <button onclick="reagirComentario(${c.id}, 'amem', this)" class="text-xs transition flex items-center gap-1 bg-black/80 px-2 py-1 rounded-full border border-slate-700 ${jaAmem ? 'text-cyan-400 border-cyan-400/30' : 'text-slate-400 hover:text-cyan-400'}" ${jaAmem ? 'disabled' : ''}>
                                    <i class="fa-solid fa-hands-praying"></i> <span class="count font-bold">${c.amem || 0}</span>
                                </button>
                                <button onclick="reagirComentario(${c.id}, 'gloria', this)" class="text-xs transition flex items-center gap-1 bg-black/80 px-2 py-1 rounded-full border border-slate-700 ${jaGloria ? 'text-blue-500 border-blue-500/30' : 'text-slate-400 hover:text-blue-500'}" ${jaGloria ? 'disabled' : ''}>
                                    <i class="fa-solid fa-fire"></i> <span class="count font-bold">${c.gloria || 0}</span>
                                </button>
                            </div>
                        </div>
                    `;
                    list.insertAdjacentHTML('beforeend', html);
                });
            })
            .catch(err => {
                list.innerHTML = '<p class="text-center text-red-400 text-xs">Erro ao carregar comentários. Tente novamente mais tarde.</p>';
                console.error("Erro na requisição fetch para comentários:", err);
            });
        }

        function reagirComentario(id, tipo, btn) {
            if(localStorage.getItem(`reagiu_${tipo}_${id}`)) return;

            const icon = btn.querySelector('i');
            const countSpan = btn.querySelector('.count');
            let count = parseInt(countSpan.innerText);

            icon.classList.add('reacted-anim');
            btn.classList.remove('text-slate-400');
            
            if(tipo === 'likes') btn.classList.add('text-red-500', 'border-red-500/30');
            if(tipo === 'amem') btn.classList.add('text-cyan-400', 'border-cyan-400/30');
            if(tipo === 'gloria') btn.classList.add('text-blue-500', 'border-blue-500/30');

            countSpan.innerText = count + 1;
            btn.disabled = true;

            localStorage.setItem(`reagiu_${tipo}_${id}`, 'true');

            const formData = new FormData();
            formData.append('acao', 'reagir');
            formData.append('id', id);
            formData.append('tipo', tipo);

            fetch('api.php', { method: 'POST', body: formData })
            .catch(err => {
                console.error("Erro ao reagir ao comentário:", err);
                // Opcional: reverter estado do botão ou notificar usuário
            });
        }

        document.getElementById('commentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            const formData = new FormData(this);
            formData.append('acao', 'salvar');
            if(currentAudioBlob) {
                formData.append('audio', currentAudioBlob, 'audio.wav');
            }

            fetch('api.php', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if(data.sucesso) {
                    this.reset();
                    document.getElementById('filePreview').innerHTML = '';
                    currentAudioBlob = null;
                    document.getElementById('recordText').innerText = "Gravar Áudio";
                    recordBtn.classList.remove('recording-pulse');
                    carregarComentarios(document.getElementById('formChapterKey').value);
                } else {
                    alert('Erro ao enviar comentário. ' + (data.mensagem || ''));
                }
            })
            .catch((err) => {
                alert('Erro de conexão ou no servidor ao enviar comentário.');
                console.error("Erro no envio do comentário:", err);
            })
            .finally(() => {
                btn.innerText = originalText;
                btn.disabled = false;
            });
        });

        function previewFile(input) {
            const preview = document.getElementById('filePreview');
            preview.classList.add('hidden'); // Oculta antes de verificar
            preview.innerHTML = ''; // Limpa conteúdo
            
            if(input.files && input.files[0]) {
                const fileName = input.files[0].name;
                const fileType = input.files[0].type;

                if (fileType.startsWith('image/')) {
                    preview.innerHTML = `<i class="fa-solid fa-check text-green-400"></i> Imagem selecionada: ${fileName}`;
                    preview.classList.remove('hidden');
                } else {
                    preview.innerHTML = `<i class="fa-solid fa-xmark text-red-400"></i> Tipo de arquivo não suportado. Selecione uma imagem.`;
                    preview.classList.remove('hidden');
                    input.value = ''; // Limpa o input file
                }
            }
        }

        const recordBtn = document.getElementById('recordBtn');
        recordBtn.addEventListener('click', async () => {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                    mediaRecorder.onstop = () => {
                        currentAudioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        const preview = document.getElementById('filePreview');
                        preview.classList.remove('hidden');
                        preview.innerHTML += `<br><i class="fa-solid fa-microphone text-green-400"></i> Áudio gravado (${(currentAudioBlob.size / 1024).toFixed(2)} KB)!`;
                    };
                    mediaRecorder.start();
                    recordBtn.classList.add('recording-pulse');
                    document.getElementById('recordText').innerText = "Parar Gravação";
                } catch (err) {
                    alert("Permita o uso do microfone para gravar seu áudio.");
                    console.error("Erro ao acessar microfone:", err);
                }
            } else {
                mediaRecorder.stop();
                recordBtn.classList.remove('recording-pulse');
                document.getElementById('recordText').innerText = "Gravar Áudio";
            }
        });

        function openImage(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('imageModal').classList.remove('hidden');
        }
        function closeImage() {
            document.getElementById('imageModal').classList.add('hidden');
        }

        function resetObservers() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                    else entry.target.classList.remove('active'); // Opcional: remove 'active' ao sair da tela
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        const canvas = document.getElementById("particles-js");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        // Cor dos partículas para 1 Tessalonicenses: #06b6d4 (cyan-600)
        for(let i=0; i<80; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, spcX: Math.random()*0.5-0.25, spcY: Math.random()*0.5-0.25 });
        function animateParticles() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(6, 182, 212, 0.15)"; /* Cyan */
            particles.forEach(p => { p.x += p.spcX; p.y += p.spcY; if(p.x<0||p.x>canvas.width) p.spcX*=-1; if(p.y<0||p.y>canvas.height) p.spcY*=-1; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        loadChapter('intro_book');
    </script>
</body>
</html>
